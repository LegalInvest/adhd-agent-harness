<script>
const DATA = {"summary": {"count": 400, "avg_total": 14.79, "grade_counts": {"S": 5, "A": 8, "B": 159, "C": 124, "D": 104, "未评分": 0}, "risk_counts": {"低": 9, "中": 170, "高": 221}, "updated_at": "2026-06-04"}, "items": [{"id": "问题281", "number": 281, "title": "问题281：为什么 ADHD 的“99%准确率”常常只是一个实验室数字陷阱", "priority": "S", "category": "diagnosis", "rank": 1, "grade": "S", "desire": 9, "thought": 9, "action": 9, "total": 27, "authenticity": 9, "risk": "低", "failure": "类型模板、诊断模板", "desire_text": "被认真区分和支持：不是被一句“你可能是 ADHD”安慰，而是把长期痛感、功能损害、专业评估和现实照护接成一条路。", "thought_text": "把“我是不是有问题”改写成“症状、场景、样本偏差、诊断边界和支持系统之间哪一环断了”。", "action_text": "把最近一次失控场景写成四栏：发生了什么、损害了什么、持续多久、下一步该问医生/专业人士/AI 什么。", "real_desire": "", "outsourcing_angle": "", "verification_signal": "", "comment": "基础评分已生成；建议发布前人工复核题目级痛点。", "article": "# 问题281：为什么 ADHD 的“99%准确率”常常只是一个实验室数字陷阱\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想给自己贴一个更响的标签，而是想终于有人把你这些年“明明聪明却总在简单处崩掉”的经历，当成一个需要被认真处理的问题。\n\n**所思：** 原来我需要的不是一次身份确认，而是一条从痛感、症状、场景、专业评估到日常支持的路径。标签只是入口，接口才是出口。\n\n**所行：** 打开备忘录，写下最近一次“我明明想做却启动不了”的具体场景，再让 AI 帮你分成四栏：发生了什么、损害了什么、我怀疑什么、下一步该问谁。\n\n## 点火开场：发布版第一屏\n\n你可能并不是真的想问“我是不是 ADHD”。你更想问的是：为什么我能把一个复杂问题想得很透，却会在回一条微信、打开一个文档、预约一次检查这种小事上反复失败。\n\n所以《为什么 ADHD 的“99%准确率”常常只是一个实验室数字陷阱》这篇不能先讲概念。它要先让读者在第三段前停住：这不就是我吗？我不是没有能力，我是一直在用不适配自己的接口硬扛。\n\n真正的 S 级，不是观点锋利，而是三件事同时发生：读者想要一种新的活法，读者重新解释自己的卡点，读者马上做一个小动作。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 被认真区分和支持：不是被一句“你可能是 ADHD”安慰，而是把长期痛感、功能损害、专业评估和现实照护接成一条路。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 9 | S级优先级带来更强发布势能；已发布前精修；已有证据增强 |\n| 所思 | 把“我是不是有问题”改写成“症状、场景、样本偏差、诊断边界和支持系统之间哪一环断了”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 9 | S级优先级带来更强发布势能；已发布前精修；已有证据增强 |\n| 所行 | 把最近一次失控场景写成四栏：发生了什么、损害了什么、持续多久、下一步该问医生/专业人士/AI 什么。 | 结尾必须给一个 3-15 分钟内可执行的 AI/备忘录/微信动作。 | 9 | S级优先级带来更强发布势能；已发布前精修；已有证据增强 |\n| 电流总分 | 先列触动内容，再综合打分。 | 诊断边界、误诊漏诊、AI 模型偏差或医疗支持缺口越具体，分数越高。 | 27 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n这不是一篇“再解释一次 ADHD”的文章，而是一篇门面文章：它要替整个《问题XXX》系列证明，ADHD × AI 不是流量标签，而是一套关于执行功能、外部前额叶和现实回流的工作系统。\n\n为什么 ADHD 的“99%准确率”常常只是一个实验室数字陷阱。这个题的核心不是“ADHD 很痛，AI 很有用”这种容易写烂的判断，而是：把“99%准确率”从神话拉回样本、偏倚、场景迁移和误伤成本。如果这句话讲不清，后面所有平台版、口播版、评论问题和模板入口都会变成包装；如果讲清了，这篇文章就能成为一个真正的闭环资产。\n\n## 01 开场：先从一个不舒服的场景进入\n\n想象一个很具体的画面：你打开 AI，输入需求，几秒钟后它给你一份结构清楚、语气稳定、看起来比你本人更像“正常职场人”的答案。你应该高兴，因为它确实帮你省掉了很多步骤；但你心里又会冒出一个更暗的念头：如果它这么快就能把我翻译好，那我这些年到底算什么？\n\n这个问题的刺就在这里。AI 并没有简单地帮助 ADHD，它也重新定义了 ADHD 的痛感。过去你卡住，是因为启动难、排序难、时间感差、工作记忆漏水；现在工具可以接走很多中间步骤，于是新的问题出现了：工具接走以后，你的主体性、判断力、风险感和真实风格还剩多少？\n\n所以这篇不能写成工具赞歌。它必须承认 AI 的帮助，也必须追问帮助的代价。它不能让读者只获得“我被理解了”的安慰，而要让读者意识到：自己真正需要设计的不是一个更会输出的工具，而是一个不会吞掉判断权的外部执行系统。\n\n## 02 核心判断：问题不在能力，而在接口\n\nADHD 最容易被误解成能力问题。拖延被看成懒，分心被看成不认真，情绪波动被看成不成熟，计划失效被看成不负责任。但在很多真实场景里，当事人并不是不知道目标，也不是没有能力，而是缺少一条从目标到动作的稳定通道。\n\n这条通道，我更愿意叫它“执行接口”。它包括启动接口、排序接口、时间接口、工作记忆接口、情绪接口、反馈接口和委托接口。普通人可能也会卡，但 ADHD 用户会更早、更频繁、更痛地感到这些接口失灵。\n\nAI 的价值，正是在这里出现的。它可以把抽象目标切成步骤，把脑内混乱压成结构，把空白页面变成可修改草稿，把一团焦虑翻译成一个五分钟动作。它不是把你治好，而是暂时补上某个接口。\n\n但这也解释了为什么 AI 有时会让人更痛苦。因为一旦工具补上了接口，社会就更容易说：你看，工具都有了，你怎么还不行？于是原本属于环境、系统和执行功能的摩擦，又被重新塞回个人道德里。\n\n## 03 这个题的真正锋口：实验室准确率陷阱\n\n实验室准确率陷阱 不是一个装饰性概念，而是这篇文章必须守住的锋口。它要求我们不要在“AI 能帮忙”这个浅层判断上停下，而要继续问：它帮的是哪一段？它有没有制造新的依赖？它有没有把高方差风格洗成神经典型风格？它有没有把现实反馈变得更清楚，还是只让半成品变多？\n\n对 ADHD 用户来说，最危险的不是工具不好用，而是工具太顺。太顺的工具会让人误以为自己已经完成了现实动作：生成了计划，就像开始了；写出了草稿，就像发布了；整理了知识库，就像做出了判断；让 Agent 跑了一轮，就像自己已经承担了风险。\n\n但现实不是这样运转的。现实只承认动作、交付、对话、反馈和后果。一个 AI 工作流如果不能把人送到这些东西面前，它再漂亮也只是新的缓冲区。\n\n所以这篇文章的锋口要落在一句话上：AI 可以接走摩擦，但不能替你承担判断；Agent 可以执行动作，但不能替你承担赌注；工具可以翻译你，但不能替你活。\n\n## 04 三个校准：防止写成营销号\n\n第一，不能把 ADHD 写成天才徽章。高方差确实可能带来发散、联想、敏感和异常问题感，但这些能力只有在合适接口里才会变成产出。没有接口，高方差只是高损耗。\n\n第二，不能把 AI 写成治疗方案。AI 可以帮助某些任务场景里的执行功能外部化，但它不能替代诊断、治疗、药物、睡眠、稳定关系和真实工作条件。把 AI 写成万能药，最后只会制造新的羞耻。\n\n第三，不能把内容写成纯共鸣。共鸣是入口，不是终点。读者说“太真实了”只能说明文章击中了痛点；读者能说出“我卡在启动接口，我需要一个五分钟动作”，才说明文章完成了转译。\n\n这三个校准决定了《问题XXX》系列和普通 ADHD 内容的区别：它不是贩卖身份，不是贩卖焦虑，也不是贩卖工具，而是在搭一套能把痛感转成动作、动作转成反馈、反馈转成资产的系统。\n\n## 05 可执行判断：一篇文章必须留下一个动作\n\n这篇文章最终要留下的动作，是一张《AI诊断边界卡》。它不需要复杂，甚至越简单越好。表格只问四件事：我现在卡在哪里；这是哪个执行接口断了；AI 可以接走哪一个最小动作；48 小时内用什么现实信号验证它。\n\n| 当前卡点 | 执行接口 | AI/Agent 最小动作 | 48 小时现实信号 |\n|---|---|---|---|\n| 我一直想但没开始 | 启动接口 | 拆成一个五分钟动作 | 是否真的打开并完成第一步 |\n| 我同时有太多方向 | 排序接口 | 压成三个选项并给取舍理由 | 是否能放弃两个方向 |\n| 我生成了很多内容 | 反馈接口 | 设计一次发布、询问或交付 | 是否收到真实回应 |\n| 我怕工具替代自己 | 委托接口 | 标出哪些可委托、哪些必须自己判断 | 是否保留最终决策 |\n\n这个表的价值，不在于它多漂亮，而在于它把模糊自责改成了可处理的问题。ADHD 用户不需要再问“为什么我又这样”，而是可以问“我现在哪个接口断了”。这就是从情绪叙事进入产品化叙事的分界线。\n\n## 06 结尾：真正的目标不是更正常，而是更可回流\n\nAI 最容易给人的幻觉，是让一切看起来更顺了。文本更顺，计划更顺，表达更顺，简历更顺，汇报更顺。但顺不等于真，顺也不等于完成。对 ADHD 用户来说，真正重要的是：这套系统有没有让现实更快回话？有没有让你更少在脑内空转？有没有让你保留自己的判断，而不是把自己交给模板？\n\n所以这篇文章最后要把读者带到一个更冷静的位置：不要问 AI 有没有让你变正常，要问它有没有让你更能进入现实。不要问自己是不是终于被修好了，要问哪个接口被外部化了，哪个接口还需要人工守住。\n\n这才是 ADHD × AI 的真正命题。不是治愈，不是神化，不是炫耀效率，而是在一个注意力被系统性采掘的时代，为高方差大脑重新设计进入现实的通道。\n\n## 08 证据增强：准确率不是诊断质量，数据源差异才是第一道门槛\n\n这篇文章要补上一层证据校准：CDC 的 ADHD 数据页面把诊断、治疗、照护等估计分成不同数据来源来呈现，而不是把 ADHD 变成一个单一、稳定、可被模型一次性判定的标签。这个细节很重要。它说明真实世界里的 ADHD 不是一张干净的实验室表格，而是由样本、问卷、就诊路径、地区差异、年龄层、照护系统和报告口径共同塑形的结果。\n\n所以，“99% 准确率”的危险不在于数字一定是假的，而在于它经常把最关键的问题藏起来：样本从哪里来？标签是谁给的？阳性和阴性的代价是否对称？模型在儿童、成人、女性、共病人群、中文语境和高功能掩饰者身上是否还能迁移？如果这些问题没有回答，准确率越高，越可能只是把一个窄样本里的规律包装成普遍诊断能力。\n\n这也是 ADHD × AI 必须守住的边界。AI 可以帮助用户整理症状材料、准备就医问题、记录执行功能断点、把混乱经历翻译成可沟通文本；但它不能把“我像不像 ADHD”直接简化成“模型判断我是不是”。真正有价值的产品入口不是“AI 给你下诊断”，而是“AI 帮你把诊断前后的信息不对称降下来”。\n\n因此，《AI诊断边界卡》要从四个问题开始：第一，这个判断来自医疗诊断、筛查量表、用户自述，还是模型推断；第二，模型有没有说明它不适用于哪些人群和场景；第三，误判的现实成本是什么，是延误就医、错误自责，还是错误用药期待；第四，下一步是否指向专业评估和现实支持，而不是停留在标签确认。只有这样，AI 才是在帮人进入现实，而不是制造一个更漂亮的自我标签。\n\n## 发布接口\n\n公众号版用这一版作为主稿，保留严肃随笔语气。小红书版只截取开场场景和《AI诊断边界卡》。知乎版重点回答概念边界：AI 不是治疗，而是外部化脚手架。短视频版抓一句话：工具可以翻译你，但不能替你活。评论区唯一问题：你现在最想让 AI 接住的，是哪个执行接口？\n\n## 07 发布前精修补丁：把锋利度落到第一屏\n\n发布前，这篇文章还需要在第一屏做一次更狠的取舍：不要先解释概念，不要先铺知识背景，也不要先证明作者懂 ADHD。第一屏只做一件事：把读者带进一个他们无法否认的现场。\n\n这个现场可以是：工具已经把文本写得很漂亮，但你仍然没有发布；Agent 已经跑出十个方案，但你反而更难选择；AI 把你翻译得像一个稳定的人，但你突然怀疑自己的原始表达是不是被洗掉了。这个现场一旦成立，后面的理论才有必要出现。\n\n因此，正式发布时建议把开头压成三段。第一段写一个动作现场，第二段写这个现场背后的执行接口，第三段抛出本文判断：为什么 ADHD 的“99%准确率”常常只是一个实验室数字陷阱 不是一个工具问题，而是一个“谁来接住执行功能、谁来保留判断权、谁来承担现实反馈”的问题。\n\n这也是评论区回流的重点。不要问“你怎么看 AI 和 ADHD”，这个问题太大，读者只会泛泛表达。要问：“你现在最想交给 AI 的，是启动、排序、记忆、时间感、情绪门槛，还是反馈回流？”这个问题足够小，才可能带回可用数据。\n\n如果这篇发布后只得到共鸣，它还只是文章；如果它能让读者说出自己的接口断点，它就是资产；如果它进一步让读者索要表格、提示词或模板，它才真正进入产品化路径。", "chars": 5107, "path": "content-packs/问题281/01_正文.md"}, {"id": "问题350", "number": 350, "title": "问题350：为什么 SAP、微软、EY 的神经多样性项目，应该被当成组织设计案例而不是公益故事", "priority": "S", "category": "org", "rank": 2, "grade": "S", "desire": 9, "thought": 9, "action": 9, "total": 27, "authenticity": 9, "risk": "低", "failure": "类型模板", "desire_text": "不再把自己伪装成稳定、线性、随叫随到的人，而是想要岗位、会议、招聘和反馈系统真的改接口。", "thought_text": "把“不适合组织”改写成“不适合隐性优先级、即时表达、稳定外壳这套默认组织接口”。", "action_text": "选一个最耗能工作环节，让 AI 写成四句接口说明：输入、输出、确认节奏、反馈格式。", "real_desire": "", "outsourcing_angle": "", "verification_signal": "", "comment": "组织题要从组织咨询语落到个体真实痛点和接口显性化", "article": "# 问题350：为什么 SAP、微软、EY 的神经多样性项目，应该被当成组织设计案例而不是公益故事\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想被夸“很有创造力”，而是想在会议、岗位、招聘和反馈系统里，不必先把自己伪装成稳定、线性、随叫随到的人。\n\n**所思：** 原来我不是天然不适合组织，我可能只是不适合一套只奖励即时表达、隐性优先级和稳定外壳的组织接口。AI 的意义不是让我更会伪装，而是逼组织把规则说清楚。\n\n**所行：** 选一个最耗你的工作环节，让 AI 写成四句话：任务输入是什么、期望输出是什么、多久确认一次、反馈用什么格式。然后把它当作一次沟通模板。\n\n## 点火开场：发布版第一屏\n\n你最累的可能不是工作本身，而是每天把自己翻译成一个组织更容易接受的版本：开会要像没走神，汇报要像一直在线，优先级不清也要装作懂了。\n\n所以《为什么 SAP、微软、EY 的神经多样性项目，应该被当成组织设计案例而不是公益故事》这篇不能先讲概念。它要先让读者在第三段前停住：这不就是我吗？我不是没有能力，我是一直在用不适配自己的接口硬扛。\n\n真正的 S 级，不是观点锋利，而是三件事同时发生：读者想要一种新的活法，读者重新解释自己的卡点，读者马上做一个小动作。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 不再把自己伪装成稳定、线性、随叫随到的人，而是想要岗位、会议、招聘和反馈系统真的改接口。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 9 | S级优先级带来更强发布势能；已发布前精修；已有证据增强 |\n| 所思 | 把“不适合组织”改写成“不适合隐性优先级、即时表达、稳定外壳这套默认组织接口”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 9 | S级优先级带来更强发布势能；已发布前精修；已有证据增强 |\n| 所行 | 选一个最耗能工作环节，让 AI 写成四句接口说明：输入、输出、确认节奏、反馈格式。 | 结尾必须给一个 3-15 分钟内可执行的 AI/备忘录/微信动作。 | 9 | S级优先级带来更强发布势能；已发布前精修；已有证据增强 |\n| 电流总分 | 先列触动内容，再综合打分。 | 能否把个人痛感推到组织接口、招聘流程、管理节奏和结构承诺。 | 27 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n这不是一篇“再解释一次 ADHD”的文章，而是一篇门面文章：它要替整个《问题XXX》系列证明，ADHD × AI 不是流量标签，而是一套关于执行功能、外部前额叶和现实回流的工作系统。\n\n为什么 SAP、微软、EY 的神经多样性项目，应该被当成组织设计案例而不是公益故事。这个题的核心不是“ADHD 很痛，AI 很有用”这种容易写烂的判断，而是：神经多样性项目不是公益，而是组织为非线性人才重写接口。如果这句话讲不清，后面所有平台版、口播版、评论问题和模板入口都会变成包装；如果讲清了，这篇文章就能成为一个真正的闭环资产。\n\n## 01 开场：先从一个不舒服的场景进入\n\n想象一个很具体的画面：你打开 AI，输入需求，几秒钟后它给你一份结构清楚、语气稳定、看起来比你本人更像“正常职场人”的答案。你应该高兴，因为它确实帮你省掉了很多步骤；但你心里又会冒出一个更暗的念头：如果它这么快就能把我翻译好，那我这些年到底算什么？\n\n这个问题的刺就在这里。AI 并没有简单地帮助 ADHD，它也重新定义了 ADHD 的痛感。过去你卡住，是因为启动难、排序难、时间感差、工作记忆漏水；现在工具可以接走很多中间步骤，于是新的问题出现了：工具接走以后，你的主体性、判断力、风险感和真实风格还剩多少？\n\n所以这篇不能写成工具赞歌。它必须承认 AI 的帮助，也必须追问帮助的代价。它不能让读者只获得“我被理解了”的安慰，而要让读者意识到：自己真正需要设计的不是一个更会输出的工具，而是一个不会吞掉判断权的外部执行系统。\n\n## 02 核心判断：问题不在能力，而在接口\n\nADHD 最容易被误解成能力问题。拖延被看成懒，分心被看成不认真，情绪波动被看成不成熟，计划失效被看成不负责任。但在很多真实场景里，当事人并不是不知道目标，也不是没有能力，而是缺少一条从目标到动作的稳定通道。\n\n这条通道，我更愿意叫它“执行接口”。它包括启动接口、排序接口、时间接口、工作记忆接口、情绪接口、反馈接口和委托接口。普通人可能也会卡，但 ADHD 用户会更早、更频繁、更痛地感到这些接口失灵。\n\nAI 的价值，正是在这里出现的。它可以把抽象目标切成步骤，把脑内混乱压成结构，把空白页面变成可修改草稿，把一团焦虑翻译成一个五分钟动作。它不是把你治好，而是暂时补上某个接口。\n\n但这也解释了为什么 AI 有时会让人更痛苦。因为一旦工具补上了接口，社会就更容易说：你看，工具都有了，你怎么还不行？于是原本属于环境、系统和执行功能的摩擦，又被重新塞回个人道德里。\n\n## 03 这个题的真正锋口：组织设计案例\n\n组织设计案例 不是一个装饰性概念，而是这篇文章必须守住的锋口。它要求我们不要在“AI 能帮忙”这个浅层判断上停下，而要继续问：它帮的是哪一段？它有没有制造新的依赖？它有没有把高方差风格洗成神经典型风格？它有没有把现实反馈变得更清楚，还是只让半成品变多？\n\n对 ADHD 用户来说，最危险的不是工具不好用，而是工具太顺。太顺的工具会让人误以为自己已经完成了现实动作：生成了计划，就像开始了；写出了草稿，就像发布了；整理了知识库，就像做出了判断；让 Agent 跑了一轮，就像自己已经承担了风险。\n\n但现实不是这样运转的。现实只承认动作、交付、对话、反馈和后果。一个 AI 工作流如果不能把人送到这些东西面前，它再漂亮也只是新的缓冲区。\n\n所以这篇文章的锋口要落在一句话上：AI 可以接走摩擦，但不能替你承担判断；Agent 可以执行动作，但不能替你承担赌注；工具可以翻译你，但不能替你活。\n\n## 04 三个校准：防止写成营销号\n\n第一，不能把 ADHD 写成天才徽章。高方差确实可能带来发散、联想、敏感和异常问题感，但这些能力只有在合适接口里才会变成产出。没有接口，高方差只是高损耗。\n\n第二，不能把 AI 写成治疗方案。AI 可以帮助某些任务场景里的执行功能外部化，但它不能替代诊断、治疗、药物、睡眠、稳定关系和真实工作条件。把 AI 写成万能药，最后只会制造新的羞耻。\n\n第三，不能把内容写成纯共鸣。共鸣是入口，不是终点。读者说“太真实了”只能说明文章击中了痛点；读者能说出“我卡在启动接口，我需要一个五分钟动作”，才说明文章完成了转译。\n\n这三个校准决定了《问题XXX》系列和普通 ADHD 内容的区别：它不是贩卖身份，不是贩卖焦虑，也不是贩卖工具，而是在搭一套能把痛感转成动作、动作转成反馈、反馈转成资产的系统。\n\n## 05 可执行判断：一篇文章必须留下一个动作\n\n这篇文章最终要留下的动作，是一张《组织接口审计表》。它不需要复杂，甚至越简单越好。表格只问四件事：我现在卡在哪里；这是哪个执行接口断了；AI 可以接走哪一个最小动作；48 小时内用什么现实信号验证它。\n\n| 当前卡点 | 执行接口 | AI/Agent 最小动作 | 48 小时现实信号 |\n|---|---|---|---|\n| 我一直想但没开始 | 启动接口 | 拆成一个五分钟动作 | 是否真的打开并完成第一步 |\n| 我同时有太多方向 | 排序接口 | 压成三个选项并给取舍理由 | 是否能放弃两个方向 |\n| 我生成了很多内容 | 反馈接口 | 设计一次发布、询问或交付 | 是否收到真实回应 |\n| 我怕工具替代自己 | 委托接口 | 标出哪些可委托、哪些必须自己判断 | 是否保留最终决策 |\n\n这个表的价值，不在于它多漂亮，而在于它把模糊自责改成了可处理的问题。ADHD 用户不需要再问“为什么我又这样”，而是可以问“我现在哪个接口断了”。这就是从情绪叙事进入产品化叙事的分界线。\n\n## 06 结尾：真正的目标不是更正常，而是更可回流\n\nAI 最容易给人的幻觉，是让一切看起来更顺了。文本更顺，计划更顺，表达更顺，简历更顺，汇报更顺。但顺不等于真，顺也不等于完成。对 ADHD 用户来说，真正重要的是：这套系统有没有让现实更快回话？有没有让你更少在脑内空转？有没有让你保留自己的判断，而不是把自己交给模板？\n\n所以这篇文章最后要把读者带到一个更冷静的位置：不要问 AI 有没有让你变正常，要问它有没有让你更能进入现实。不要问自己是不是终于被修好了，要问哪个接口被外部化了，哪个接口还需要人工守住。\n\n这才是 ADHD × AI 的真正命题。不是治愈，不是神化，不是炫耀效率，而是在一个注意力被系统性采掘的时代，为高方差大脑重新设计进入现实的通道。\n\n## 08 证据增强：组织设计不是善意宣言，而是接口重写\n\n这篇文章要把“公益故事”彻底推开。JAN 对 ADHD 工作支持的梳理，重点不在于把 ADHD 员工描述成需要被特殊照顾的人，而在于把工作困难拆成可调整的条件：任务呈现方式、干扰控制、时间安排、沟通节奏、反馈频率、记忆辅助、优先级澄清。这些东西听起来很普通，但它们正是组织接口。\n\n微软的神经多样性招聘项目也提供了同一个方向的案例：关键不是企业表达了包容态度，而是招聘、面试、上岗、管理和支持流程有没有为非典型候选人重新设计。如果一个组织只在官网写“欢迎神经多样性人才”，但面试仍然依赖高压即兴表达、模糊任务、隐性社交规则和一次性表现，它并没有真正改变接口，只是把旧筛选机制换了包装。\n\n把这个逻辑迁移到 ADHD × AI，结论会更锋利：AI 工具不应该只服务个人“更像正常员工”，还应该倒逼组织把工作流显性化。一个团队如果允许 Agent 帮每个人拆任务、留痕、复盘、生成会议摘要和跟进清单，其实是在把过去隐藏在个人脑内的执行功能，变成组织级基础设施。\n\n所以《组织接口审计表》不要问“我们是否关心 ADHD 员工”，而要问四件事：任务是否能被清楚拆解，优先级是否能被反复确认，反馈是否有稳定节奏，允许使用哪些 AI/Agent 来外部化执行功能。能回答这些问题，神经多样性项目才是组织设计；答不上来，它就只是一个漂亮的价值观页面。\n\n## 发布接口\n\n公众号版用这一版作为主稿，保留严肃随笔语气。小红书版只截取开场场景和《组织接口审计表》。知乎版重点回答概念边界：AI 不是治疗，而是外部化脚手架。短视频版抓一句话：工具可以翻译你，但不能替你活。评论区唯一问题：你现在最想让 AI 接住的，是哪个执行接口？\n\n## 07 发布前精修补丁：把锋利度落到第一屏\n\n发布前，这篇文章还需要在第一屏做一次更狠的取舍：不要先解释概念，不要先铺知识背景，也不要先证明作者懂 ADHD。第一屏只做一件事：把读者带进一个他们无法否认的现场。\n\n这个现场可以是：工具已经把文本写得很漂亮，但你仍然没有发布；Agent 已经跑出十个方案，但你反而更难选择；AI 把你翻译得像一个稳定的人，但你突然怀疑自己的原始表达是不是被洗掉了。这个现场一旦成立，后面的理论才有必要出现。\n\n因此，正式发布时建议把开头压成三段。第一段写一个动作现场，第二段写这个现场背后的执行接口，第三段抛出本文判断：为什么 SAP、微软、EY 的神经多样性项目，应该被当成组织设计案例而不是公益故事 不是一个工具问题，而是一个“谁来接住执行功能、谁来保留判断权、谁来承担现实反馈”的问题。\n\n这也是评论区回流的重点。不要问“你怎么看 AI 和 ADHD”，这个问题太大，读者只会泛泛表达。要问：“你现在最想交给 AI 的，是启动、排序、记忆、时间感、情绪门槛，还是反馈回流？”这个问题足够小，才可能带回可用数据。\n\n如果这篇发布后只得到共鸣，它还只是文章；如果它能让读者说出自己的接口断点，它就是资产；如果它进一步让读者索要表格、提示词或模板，它才真正进入产品化路径。", "chars": 5035, "path": "content-packs/问题350/01_正文.md"}, {"id": "问题353", "number": 353, "title": "问题353：为什么 ADHD 人群最需要 Agentic AI，却也最容易不敢真的委托", "priority": "S", "category": "ai_interface", "rank": 3, "grade": "S", "desire": 9, "thought": 9, "action": 9, "total": 27, "authenticity": 9, "risk": "低", "failure": "已校准", "desire_text": "巴不得把启动、排序、记忆、催办、沟通、收尾、复盘这些执行痛点全部外包给可信 Agent，而不是再靠意志力亲自扛。", "thought_text": "把“委托会不会让我失去主体性”改写成“彻底外包不是道德问题，而是产品可信度问题：接得住、验得清、错了能恢复”。", "action_text": "写下最想扔掉的一种痛，让 AI 输出它能接走什么、你只需验收什么、失败后怎样一键重启。", "real_desire": "ADHD 用户巴不得把反复折磨自己的执行痛点全部外包给可信外部系统。", "outsourcing_angle": "Agent 接走启动、排序、记忆、催办、沟通、收尾、复盘；用户只保留最小验收口和失败重启口。", "verification_signal": "评论区读者能具体说出最想让 AI/Agent 接走的痛点，并索要痛点外包协议模板。", "comment": "注意 Agentic AI 题不要默认害怕委托，要先承认全痛点外包欲望；已完成真实欲望校准", "article": "# 问题353：为什么 ADHD 人群最需要 Agentic AI，却也最容易不敢真的委托\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想要一个更聪明的效率工具，而是想把启动、排序、记忆、催办、沟通、收尾、复盘这些反复折磨人的痛点，全部交给一个可信的外部系统。不是“帮我一下”，是“别再让我亲自扛这一切”。\n\n**所思：** 原来我不是害怕委托，我是太想委托了。真正让我停住的不是舍不得判断权，而是现在的 Agent 系统还不能证明自己接得住、验得清、错了能恢复。所以问题不是“我要不要保留主体性”，而是“怎样把彻底外包做成一个可控产品”。\n\n**所行：** 写下今天最想扔掉的一个痛点，不要写任务名，只写痛感：启动、排序、记忆、催办、解释、收尾、复盘、关系后果。然后让 AI 输出三件事：它可以替你接走什么、你只需要验收什么、失败后怎样一键重启。\n\n## 点火开场：发布版第一屏\n\n我不觉得 ADHD 人群最真实的痛点是“不敢委托”。\n\n很多时候恰恰相反。\n\n我们巴不得委托。巴不得外包。巴不得有一个系统把启动、排序、记忆、催办、沟通、收尾、复盘全部接走。最好连“我为什么又没开始”的解释都替我说完，连“这件事下一步该怎么推进”的判断都替我压成一个按钮。\n\n真正的问题不是我舍不得控制权。\n\n真正的问题是：我太想把痛苦扔出去了，但我还没有遇到一个足够可信的系统，能让我放心把痛苦交出去。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 巴不得把启动、排序、记忆、催办、沟通、收尾、复盘这些执行痛点全部外包给可信 Agent，而不是再靠意志力亲自扛。 | 第一屏直接承认“我不是不敢委托，我是太想委托了”，命中高痛感 ADHD 的免痛和外包欲望。 | 9 | 欲望从“保留判断权”校准为“彻底外包痛苦”，更接近真实高压 ADHD 读者。 |\n| 所思 | 把“委托会不会让我失去主体性”改写成“彻底外包不是道德问题，而是产品可信度问题：接得住、验得清、错了能恢复”。 | 正文把风险从主体性焦虑迁移到 Agent 产品设计条件。 | 9 | 解释反转更强：风险不是压制欲望，而是让欲望可实现的工程条件。 |\n| 所行 | 不再让读者做复杂边界表，而是先写出最想扔掉的一种痛，并让 AI 生成接走项、验收口、失败重启句。 | 行动落到一个 3 分钟内可执行的外包协议。 | 9 | 摩擦低，符合 ADHD 读者“别让我再管理工具”的真实需求。 |\n| 电流总分 | 先承认全外包欲望，再给可信 Agent 的最小验收结构。 | 比旧版“只委托最小一块”更有欲望强度和产品方向。 | 27 | 题目级痛点明确，所欲、所思、所行闭合。 |\n\n这篇文章不能再写成“ADHD 最需要 Agentic AI，却最容易害怕把事情交出去”。\n\n这个判断太像一个外部观察者在替 ADHD 用户保存体面：你看，他不是懒，他只是谨慎；他不是想逃，他只是想保留判断权。\n\n但很多真实时刻没有那么体面。\n\n真实时刻是：我不想再启动了。我不想再排序了。我不想再记得所有事情。我不想再催自己。我不想再解释为什么我拖了。我不想再把一堆半成品从脑子里捞出来。我不想再靠羞耻感推进。我不想每次都从废墟里重新发明一套生活系统。\n\n如果有一个 Agent 真的能接住这些，我当然想交出去。\n\n问题不是我不敢委托。\n\n问题是我太知道自己一旦交出去，就会交得很彻底。\n\n## 01 真正的欲望：不是提效，是免痛\n\n很多 AI 产品喜欢把自己包装成“提高效率”。\n\n但对 ADHD 来说，效率不是第一层欲望。效率太干净了，太像 OKR 里的词。真正的底层欲望通常更狼狈：少一次崩溃，少一次卡死，少一次忘记，少一次因为没回消息而背上关系债，少一次明明知道该做什么却坐在屏幕前动不了。\n\n所以 Agentic AI 对 ADHD 的意义，不只是“帮我更快完成任务”。\n\n它更像一个外部执行功能系统：当我的启动接口断了，它替我把第一步压到小到不能再小；当我的排序接口爆了，它替我把十个方向压成三个可选项；当我的工作记忆漏水，它替我记住承诺、上下文和下一次该接上的线；当我被关系后果压住，它替我起草一条能发出去的解释；当我烂尾，它替我把废墟整理成还能回流的材料。\n\n这不是“增强”。\n\n这更像是把痛苦从身体里拿出来，放进一个外部系统。\n\n## 02 为什么“害怕委托”不是主问题\n\n旧版本容易把这篇写成委托边界：哪些可以交给 AI，哪些必须自己判断，哪些需要现实反馈。\n\n这个框架不是错，但它放得太早了。\n\n对高痛感 ADHD 用户来说，第一反应不是“我要谨慎保留判断权”。第一反应更可能是：“能不能快点接走？能不能别让我再想？能不能直接告诉我下一步？能不能替我催、替我记、替我收尾、替我面对那个我一直逃避的人？”\n\n也就是说，真实欲望先于边界。\n\n边界不是用来教育读者“不要过度依赖”的。边界是用来让读者终于敢彻底依赖一个可靠系统的。\n\n这一区别很关键。\n\n如果文章先讲“你不能把判断权交出去”，读者会觉得又被推回自己身上：最后还是我来管，还是我来守，还是我来判断，还是我来负责。那 Agent 只是又多了一个需要管理的工具。\n\n但如果文章先讲“你可以把痛点交出去，我们来设计验收口”，读者才会感觉：这不是又一套自律方案，这是一个真的站在我这边的产品系统。\n\n## 03 真正的风险：不是主体性消失，而是系统不可信\n\n当然，全部外包有风险。\n\n但风险不应该被写成道德训诫，好像 ADHD 用户太贪心、太依赖、太想逃，所以必须被提醒“你还要保留自己”。\n\n真正的风险更具体，也更产品化。\n\n第一，Agent 接不住上下文。它只看到你给它的一句话，看不到你过去三周为什么卡住，看不到那个任务背后的羞耻、关系、债务和时间压力。\n\n第二，Agent 不能稳定验收。它可以生成一堆看起来正确的输出，但你仍然不知道哪个能进入现实，哪个只是漂亮废纸。\n\n第三，Agent 失败后不能恢复。它一旦跑偏，你还要花更多力气解释、纠错、重启，最后变成“我还要管理一个帮我管理生活的系统”。\n\n第四，Agent 容易制造顺滑幻觉。计划生成了，好像开始了；邮件写好了，好像沟通了；方案排好了，好像推进了；知识库整理了，好像判断完成了。\n\n这些风险都是真的。\n\n但它们不是用来否定外包欲望的。\n\n它们是用来定义一个可信 Agent 系统必须具备什么。\n\n## 04 一个深切理解 ADHD 的 Agent 应该怎么设计\n\n如果我是一个深切理解 ADHD 的产品经理，我不会先问：“用户会不会过度依赖？”\n\n我会先问：“用户最想扔掉哪种痛？”\n\n然后把产品拆成四层。\n\n第一层，接痛点。不要让用户输入完整需求，让用户只输入一句痛感：我开始不了；我不知道先做哪个；我忘了我答应过什么；我不敢回这条消息；我又烂尾了。\n\n第二层，转接口。系统把痛感翻译成执行接口：启动、排序、记忆、时间、沟通、反馈、收尾、复盘。用户不需要懂这些概念，但系统要懂。\n\n第三层，给托管动作。不是输出宏大计划，而是直接接走一个动作：发一条消息、列三个选项、生成第一句、提醒下一次、整理未完成项、把废稿变成可发布片段。\n\n第四层，留验收口。用户只需要回答一个最小问题：这能不能发？这是不是下一步？这有没有进入现实？如果不能，一键重启，而不是重新解释整件事。\n\n这才叫 Agentic AI。\n\n不是更会聊天的工具，而是一个帮 ADHD 用户把痛苦从身体里转移到系统里的外部执行层。\n\n## 05 今天就能做的最小动作：痛点外包协议\n\n不要再做复杂计划。\n\n打开 AI，只写这一句：\n\n“我现在最想扔掉的痛点是：______。请你不要给我大道理，只输出三栏：你能替我接走什么、我只需要验收什么、如果失败我怎么一键重启。”\n\n然后填一个词就够了。\n\n启动。排序。记忆。催办。沟通。收尾。复盘。关系后果。空白页。烂尾。选择过载。\n\n你会得到一张很小的表：\n\n| 我想扔掉的痛 | Agent 接走什么 | 我只验收什么 | 失败后一键重启 |\n|---|---|---|---|\n| 启动 | 把任务压成第一句/第一步/三分钟版本 | 我能不能立刻做 | “太大了，压到更小” |\n| 排序 | 把十个方向压成三个，并给放弃理由 | 我愿不愿意先做第一个 | “按能量最低重排” |\n| 记忆 | 列出承诺、截止、下一次接线点 | 有没有漏掉关键人和时间 | “按时间线重建” |\n| 沟通 | 起草一条能发出去的解释/请求/推进 | 我敢不敢发 | “更短、更诚实、更低姿态” |\n| 收尾 | 把半成品改成可交付的最低版本 | 能不能进入现实反馈 | “只保留必须交付项” |\n| 复盘 | 从失败里提取一个下次可复用规则 | 下次是否更容易重启 | “不要总结人格，只总结接口” |\n\n这张表的重点不是让你更自律。\n\n它的重点是：终于不用把所有痛都留在身体里。\n\n## 06 结尾：不是把自己交出去，而是把痛苦交出去\n\nADHD × Agentic AI 最有力量的命题，不是“AI 会不会替代我”。\n\n这个问题太大，也太抽象。\n\n更真实的问题是：我能不能把那些每天反复折磨我的执行痛点，交给一个足够可靠的外部系统？\n\n我能不能不用每次都亲自启动？\n\n不用每次都亲自排序？\n\n不用每次都亲自记住所有上下文？\n\n不用每次都亲自从羞耻里爬出来？\n\n不用每次都把半成品、烂尾、关系债和时间洞重新背回自己身上？\n\n所以，这篇文章最后要把“委托”这个词改回来。\n\n委托不是软弱。\n\n委托也不是放弃主体性。\n\n对 ADHD 来说，委托可能是一种终于诚实的产品设计：承认有些痛不应该继续靠意志力硬扛，承认外部系统应该接住更多，承认真正的边界不是“少委托一点”，而是“委托得更可信、更可验收、更能失败恢复”。\n\n我不是害怕把事情交给 Agent。\n\n我是害怕它接不住我全部想扔掉的痛。\n\n## 发布接口\n\n公众号版用这一版作为主稿，保留严肃随笔语气。小红书版截取第一屏和《痛点外包协议》。知乎版重点回答：ADHD 为什么不是不敢委托，而是需要可信的外部执行系统。短视频版抓一句话：我不是害怕把事情交给 Agent，我是害怕它接不住我全部想扔掉的痛。评论区唯一问题：你现在最想让 AI/Agent 替你接走的，是启动、排序、记忆、催办、沟通、收尾，还是复盘？\n", "chars": 4336, "path": "content-packs/问题353/01_正文.md"}, {"id": "问题098", "number": 98, "title": "问题098：为什么一人公司 OPC 的第一步不是注册公司，而是跑通最小商业闭环", "priority": "B", "category": "money", "rank": 4, "grade": "S", "desire": 9, "thought": 9, "action": 9, "total": 27, "authenticity": 9, "risk": "低", "failure": "recalibrated_from_high_to_low", "desire_text": "不想再把一人公司停留在身份想象里，而是想让自己的痛点洞察尽快变成回声、需求和第一笔现金流。", "thought_text": "把“先注册公司才算开始”改写成“公司只是容器，最小商业闭环才是生命体”。", "action_text": "用 AI/Agent 今天生成一个具体问题、一段发布文案、一个最小交付结果、一个反馈/报价入口，先让世界回你一句话。", "real_desire": "ADHD 一人公司不是想先获得公司身份，而是想确认自己的高波动洞察能不能被真实世界回应、需要和付费。", "outsourcing_angle": "AI/Agent 接走把念头压成问题、发布文案、最小交付和反馈/报价入口的准备摩擦，让用户不注册也能先跑第一圈闭环。", "verification_signal": "评论区读者能说出自己正在用注册公司、Logo、官网、产品矩阵替代真实反馈，并索要最小商业闭环启动表。", "comment": "money 题要防止创业者视角过强，落到省痛、回声、闭环、付费信号；已完成真实欲望校准", "article": "# 问题098：为什么一人公司 OPC 的第一步不是注册公司，而是跑通最小商业闭环\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想先把自己包装成一家看起来完整的公司，而是想尽快证明：我这个高波动、高敏感、高跳跃的大脑，真的能把一个具体痛点交付出去，收到回声，收到需求，甚至收到第一笔钱。\n\n**所思：** 把“我要先注册公司、搭品牌、做官网、设计产品矩阵，才算开始创业”改写成“公司只是容器，最小商业闭环才是生命体”。一人公司 OPC 的第一步不是获得法律外壳，而是让一个真实的人因为一个真实问题，愿意继续聊、愿意试用、愿意付款。\n\n**所行：** 今天不用先注册公司。先用 AI/Agent 把一个你最能解决的痛点压成四件东西：一个具体问题、一段发布文案、一个最小交付结果、一个收反馈/报价入口。先让世界回你一句话。\n\n## 点火开场：发布版第一屏\n\n很多人一想到一人公司 OPC，第一反应是：\n\n我要不要先注册公司？\n\n要不要先取名？\n\n要不要先做 Logo？\n\n要不要先搭官网？\n\n要不要先设计产品矩阵、价格体系、自动化交付、SOP、合同、收款账户？\n\n这些问题都很像创业。\n\n但对 ADHD 来说，它们也很可能是一种高级拖延。\n\n因为你看起来在创业，其实还没有让任何一个真实的人因为一个真实问题向你靠近一步。\n\n你还没有跑通最小商业闭环。\n\n你只是提前替一个还没有被市场验证的东西，搭了一个很体面的壳。\n\n真正危险的不是你不会注册公司。\n\n真正危险的是：你太会准备，以至于一直绕开现实。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 不想再把“一人公司”停留在身份想象里，而是想让自己的痛点洞察尽快变成回声、需求和第一笔现金流。 | 开场直接拆掉注册公司、Logo、官网、产品矩阵这些体面准备行为，把欲望拉回“我想确认世界会不会回我”。 | 9 | 命中 ADHD 做事前先搭壳、先准备、先系统化的真实冲动，也点出更底层的现金流欲望。 |\n| 所思 | 把“先注册公司才算开始”改写成“公司只是容器，最小商业闭环才是生命体”。 | 全文反复强调先有人、先问题、先回声、先最小结果，再谈公司、产品和规模化。 | 9 | 解释反转清楚，能把创业准备焦虑改成闭环验证顺序。 |\n| 所行 | 不注册也能开始：用 AI/Agent 今天生成一个问题、一个发布文案、一个最小交付、一个反馈/报价入口。 | 结尾给出“最小商业闭环启动表”，能在 15 分钟内落地。 | 9 | 行动摩擦低，不依赖公司注册、官网、产品页，能立刻进入真实反馈。 |\n| 电流总分 | 真实欲望校准后，以“先跑闭环、后搭公司”为核心。 | 题目级触动从泛现金流升级为 OPC/一人公司第一步顺序。 | 27 | 所欲、所思、所行都从题目本身长出来，适合并回主包。 |\n\n01\n\n很多 ADHD 在接近变现的时候，会突然变得特别“成熟”。\n\n开始研究注册公司，研究主体类型，研究 OPC，研究个体户，研究税务，研究品牌，研究定位，研究商业模式，研究产品矩阵，研究自动化交付，研究价格体系，研究合同模板，研究收款方式，研究官网和名片。\n\n表面上看，这很专业。\n\n实际上，很多时候你是在最关键的一步前拐弯了。\n\n你没有先去让世界回你一句话。\n\n你先去搭一个公司外壳。\n\n这对 ADHD 是个高危陷阱。\n\n因为注册公司、设计品牌、搭建系统，看起来比直接发布、直接报价、直接承接一个真实需求更体面。\n\n它们也比问一句“你愿不愿意为这个结果付钱”安全得多。\n\n可问题是，公司注册完，不等于商业开始了。\n\nLogo 做完，不等于有人需要你。\n\n官网上线，不等于现金流开始。\n\n产品矩阵写满 Notion，也不等于你已经进入市场。\n\n一人公司 OPC 最容易做错的第一步，就是先把“公司”当成开始。\n\n但真正的开始，是最小商业闭环。\n\n有人看见。\n\n有人回应。\n\n有人继续聊。\n\n有人说：这个能不能帮我也处理一下。\n\n有人愿意为一个很小、很具体、很粗糙但真实有用的结果付钱。\n\n这才是生命体。\n\n公司只是容器。\n\n02\n\n为什么 ADHD 特别容易把第一步做错？\n\n因为“注册公司”很清楚。\n\n它有流程，有材料，有名字，有步骤，有完成感。\n\n你今天提交了什么，明天办到了什么，都能看见。\n\n但“跑通商业闭环”很不清楚。\n\n它要面对人。\n\n要承受没人理你。\n\n要承受别人问价。\n\n要承受自己说不清。\n\n要承受第一个版本很丑。\n\n要承受你交付了一次之后发现：原来对方真正要的不是你脑内那个宏大产品，而是一个特别小、特别具体、特别不优雅的结果。\n\nADHD 最怕的不是复杂。\n\n复杂反而会让你兴奋。\n\n你可以连续三天设计一个系统，连续十小时研究公司类型，连续二十页写商业模式，连续搭出一个漂亮的自动化流程。\n\n真正让你卡住的，是现实接触。\n\n发布出去。\n\n问一句。\n\n报一个价。\n\n接一个单。\n\n交一个很小的结果。\n\n听一个真实的人说：这里我没懂、这里我不需要、这里你能不能直接帮我做。\n\n这才是创业里最让 ADHD 心跳加速的地方。\n\n所以我们会本能地往“准备”里躲。\n\n准备越专业，越像不是拖延。\n\n但很多时候，它就是拖延穿上了公司化外套。\n\n03\n\n一人公司 OPC 不是不能注册。\n\n当然可以注册。\n\n到了一定阶段，你需要主体、账户、合同、税务、发票、合规、品牌承接。\n\n这些都重要。\n\n但它们不应该成为第一步。\n\n因为第一步要验证的不是“我能不能拥有一家公司”。\n\n第一步要验证的是：\n\n我能不能解决一个足够痛的问题？\n\n这个问题有没有人承认？\n\n对方愿不愿意继续聊？\n\n我能不能先手工交付一个最低可用结果？\n\n对方拿到结果以后，会不会说“有用”“再来一次”“能不能帮我做下一步”？\n\n这五个问题没有答案之前，注册公司只是把不确定性变得更正式。\n\n你会从“一个人在犹豫”变成“一家公司在犹豫”。\n\n但商业没有因此变真实。\n\n04\n\n现金流不是从公司成立那一刻开始的。\n\n它通常从外部反馈开始。\n\n从一句“这就是我”开始。\n\n从一句“你这个怎么卖”开始。\n\n从一句“能不能先帮我处理这个具体问题”开始。\n\n从一句“如果你能帮我省掉这一步，我愿意付钱”开始。\n\n先有回声，后有产品。\n\n先有问题，后有包装。\n\n先有手工交付，后有自动化。\n\n先有重复需求，后有 SOP。\n\n先有闭环，后有公司。\n\n不是反过来。\n\n这句话对 ADHD 尤其重要。\n\n因为 ADHD 的能量经常不是稳定燃烧，而是被现实反馈点燃。\n\n一个真实的人在等你，一个具体问题要你处理，一个明确结果要交付，一个付款动作已经发生，这些东西会直接把你的执行系统接到现实上。\n\n很多时候，你不是没有行动力。\n\n你只是对“纯内部任务”没有持续供能。\n\n注册公司、搭官网、写商业计划、设计产品矩阵，都是内部任务。\n\n它们可以消耗你很多能量，却不一定给你现实牵引。\n\n但一个真实反馈会。\n\n一个真实订单会。\n\n一个真实交付会。\n\n05\n\n所以，一人公司 OPC 的正确第一步，不是问“我要不要注册”。\n\n而是问：\n\n我今天能不能跑一个最小商业闭环？\n\n这个闭环很小。\n\n小到甚至不像创业。\n\n它可能只是发一条内容，问一个问题，收三条评论，私信一个人，提供一次 30 分钟梳理，交付一份简陋但有用的文档。\n\n它可能只是：\n\n我看到你卡在这里。\n\n我可以先帮你把这一步拆出来。\n\n你愿意试一下吗？\n\n如果有用，我再把它做成模板或服务。\n\n这比注册公司粗糙。\n\n但它更接近商业。\n\n因为商业不是从“我准备好了”开始的。\n\n商业从“别人愿意回应”开始。\n\n06\n\n怎么跑这个最小商业闭环？\n\n不用复杂。\n\n先做五步。\n\n**第一步：选一个你真的懂的痛点。**\n\n不要说“我想做一个帮助 ADHD 的系统”。\n\n太大了。\n\n换成：我先帮高波动创作者把一个半成品变成可发布正文；我先帮一个想做一人公司的知识工作者，把服务入口压成一页纸；我先帮一个一直准备创业的人，找到今天能测试的最小报价。\n\n问题越具体，反馈越容易回来。\n\n**第二步：把结果压到最小。**\n\n不要一上来卖完整产品。\n\n先卖一个最小结果。\n\n一次梳理。\n\n一份诊断。\n\n一套开场文案。\n\n一个报价页。\n\n一个 SOP 草稿。\n\n一个 AI Agent 提示词。\n\n一轮陪跑。\n\n一份“你现在第一步不要做什么”的判断。\n\n最小结果不是低价值。\n\n最小结果是让市场最快碰到你。\n\n**第三步：用内容开门，而不是用公司外壳开门。**\n\n写一条内容，把具体痛点说出来。\n\n不要写“我成立了一家公司”。\n\n写“很多人做一人公司第一步就错了，不是先注册，而是先跑通一个最小商业闭环”。\n\n然后在结尾放一个现实动作：评论“闭环”，我发你一张最小商业闭环启动表；或者私信我你的想法，我帮你判断第一步该不该注册。\n\n你不是在等自然变现。\n\n你是在给反馈安门。\n\n**第四步：把第一次报价当研究。**\n\n第一次报价不是终局。\n\n不是为了证明你贵不贵。\n\n它是研究。\n\n谁会问？\n\n谁会犹豫？\n\n谁觉得太贵？\n\n谁觉得太便宜？\n\n谁说“如果是这个版本我愿意”？\n\n谁根本不在乎你准备好的完整产品，只想让你今天帮他省掉一个步骤？\n\n这些信息本身就值钱。\n\n**第五步：只在重复反馈后产品化。**\n\n当同一类问题反复出现，同一类人反复追问，同一类交付反复有效，你再把它压成模板、SOP、Agent、服务包、课程、社群。\n\n产品化应该跟在回流后面。\n\n不应该冲在回流前面。\n\n07\n\n这里 AI/Agent 的作用非常关键。\n\n它不是让你更快地伪装成一家公司。\n\n它是帮你更快跑完最小闭环。\n\n你可以把一个念头丢给 AI，让它立刻生成四件东西：\n\n一个具体问题。\n\n一段发布文案。\n\n一个最小交付结果。\n\n一个反馈/报价入口。\n\n你不用先想清楚完整商业模式。\n\n你先让 AI 把你脑内那团东西，压成一个今天能被别人看见、回应、试用、付款的小动作。\n\n这才是 AI 对 ADHD 一人公司的真正意义。\n\n不是帮你做更漂亮的准备。\n\n是帮你更快接触现实。\n\n不是帮你把公司外壳搭得更完整。\n\n是帮你把第一圈商业反馈跑起来。\n\n08\n\n可以直接用这张表。\n\n| 最小商业闭环启动表 | 今天先写 |\n|---|---|\n| 我能解决的一个具体痛点 | 不是领域，不是赛道，是一个人今天卡住的一步 |\n| 谁最可能有这个痛 | 写出一种具体人，不写“所有人” |\n| 我能先交付的最小结果 | 一页纸、一次梳理、一段文案、一个模板、一轮判断 |\n| 我怎么让对方看见 | 一条内容、一条朋友圈、一篇文章、一次私信、一个评论区问题 |\n| 我怎么收反馈 | 评论关键词、私信、表单、预约、直接问“这个你会用吗” |\n| 我怎么测试付费 | 一个小报价、一次试做、一个限量名额、一个定制版本 |\n| 什么时候再注册/产品化 | 出现重复需求、重复交付、重复付款或明确合规需要之后 |\n\n这张表填完，比你研究三天 OPC 更接近开始。\n\n不是因为注册公司不重要。\n\n而是因为你现在最缺的可能不是主体。\n\n你最缺的是回声。\n\n09\n\n回到你自己。\n\n你当然可以注册公司。\n\n你当然可以做 OPC。\n\n你也当然可以在未来把服务、模板、Agent、内容资产、交付系统全部产品化。\n\n但不要把这些当成第一步。\n\n第一步不是给自己一个公司身份。\n\n第一步是让一个真实问题进入真实关系。\n\n世界会不会回你？\n\n有人会不会问？\n\n有人会不会继续聊？\n\n有人会不会愿意先为一个小结果付钱？\n\n这些东西一出现，商业就已经开始了。\n\n哪怕你还没有公司。\n\n哪怕产品还很丑。\n\n哪怕交付还很手工。\n\n哪怕规模化还很远。\n\n先让世界回你一句话。\n\n再谈注册。\n\n再谈产品。\n\n再谈流程。\n\n再谈规模化。\n\n顺序对了，一人公司才不是一个身份幻想。\n\n它会变成一台真的开始回血的系统。\n", "chars": 4964, "path": "content-packs/问题098/01_正文.md"}, {"id": "问题400", "number": 400, "title": "问题400：为什么 130 亿美元的神经多样性产业，没有换来更多神经多样性员工", "priority": "S", "category": "org", "rank": 5, "grade": "S", "desire": 8, "thought": 9, "action": 9, "total": 26, "authenticity": 8, "risk": "低", "failure": "类型模板", "desire_text": "不再把自己伪装成稳定、线性、随叫随到的人，而是想要岗位、会议、招聘和反馈系统真的改接口。", "thought_text": "把“不适合组织”改写成“不适合隐性优先级、即时表达、稳定外壳这套默认组织接口”。", "action_text": "选一个最耗能工作环节，让 AI 写成四句接口说明：输入、输出、确认节奏、反馈格式。", "real_desire": "", "outsourcing_angle": "", "verification_signal": "", "comment": "组织题要从组织咨询语落到个体真实痛点和接口显性化", "article": "# 问题400：为什么 130 亿美元的神经多样性产业，没有换来更多神经多样性员工\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想被夸“很有创造力”，而是想在会议、岗位、招聘和反馈系统里，不必先把自己伪装成稳定、线性、随叫随到的人。\n\n**所思：** 原来我不是天然不适合组织，我可能只是不适合一套只奖励即时表达、隐性优先级和稳定外壳的组织接口。AI 的意义不是让我更会伪装，而是逼组织把规则说清楚。\n\n**所行：** 选一个最耗你的工作环节，让 AI 写成四句话：任务输入是什么、期望输出是什么、多久确认一次、反馈用什么格式。然后把它当作一次沟通模板。\n\n## 点火开场：发布版第一屏\n\n你最累的可能不是工作本身，而是每天把自己翻译成一个组织更容易接受的版本：开会要像没走神，汇报要像一直在线，优先级不清也要装作懂了。\n\n所以《为什么 130 亿美元的神经多样性产业，没有换来更多神经多样性员工》这篇不能先讲概念。它要先让读者在第三段前停住：这不就是我吗？我不是没有能力，我是一直在用不适配自己的接口硬扛。\n\n真正的 S 级，不是观点锋利，而是三件事同时发生：读者想要一种新的活法，读者重新解释自己的卡点，读者马上做一个小动作。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 不再把自己伪装成稳定、线性、随叫随到的人，而是想要岗位、会议、招聘和反馈系统真的改接口。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 9 | S级优先级带来更强发布势能；已发布前精修；已有证据增强 |\n| 所思 | 把“不适合组织”改写成“不适合隐性优先级、即时表达、稳定外壳这套默认组织接口”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 9 | S级优先级带来更强发布势能；已发布前精修；已有证据增强 |\n| 所行 | 选一个最耗能工作环节，让 AI 写成四句接口说明：输入、输出、确认节奏、反馈格式。 | 结尾必须给一个 3-15 分钟内可执行的 AI/备忘录/微信动作。 | 9 | S级优先级带来更强发布势能；已发布前精修；已有证据增强 |\n| 电流总分 | 先列触动内容，再综合打分。 | 能否把个人痛感推到组织接口、招聘流程、管理节奏和结构承诺。 | 27 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n这不是一篇“再解释一次 ADHD”的文章，而是一篇门面文章：它要替整个《问题XXX》系列证明，ADHD × AI 不是流量标签，而是一套关于执行功能、外部前额叶和现实回流的工作系统。\n\n为什么 130 亿美元的神经多样性产业，没有换来更多神经多样性员工。这个题的核心不是“ADHD 很痛，AI 很有用”这种容易写烂的判断，而是：神经多样性产业变大，不等于神经多样性员工处境变好。如果这句话讲不清，后面所有平台版、口播版、评论问题和模板入口都会变成包装；如果讲清了，这篇文章就能成为一个真正的闭环资产。\n\n## 01 开场：先从一个不舒服的场景进入\n\n想象一个很具体的画面：你打开 AI，输入需求，几秒钟后它给你一份结构清楚、语气稳定、看起来比你本人更像“正常职场人”的答案。你应该高兴，因为它确实帮你省掉了很多步骤；但你心里又会冒出一个更暗的念头：如果它这么快就能把我翻译好，那我这些年到底算什么？\n\n这个问题的刺就在这里。AI 并没有简单地帮助 ADHD，它也重新定义了 ADHD 的痛感。过去你卡住，是因为启动难、排序难、时间感差、工作记忆漏水；现在工具可以接走很多中间步骤，于是新的问题出现了：工具接走以后，你的主体性、判断力、风险感和真实风格还剩多少？\n\n所以这篇不能写成工具赞歌。它必须承认 AI 的帮助，也必须追问帮助的代价。它不能让读者只获得“我被理解了”的安慰，而要让读者意识到：自己真正需要设计的不是一个更会输出的工具，而是一个不会吞掉判断权的外部执行系统。\n\n## 02 核心判断：问题不在能力，而在接口\n\nADHD 最容易被误解成能力问题。拖延被看成懒，分心被看成不认真，情绪波动被看成不成熟，计划失效被看成不负责任。但在很多真实场景里，当事人并不是不知道目标，也不是没有能力，而是缺少一条从目标到动作的稳定通道。\n\n这条通道，我更愿意叫它“执行接口”。它包括启动接口、排序接口、时间接口、工作记忆接口、情绪接口、反馈接口和委托接口。普通人可能也会卡，但 ADHD 用户会更早、更频繁、更痛地感到这些接口失灵。\n\nAI 的价值，正是在这里出现的。它可以把抽象目标切成步骤，把脑内混乱压成结构，把空白页面变成可修改草稿，把一团焦虑翻译成一个五分钟动作。它不是把你治好，而是暂时补上某个接口。\n\n但这也解释了为什么 AI 有时会让人更痛苦。因为一旦工具补上了接口，社会就更容易说：你看，工具都有了，你怎么还不行？于是原本属于环境、系统和执行功能的摩擦，又被重新塞回个人道德里。\n\n## 03 这个题的真正锋口：产业断裂\n\n产业断裂 不是一个装饰性概念，而是这篇文章必须守住的锋口。它要求我们不要在“AI 能帮忙”这个浅层判断上停下，而要继续问：它帮的是哪一段？它有没有制造新的依赖？它有没有把高方差风格洗成神经典型风格？它有没有把现实反馈变得更清楚，还是只让半成品变多？\n\n对 ADHD 用户来说，最危险的不是工具不好用，而是工具太顺。太顺的工具会让人误以为自己已经完成了现实动作：生成了计划，就像开始了；写出了草稿，就像发布了；整理了知识库，就像做出了判断；让 Agent 跑了一轮，就像自己已经承担了风险。\n\n但现实不是这样运转的。现实只承认动作、交付、对话、反馈和后果。一个 AI 工作流如果不能把人送到这些东西面前，它再漂亮也只是新的缓冲区。\n\n所以这篇文章的锋口要落在一句话上：AI 可以接走摩擦，但不能替你承担判断；Agent 可以执行动作，但不能替你承担赌注；工具可以翻译你，但不能替你活。\n\n## 04 三个校准：防止写成营销号\n\n第一，不能把 ADHD 写成天才徽章。高方差确实可能带来发散、联想、敏感和异常问题感，但这些能力只有在合适接口里才会变成产出。没有接口，高方差只是高损耗。\n\n第二，不能把 AI 写成治疗方案。AI 可以帮助某些任务场景里的执行功能外部化，但它不能替代诊断、治疗、药物、睡眠、稳定关系和真实工作条件。把 AI 写成万能药，最后只会制造新的羞耻。\n\n第三，不能把内容写成纯共鸣。共鸣是入口，不是终点。读者说“太真实了”只能说明文章击中了痛点；读者能说出“我卡在启动接口，我需要一个五分钟动作”，才说明文章完成了转译。\n\n这三个校准决定了《问题XXX》系列和普通 ADHD 内容的区别：它不是贩卖身份，不是贩卖焦虑，也不是贩卖工具，而是在搭一套能把痛感转成动作、动作转成反馈、反馈转成资产的系统。\n\n## 05 可执行判断：一篇文章必须留下一个动作\n\n这篇文章最终要留下的动作，是一张《产业断裂审计表》。它不需要复杂，甚至越简单越好。表格只问四件事：我现在卡在哪里；这是哪个执行接口断了；AI 可以接走哪一个最小动作；48 小时内用什么现实信号验证它。\n\n| 当前卡点 | 执行接口 | AI/Agent 最小动作 | 48 小时现实信号 |\n|---|---|---|---|\n| 我一直想但没开始 | 启动接口 | 拆成一个五分钟动作 | 是否真的打开并完成第一步 |\n| 我同时有太多方向 | 排序接口 | 压成三个选项并给取舍理由 | 是否能放弃两个方向 |\n| 我生成了很多内容 | 反馈接口 | 设计一次发布、询问或交付 | 是否收到真实回应 |\n| 我怕工具替代自己 | 委托接口 | 标出哪些可委托、哪些必须自己判断 | 是否保留最终决策 |\n\n这个表的价值，不在于它多漂亮，而在于它把模糊自责改成了可处理的问题。ADHD 用户不需要再问“为什么我又这样”，而是可以问“我现在哪个接口断了”。这就是从情绪叙事进入产品化叙事的分界线。\n\n## 06 结尾：真正的目标不是更正常，而是更可回流\n\nAI 最容易给人的幻觉，是让一切看起来更顺了。文本更顺，计划更顺，表达更顺，简历更顺，汇报更顺。但顺不等于真，顺也不等于完成。对 ADHD 用户来说，真正重要的是：这套系统有没有让现实更快回话？有没有让你更少在脑内空转？有没有让你保留自己的判断，而不是把自己交给模板？\n\n所以这篇文章最后要把读者带到一个更冷静的位置：不要问 AI 有没有让你变正常，要问它有没有让你更能进入现实。不要问自己是不是终于被修好了，要问哪个接口被外部化了，哪个接口还需要人工守住。\n\n这才是 ADHD × AI 的真正命题。不是治愈，不是神化，不是炫耀效率，而是在一个注意力被系统性采掘的时代，为高方差大脑重新设计进入现实的通道。\n\n## 08 证据增强：产业变大不等于接口变好\n\n这篇文章的锋口要再往前推一步：神经多样性产业的规模扩张，本身不等于神经多样性员工处境改善。微软的神经多样性招聘项目之所以值得拿来做案例，不是因为它给了一个温暖故事，而是因为它把问题从“候选人要不要更会表现”改成了“招聘和工作流程是否需要重新设计”。\n\n这正是产业断裂所在。一个市场可以卖很多课程、测评、培训、工具、认证和咨询，但如果招聘仍然奖励即时社交表现，绩效仍然依赖隐性优先级，会议仍然消耗工作记忆，晋升仍然惩罚非线性表达，那么产业越热闹，员工越可能只得到更多解释词，而不是更可工作的环境。\n\nAI/Agent 在这里不是一个新包装，而是一次压力测试。它可以让任务拆解、会议摘要、跟进提醒、上下文检索、反馈回流和风格翻译变得更低成本。问题是：组织会把这些能力当成个人自救工具，还是当成工作系统的公共接口？前者会继续要求神经多样性员工自己补洞；后者才可能改变组织对执行功能的默认假设。\n\n所以《产业断裂审计表》要问的不是“这个行业有多大”，而是“钱花在了哪一层接口”：花在标签传播，还是花在招聘流程重写；花在意识培训，还是花在管理节奏改变；花在个人效率工具，还是花在团队可见化工作流；花在短期项目，还是花在真实留任、晋升和反馈数据。只有这些问题被回答，130 亿美元才不是一个漂亮数字，而是可以被追责的系统账本。\n\n## 发布接口\n\n公众号版用这一版作为主稿，保留严肃随笔语气。小红书版只截取开场场景和《产业断裂审计表》。知乎版重点回答概念边界：AI 不是治疗，而是外部化脚手架。短视", "chars": 4380, "path": "content-packs/问题400/01_正文.md"}, {"id": "问题392", "number": 392, "title": "问题392：当 ADHD 成为流行标签，真正患病的人反而更难被看见", "priority": "A", "category": "diagnosis", "rank": 6, "grade": "A", "desire": 8, "thought": 9, "action": 8, "total": 25, "authenticity": 9, "risk": "低", "failure": "类型模板、诊断模板", "desire_text": "被认真区分和支持：不是被一句“你可能是 ADHD”安慰，而是把长期痛感、功能损害、专业评估和现实照护接成一条路。", "thought_text": "把“我是不是有问题”改写成“症状、场景、样本偏差、诊断边界和支持系统之间哪一环断了”。", "action_text": "把最近一次失控场景写成四栏：发生了什么、损害了什么、持续多久、下一步该问医生/专业人士/AI 什么。", "real_desire": "", "outsourcing_angle": "", "verification_signal": "", "comment": "基础评分已生成；建议发布前人工复核题目级痛点。", "article": "# 问题392：当 ADHD 成为流行标签，真正患病的人反而更难被看见\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想给自己贴一个更响的标签，而是想终于有人把你这些年“明明聪明却总在简单处崩掉”的经历，当成一个需要被认真处理的问题。\n\n**所思：** 原来我需要的不是一次身份确认，而是一条从痛感、症状、场景、专业评估到日常支持的路径。标签只是入口，接口才是出口。\n\n**所行：** 打开备忘录，写下最近一次“我明明想做却启动不了”的具体场景，再让 AI 帮你分成四栏：发生了什么、损害了什么、我怀疑什么、下一步该问谁。\n\n## 点火开场：发布版第一屏\n\n你可能并不是真的想问“我是不是 ADHD”。你更想问的是：为什么我能把一个复杂问题想得很透，却会在回一条微信、打开一个文档、预约一次检查这种小事上反复失败。\n\n所以《当 ADHD 成为流行标签，真正患病的人反而更难被看见》这篇不能先讲概念。它要先让读者在第三段前停住：这不就是我吗？我不是没有能力，我是一直在用不适配自己的接口硬扛。\n\n真正的 S 级，不是观点锋利，而是三件事同时发生：读者想要一种新的活法，读者重新解释自己的卡点，读者马上做一个小动作。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 被认真区分和支持：不是被一句“你可能是 ADHD”安慰，而是把长期痛感、功能损害、专业评估和现实照护接成一条路。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 8 | A级优先级，有明确发布潜力；已发布前精修；已有证据增强 |\n| 所思 | 把“我是不是有问题”改写成“症状、场景、样本偏差、诊断边界和支持系统之间哪一环断了”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 9 | A级优先级，有明确发布潜力；已发布前精修；已有证据增强 |\n| 所行 | 把最近一次失控场景写成四栏：发生了什么、损害了什么、持续多久、下一步该问医生/专业人士/AI 什么。 | 结尾必须给一个 3-15 分钟内可执行的 AI/备忘录/微信动作。 | 8 | A级优先级，有明确发布潜力；已发布前精修；已有证据增强 |\n| 电流总分 | 先列触动内容，再综合打分。 | 诊断边界、误诊漏诊、AI 模型偏差或医疗支持缺口越具体，分数越高。 | 25 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n这是一篇第二梯队的关键文章：它不一定负责最响的标题，但负责把一个容易被误读的概念校准到可发布、可讨论、可回流的精度。\n\n当 ADHD 成为流行标签，真正患病的人反而更难被看见。这个题的核心不是“ADHD 很痛，AI 很有用”这种容易写烂的判断，而是：流行标签同时带来入口和噪音，误诊与漏诊是一对结构问题。如果这句话讲不清，后面所有平台版、口播版、评论问题和模板入口都会变成包装；如果讲清了，这篇文章就能成为一个真正的闭环资产。\n\n## 01 开场：先从一个不舒服的场景进入\n\n想象一个很具体的画面：你打开 AI，输入需求，几秒钟后它给你一份结构清楚、语气稳定、看起来比你本人更像“正常职场人”的答案。你应该高兴，因为它确实帮你省掉了很多步骤；但你心里又会冒出一个更暗的念头：如果它这么快就能把我翻译好，那我这些年到底算什么？\n\n这个问题的刺就在这里。AI 并没有简单地帮助 ADHD，它也重新定义了 ADHD 的痛感。过去你卡住，是因为启动难、排序难、时间感差、工作记忆漏水；现在工具可以接走很多中间步骤，于是新的问题出现了：工具接走以后，你的主体性、判断力、风险感和真实风格还剩多少？\n\n所以这篇不能写成工具赞歌。它必须承认 AI 的帮助，也必须追问帮助的代价。它不能让读者只获得“我被理解了”的安慰，而要让读者意识到：自己真正需要设计的不是一个更会输出的工具，而是一个不会吞掉判断权的外部执行系统。\n\n## 02 核心判断：问题不在能力，而在接口\n\nADHD 最容易被误解成能力问题。拖延被看成懒，分心被看成不认真，情绪波动被看成不成熟，计划失效被看成不负责任。但在很多真实场景里，当事人并不是不知道目标，也不是没有能力，而是缺少一条从目标到动作的稳定通道。\n\n这条通道，我更愿意叫它“执行接口”。它包括启动接口、排序接口、时间接口、工作记忆接口、情绪接口、反馈接口和委托接口。普通人可能也会卡，但 ADHD 用户会更早、更频繁、更痛地感到这些接口失灵。\n\nAI 的价值，正是在这里出现的。它可以把抽象目标切成步骤，把脑内混乱压成结构，把空白页面变成可修改草稿，把一团焦虑翻译成一个五分钟动作。它不是把你治好，而是暂时补上某个接口。\n\n但这也解释了为什么 AI 有时会让人更痛苦。因为一旦工具补上了接口，社会就更容易说：你看，工具都有了，你怎么还不行？于是原本属于环境、系统和执行功能的摩擦，又被重新塞回个人道德里。\n\n## 03 这个题的真正锋口：标签误诊漏诊\n\n标签误诊漏诊 不是一个装饰性概念，而是这篇文章必须守住的锋口。它要求我们不要在“AI 能帮忙”这个浅层判断上停下，而要继续问：它帮的是哪一段？它有没有制造新的依赖？它有没有把高方差风格洗成神经典型风格？它有没有把现实反馈变得更清楚，还是只让半成品变多？\n\n对 ADHD 用户来说，最危险的不是工具不好用，而是工具太顺。太顺的工具会让人误以为自己已经完成了现实动作：生成了计划，就像开始了；写出了草稿，就像发布了；整理了知识库，就像做出了判断；让 Agent 跑了一轮，就像自己已经承担了风险。\n\n但现实不是这样运转的。现实只承认动作、交付、对话、反馈和后果。一个 AI 工作流如果不能把人送到这些东西面前，它再漂亮也只是新的缓冲区。\n\n所以这篇文章的锋口要落在一句话上：AI 可以接走摩擦，但不能替你承担判断；Agent 可以执行动作，但不能替你承担赌注；工具可以翻译你，但不能替你活。\n\n## 04 三个校准：防止写成营销号\n\n第一，不能把 ADHD 写成天才徽章。高方差确实可能带来发散、联想、敏感和异常问题感，但这些能力只有在合适接口里才会变成产出。没有接口，高方差只是高损耗。\n\n第二，不能把 AI 写成治疗方案。AI 可以帮助某些任务场景里的执行功能外部化，但它不能替代诊断、治疗、药物、睡眠、稳定关系和真实工作条件。把 AI 写成万能药，最后只会制造新的羞耻。\n\n第三，不能把内容写成纯共鸣。共鸣是入口，不是终点。读者说“太真实了”只能说明文章击中了痛点；读者能说出“我卡在启动接口，我需要一个五分钟动作”，才说明文章完成了转译。\n\n这三个校准决定了《问题XXX》系列和普通 ADHD 内容的区别：它不是贩卖身份，不是贩卖焦虑，也不是贩卖工具，而是在搭一套能把痛感转成动作、动作转成反馈、反馈转成资产的系统。\n\n## 05 可执行判断：一篇文章必须留下一个动作\n\n这篇文章最终要留下的动作，是一张《误诊漏诊边界清单》。它不需要复杂，甚至越简单越好。表格只问四件事：我现在卡在哪里；这是哪个执行接口断了；AI 可以接走哪一个最小动作；48 小时内用什么现实信号验证它。\n\n| 当前卡点 | 执行接口 | AI/Agent 最小动作 | 48 小时现实信号 |\n|---|---|---|---|\n| 我一直想但没开始 | 启动接口 | 拆成一个五分钟动作 | 是否真的打开并完成第一步 |\n| 我同时有太多方向 | 排序接口 | 压成三个选项并给取舍理由 | 是否能放弃两个方向 |\n| 我生成了很多内容 | 反馈接口 | 设计一次发布、询问或交付 | 是否收到真实回应 |\n| 我怕工具替代自己 | 委托接口 | 标出哪些可委托、哪些必须自己判断 | 是否保留最终决策 |\n\n这个表的价值，不在于它多漂亮，而在于它把模糊自责改成了可处理的问题。ADHD 用户不需要再问“为什么我又这样”，而是可以问“我现在哪个接口断了”。这就是从情绪叙事进入产品化叙事的分界线。\n\n## 06 结尾：真正的目标不是更正常，而是更可回流\n\nAI 最容易给人的幻觉，是让一切看起来更顺了。文本更顺，计划更顺，表达更顺，简历更顺，汇报更顺。但顺不等于真，顺也不等于完成。对 ADHD 用户来说，真正重要的是：这套系统有没有让现实更快回话？有没有让你更少在脑内空转？有没有让你保留自己的判断，而不是把自己交给模板？\n\n所以这篇文章最后要把读者带到一个更冷静的位置：不要问 AI 有没有让你变正常，要问它有没有让你更能进入现实。不要问自己是不是终于被修好了，要问哪个接口被外部化了，哪个接口还需要人工守住。\n\n这才是 ADHD × AI 的真正命题。不是治愈，不是神化，不是炫耀效率，而是在一个注意力被系统性采掘的时代，为高方差大脑重新设计进入现实的通道。\n\n## 08 证据增强：流行标签最大的风险，是把诊断前后的边界抹平\n\n这篇文章需要把“流行标签”讲得更准。NIMH 对 ADHD 的介绍很克制：它把 ADHD 放在症状、功能损害、诊断评估和治疗支持的框架里，而不是把它处理成一种性格标签。这个边界非常关键。ADHD 不是“我经常拖延”的同义词，也不是“我脑子很快”的荣誉称号；它牵涉的是持续的注意、冲动、活动水平、执行功能和生活功能受损。\n\nCDC 的 ADHD 数据页面进一步提醒我们：关于 ADHD 的诊断、治疗和照护数据，会因为数据来源、年龄层、报告方式和服务系统不同而呈现差异。也就是说，真实世界里既有被过度标签化的人，也有长期没有被看见的人。流行标签的问题，不只是“有人乱说自己 ADHD”，而是噪音变大后，真正需要评估、治疗、支持和工作条件调整的人，反而更难被认真区分。\n\nAI 进入这个场景，会同时放大两件事。它可以帮助用户整理长期经历、生成就医前问题清单、把散乱痛感翻译成可沟通材料；但它也可能让“自我标签确认”变得太容易。一个聊天窗口如果不断回应“你可能是 ADHD”，用户会获得短暂解释感，却未必更接近专业评估和现实支持。\n\n所以《误诊漏诊边界清单》必须加入诊断边界：这是不是持续功能损害，而不只是短期压力；是否跨场景出现，而不只是某个工作环境不适配；是否已经影响学习、工作、关系或生活管理；下一步是否指向专业评估、照护资源和可执行支持。AI 的任务不是替人贴标签，而是帮人把“我是不是”推进到“我需要怎样被评估、怎样被支持、怎样进入现实”。\n\n## 发布接口\n\n公众号版用这一版作为主稿，保留严肃随笔语气。小红书版只截取开场场景和《误诊漏诊边界清单》。知乎版重点回答概念边界：AI 不是治疗，而是外部化脚手架。短视频版抓一句话：工具可以翻译你，但不能替你活。评论区唯一问题：你现在最想让 AI 接住的，是哪个执行接口？\n\n## 07 发布前精修补丁：把锋利度落到第一屏\n\n发布前，这篇文章还需要在第一屏做一次更狠的取舍：不要先解释概念，不要先铺知识背景，也不要先证明作者懂 ADHD。第一屏只做一件事：把读者带进一个他们无法否认的现场。\n\n这个现场可以是：工具已经把文本写得很漂亮，但你仍然没有发布；Agent 已经跑出十个方案，但你反而更难选择；AI 把你翻译得像一个稳定的人，但你突然怀疑自己的原始表达是不是被洗掉了。这个现场一旦成立，后面的理论才有必要出现。\n\n因此，正式发布时建议把开头压成三段。第一段写一个动作现场，第二段写这个现场背后的执行接口，第三段抛出本文判断：当 ADHD 成为流行标签，真正患病的人反而更难被看见 不是一个工具问题，而是一个“谁来接住执行功能、谁来保留判断权、谁来承担现实反馈”的问题。\n\n这也是评论区回流的重点。不要问“你怎么看 AI 和 ADHD”，这个问题太大，读者只会泛泛表达。要问：“你现在最想交给 AI 的，是启动、排序、记忆、时间感、情绪门槛，还是反馈回流？”这个问题足够小，才可能带回可用数据。\n\n如果这篇发布后只得到共鸣，它还只是文章；如果它能让读者说出自己的接口断点，它就是资产；如果它进一步让读者索要表格、提示词或模板，它才真正进入产品化路径。", "chars": 5035, "path": "content-packs/问题392/01_正文.md"}, {"id": "问题306", "number": 306, "title": "问题306：为什么 AI 诊断模型正在用“男性脑模板”继续误伤女性 ADHD", "priority": "S", "category": "diagnosis", "rank": 7, "grade": "A", "desire": 8, "thought": 8, "action": 8, "total": 24, "authenticity": 8, "risk": "低", "failure": "类型模板、诊断模板", "desire_text": "被认真区分和支持：不是被一句“你可能是 ADHD”安慰，而是把长期痛感、功能损害、专业评估和现实照护接成一条路。", "thought_text": "把“我是不是有问题”改写成“症状、场景、样本偏差、诊断边界和支持系统之间哪一环断了”。", "action_text": "把最近一次失控场景写成四栏：发生了什么、损害了什么、持续多久、下一步该问医生/专业人士/AI 什么。", "real_desire": "", "outsourcing_angle": "", "verification_signal": "", "comment": "基础评分已生成；建议发布前人工复核题目级痛点。", "article": "# 问题306：为什么 AI 诊断模型正在用“男性脑模板”继续误伤女性 ADHD\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想给自己贴一个更响的标签，而是想终于有人把你这些年“明明聪明却总在简单处崩掉”的经历，当成一个需要被认真处理的问题。\n\n**所思：** 原来我需要的不是一次身份确认，而是一条从痛感、症状、场景、专业评估到日常支持的路径。标签只是入口，接口才是出口。\n\n**所行：** 打开备忘录，写下最近一次“我明明想做却启动不了”的具体场景，再让 AI 帮你分成四栏：发生了什么、损害了什么、我怀疑什么、下一步该问谁。\n\n## 点火开场：发布版第一屏\n\n你可能并不是真的想问“我是不是 ADHD”。你更想问的是：为什么我能把一个复杂问题想得很透，却会在回一条微信、打开一个文档、预约一次检查这种小事上反复失败。\n\n所以《为什么 AI 诊断模型正在用“男性脑模板”继续误伤女性 ADHD》这篇不能先讲概念。它要先让读者在第三段前停住：这不就是我吗？我不是没有能力，我是一直在用不适配自己的接口硬扛。\n\n真正的 S 级，不是观点锋利，而是三件事同时发生：读者想要一种新的活法，读者重新解释自己的卡点，读者马上做一个小动作。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 被认真区分和支持：不是被一句“你可能是 ADHD”安慰，而是把长期痛感、功能损害、专业评估和现实照护接成一条路。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 8 | S级优先级带来更强发布势能；已发布前精修；标题自带强冲突/强识别 |\n| 所思 | 把“我是不是有问题”改写成“症状、场景、样本偏差、诊断边界和支持系统之间哪一环断了”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 8 | S级优先级带来更强发布势能；已发布前精修；标题自带强冲突/强识别 |\n| 所行 | 把最近一次失控场景写成四栏：发生了什么、损害了什么、持续多久、下一步该问医生/专业人士/AI 什么。 | 结尾必须给一个 3-15 分钟内可执行的 AI/备忘录/微信动作。 | 8 | S级优先级带来更强发布势能；已发布前精修；标题自带强冲突/强识别 |\n| 电流总分 | 先列触动内容，再综合打分。 | 诊断边界、误诊漏诊、AI 模型偏差或医疗支持缺口越具体，分数越高。 | 24 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n这不是一篇“再解释一次 ADHD”的文章，而是一篇门面文章：它要替整个《问题XXX》系列证明，ADHD × AI 不是流量标签，而是一套关于执行功能、外部前额叶和现实回流的工作系统。\n\n为什么 AI 诊断模型正在用“男性脑模板”继续误伤女性 ADHD。这个题的核心不是“ADHD 很痛，AI 很有用”这种容易写烂的判断，而是：女性 ADHD 被迟诊漏诊的结构性原因，不是“女性更会伪装”这么简单。如果这句话讲不清，后面所有平台版、口播版、评论问题和模板入口都会变成包装；如果讲清了，这篇文章就能成为一个真正的闭环资产。\n\n## 01 开场：先从一个不舒服的场景进入\n\n想象一个很具体的画面：你打开 AI，输入需求，几秒钟后它给你一份结构清楚、语气稳定、看起来比你本人更像“正常职场人”的答案。你应该高兴，因为它确实帮你省掉了很多步骤；但你心里又会冒出一个更暗的念头：如果它这么快就能把我翻译好，那我这些年到底算什么？\n\n这个问题的刺就在这里。AI 并没有简单地帮助 ADHD，它也重新定义了 ADHD 的痛感。过去你卡住，是因为启动难、排序难、时间感差、工作记忆漏水；现在工具可以接走很多中间步骤，于是新的问题出现了：工具接走以后，你的主体性、判断力、风险感和真实风格还剩多少？\n\n所以这篇不能写成工具赞歌。它必须承认 AI 的帮助，也必须追问帮助的代价。它不能让读者只获得“我被理解了”的安慰，而要让读者意识到：自己真正需要设计的不是一个更会输出的工具，而是一个不会吞掉判断权的外部执行系统。\n\n## 02 核心判断：问题不在能力，而在接口\n\nADHD 最容易被误解成能力问题。拖延被看成懒，分心被看成不认真，情绪波动被看成不成熟，计划失效被看成不负责任。但在很多真实场景里，当事人并不是不知道目标，也不是没有能力，而是缺少一条从目标到动作的稳定通道。\n\n这条通道，我更愿意叫它“执行接口”。它包括启动接口、排序接口、时间接口、工作记忆接口、情绪接口、反馈接口和委托接口。普通人可能也会卡，但 ADHD 用户会更早、更频繁、更痛地感到这些接口失灵。\n\nAI 的价值，正是在这里出现的。它可以把抽象目标切成步骤，把脑内混乱压成结构，把空白页面变成可修改草稿，把一团焦虑翻译成一个五分钟动作。它不是把你治好，而是暂时补上某个接口。\n\n但这也解释了为什么 AI 有时会让人更痛苦。因为一旦工具补上了接口，社会就更容易说：你看，工具都有了，你怎么还不行？于是原本属于环境、系统和执行功能的摩擦，又被重新塞回个人道德里。\n\n## 03 这个题的真正锋口：男性脑模板\n\n男性脑模板 不是一个装饰性概念，而是这篇文章必须守住的锋口。它要求我们不要在“AI 能帮忙”这个浅层判断上停下，而要继续问：它帮的是哪一段？它有没有制造新的依赖？它有没有把高方差风格洗成神经典型风格？它有没有把现实反馈变得更清楚，还是只让半成品变多？\n\n对 ADHD 用户来说，最危险的不是工具不好用，而是工具太顺。太顺的工具会让人误以为自己已经完成了现实动作：生成了计划，就像开始了；写出了草稿，就像发布了；整理了知识库，就像做出了判断；让 Agent 跑了一轮，就像自己已经承担了风险。\n\n但现实不是这样运转的。现实只承认动作、交付、对话、反馈和后果。一个 AI 工作流如果不能把人送到这些东西面前，它再漂亮也只是新的缓冲区。\n\n所以这篇文章的锋口要落在一句话上：AI 可以接走摩擦，但不能替你承担判断；Agent 可以执行动作，但不能替你承担赌注；工具可以翻译你，但不能替你活。\n\n## 04 三个校准：防止写成营销号\n\n第一，不能把 ADHD 写成天才徽章。高方差确实可能带来发散、联想、敏感和异常问题感，但这些能力只有在合适接口里才会变成产出。没有接口，高方差只是高损耗。\n\n第二，不能把 AI 写成治疗方案。AI 可以帮助某些任务场景里的执行功能外部化，但它不能替代诊断、治疗、药物、睡眠、稳定关系和真实工作条件。把 AI 写成万能药，最后只会制造新的羞耻。\n\n第三，不能把内容写成纯共鸣。共鸣是入口，不是终点。读者说“太真实了”只能说明文章击中了痛点；读者能说出“我卡在启动接口，我需要一个五分钟动作”，才说明文章完成了转译。\n\n这三个校准决定了《问题XXX》系列和普通 ADHD 内容的区别：它不是贩卖身份，不是贩卖焦虑，也不是贩卖工具，而是在搭一套能把痛感转成动作、动作转成反馈、反馈转成资产的系统。\n\n## 05 可执行判断：一篇文章必须留下一个动作\n\n这篇文章最终要留下的动作，是一张《女性 ADHD 偏差检查卡》。它不需要复杂，甚至越简单越好。表格只问四件事：我现在卡在哪里；这是哪个执行接口断了；AI 可以接走哪一个最小动作；48 小时内用什么现实信号验证它。\n\n| 当前卡点 | 执行接口 | AI/Agent 最小动作 | 48 小时现实信号 |\n|---|---|---|---|\n| 我一直想但没开始 | 启动接口 | 拆成一个五分钟动作 | 是否真的打开并完成第一步 |\n| 我同时有太多方向 | 排序接口 | 压成三个选项并给取舍理由 | 是否能放弃两个方向 |\n| 我生成了很多内容 | 反馈接口 | 设计一次发布、询问或交付 | 是否收到真实回应 |\n| 我怕工具替代自己 | 委托接口 | 标出哪些可委托、哪些必须自己判断 | 是否保留最终决策 |\n\n这个表的价值，不在于它多漂亮，而在于它把模糊自责改成了可处理的问题。ADHD 用户不需要再问“为什么我又这样”，而是可以问“我现在哪个接口断了”。这就是从情绪叙事进入产品化叙事的分界线。\n\n## 06 结尾：真正的目标不是更正常，而是更可回流\n\nAI 最容易给人的幻觉，是让一切看起来更顺了。文本更顺，计划更顺，表达更顺，简历更顺，汇报更顺。但顺不等于真，顺也不等于完成。对 ADHD 用户来说，真正重要的是：这套系统有没有让现实更快回话？有没有让你更少在脑内空转？有没有让你保留自己的判断，而不是把自己交给模板？\n\n所以这篇文章最后要把读者带到一个更冷静的位置：不要问 AI 有没有让你变正常，要问它有没有让你更能进入现实。不要问自己是不是终于被修好了，要问哪个接口被外部化了，哪个接口还需要人工守住。\n\n这才是 ADHD × AI 的真正命题。不是治愈，不是神化，不是炫耀效率，而是在一个注意力被系统性采掘的时代，为高方差大脑重新设计进入现实的通道。\n\n## 发布接口\n\n公众号版用这一版作为主稿，保留严肃随笔语气。小红书版只截取开场场景和《女性 ADHD 偏差检查卡》。知乎版重点回答概念边界：AI 不是治疗，而是外部化脚手架。短视频版抓一句话：工具可以翻译你，但不能替你活。评论区唯一问题：你现在最想让 AI 接住的，是哪个执行接口？\n\n## 07 发布前精修补丁：把锋利度落到第一屏\n\n发布前，这篇文章还需要在第一屏做一次更狠的取舍：不要先解释概念，不要先铺知识背景，也不要先证明作者懂 ADHD。第一屏只做一件事：把读者带进一个他们无法否认的现场。\n\n这个现场可以是：工具已经把文本写得很漂亮，但你仍然没有发布；Agent 已经跑出十个方案，但你反而更难选择；AI 把你翻译得像一个稳定的人，但你突然怀疑自己的原始表达是不是被洗掉了。这个现场一旦成立，后面的理论才有必要出现。\n\n因此，正式发布时建议把开头压成三段。第一段写一个动作现场，第二段写这个现场背后的执行接口，第三段抛出本文判断：为什么 AI 诊断模型正在用“男性脑模板”继续误伤女性 ADHD 不是一个工具问题，而是一个“谁来接住执行功能、谁来保留判断权、谁来承担现实反馈”的问题。\n\n这也是评论区回流的重点。不要问“你怎么看 AI 和 ADHD”，这个问题太大，读者只会泛泛表达。要问：“你现在最想交给 AI 的，是启动、排序、记忆、时间感、情绪门槛，还是反馈回流？”这个问题足够小，才可能带回可用数据。\n\n如果这篇发布后只得到共鸣，它还只是文章；如果它能让读者说出自己的接口断点，它就是资产；如果它进一步让读者索要表格、提示词或模板，它才真正进入产品化路径。", "chars": 4462, "path": "content-packs/问题306/01_正文.md"}, {"id": "问题391", "number": 391, "title": "问题391：为什么 ADHD 是注意力经济的工伤，不是病", "priority": "S", "category": "diagnosis", "rank": 8, "grade": "A", "desire": 8, "thought": 8, "action": 8, "total": 24, "authenticity": 8, "risk": "低", "failure": "类型模板、诊断模板", "desire_text": "被认真区分和支持：不是被一句“你可能是 ADHD”安慰，而是把长期痛感、功能损害、专业评估和现实照护接成一条路。", "thought_text": "把“我是不是有问题”改写成“症状、场景、样本偏差、诊断边界和支持系统之间哪一环断了”。", "action_text": "把最近一次失控场景写成四栏：发生了什么、损害了什么、持续多久、下一步该问医生/专业人士/AI 什么。", "real_desire": "", "outsourcing_angle": "", "verification_signal": "", "comment": "基础评分已生成；建议发布前人工复核题目级痛点。", "article": "# 问题391：为什么 ADHD 是注意力经济的工伤，不是病\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想给自己贴一个更响的标签，而是想终于有人把你这些年“明明聪明却总在简单处崩掉”的经历，当成一个需要被认真处理的问题。\n\n**所思：** 原来我需要的不是一次身份确认，而是一条从痛感、症状、场景、专业评估到日常支持的路径。标签只是入口，接口才是出口。\n\n**所行：** 打开备忘录，写下最近一次“我明明想做却启动不了”的具体场景，再让 AI 帮你分成四栏：发生了什么、损害了什么、我怀疑什么、下一步该问谁。\n\n## 点火开场：发布版第一屏\n\n你可能并不是真的想问“我是不是 ADHD”。你更想问的是：为什么我能把一个复杂问题想得很透，却会在回一条微信、打开一个文档、预约一次检查这种小事上反复失败。\n\n所以《为什么 ADHD 是注意力经济的工伤，不是病》这篇不能先讲概念。它要先让读者在第三段前停住：这不就是我吗？我不是没有能力，我是一直在用不适配自己的接口硬扛。\n\n真正的 S 级，不是观点锋利，而是三件事同时发生：读者想要一种新的活法，读者重新解释自己的卡点，读者马上做一个小动作。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 被认真区分和支持：不是被一句“你可能是 ADHD”安慰，而是把长期痛感、功能损害、专业评估和现实照护接成一条路。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 8 | S级优先级带来更强发布势能；已发布前精修；标题自带强冲突/强识别 |\n| 所思 | 把“我是不是有问题”改写成“症状、场景、样本偏差、诊断边界和支持系统之间哪一环断了”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 8 | S级优先级带来更强发布势能；已发布前精修；标题自带强冲突/强识别 |\n| 所行 | 把最近一次失控场景写成四栏：发生了什么、损害了什么、持续多久、下一步该问医生/专业人士/AI 什么。 | 结尾必须给一个 3-15 分钟内可执行的 AI/备忘录/微信动作。 | 8 | S级优先级带来更强发布势能；已发布前精修；标题自带强冲突/强识别 |\n| 电流总分 | 先列触动内容，再综合打分。 | 诊断边界、误诊漏诊、AI 模型偏差或医疗支持缺口越具体，分数越高。 | 24 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n这不是一篇“再解释一次 ADHD”的文章，而是一篇门面文章：它要替整个《问题XXX》系列证明，ADHD × AI 不是流量标签，而是一套关于执行功能、外部前额叶和现实回流的工作系统。\n\n为什么 ADHD 是注意力经济的工伤，不是病。这个题的核心不是“ADHD 很痛，AI 很有用”这种容易写烂的判断，而是：把“分心”写成平台、广告、组织共同制造的注意力损耗。如果这句话讲不清，后面所有平台版、口播版、评论问题和模板入口都会变成包装；如果讲清了，这篇文章就能成为一个真正的闭环资产。\n\n## 01 开场：先从一个不舒服的场景进入\n\n想象一个很具体的画面：你打开 AI，输入需求，几秒钟后它给你一份结构清楚、语气稳定、看起来比你本人更像“正常职场人”的答案。你应该高兴，因为它确实帮你省掉了很多步骤；但你心里又会冒出一个更暗的念头：如果它这么快就能把我翻译好，那我这些年到底算什么？\n\n这个问题的刺就在这里。AI 并没有简单地帮助 ADHD，它也重新定义了 ADHD 的痛感。过去你卡住，是因为启动难、排序难、时间感差、工作记忆漏水；现在工具可以接走很多中间步骤，于是新的问题出现了：工具接走以后，你的主体性、判断力、风险感和真实风格还剩多少？\n\n所以这篇不能写成工具赞歌。它必须承认 AI 的帮助，也必须追问帮助的代价。它不能让读者只获得“我被理解了”的安慰，而要让读者意识到：自己真正需要设计的不是一个更会输出的工具，而是一个不会吞掉判断权的外部执行系统。\n\n## 02 核心判断：问题不在能力，而在接口\n\nADHD 最容易被误解成能力问题。拖延被看成懒，分心被看成不认真，情绪波动被看成不成熟，计划失效被看成不负责任。但在很多真实场景里，当事人并不是不知道目标，也不是没有能力，而是缺少一条从目标到动作的稳定通道。\n\n这条通道，我更愿意叫它“执行接口”。它包括启动接口、排序接口、时间接口、工作记忆接口、情绪接口、反馈接口和委托接口。普通人可能也会卡，但 ADHD 用户会更早、更频繁、更痛地感到这些接口失灵。\n\nAI 的价值，正是在这里出现的。它可以把抽象目标切成步骤，把脑内混乱压成结构，把空白页面变成可修改草稿，把一团焦虑翻译成一个五分钟动作。它不是把你治好，而是暂时补上某个接口。\n\n但这也解释了为什么 AI 有时会让人更痛苦。因为一旦工具补上了接口，社会就更容易说：你看，工具都有了，你怎么还不行？于是原本属于环境、系统和执行功能的摩擦，又被重新塞回个人道德里。\n\n## 03 这个题的真正锋口：注意力经济工伤\n\n注意力经济工伤 不是一个装饰性概念，而是这篇文章必须守住的锋口。它要求我们不要在“AI 能帮忙”这个浅层判断上停下，而要继续问：它帮的是哪一段？它有没有制造新的依赖？它有没有把高方差风格洗成神经典型风格？它有没有把现实反馈变得更清楚，还是只让半成品变多？\n\n对 ADHD 用户来说，最危险的不是工具不好用，而是工具太顺。太顺的工具会让人误以为自己已经完成了现实动作：生成了计划，就像开始了；写出了草稿，就像发布了；整理了知识库，就像做出了判断；让 Agent 跑了一轮，就像自己已经承担了风险。\n\n但现实不是这样运转的。现实只承认动作、交付、对话、反馈和后果。一个 AI 工作流如果不能把人送到这些东西面前，它再漂亮也只是新的缓冲区。\n\n所以这篇文章的锋口要落在一句话上：AI 可以接走摩擦，但不能替你承担判断；Agent 可以执行动作，但不能替你承担赌注；工具可以翻译你，但不能替你活。\n\n## 04 三个校准：防止写成营销号\n\n第一，不能把 ADHD 写成天才徽章。高方差确实可能带来发散、联想、敏感和异常问题感，但这些能力只有在合适接口里才会变成产出。没有接口，高方差只是高损耗。\n\n第二，不能把 AI 写成治疗方案。AI 可以帮助某些任务场景里的执行功能外部化，但它不能替代诊断、治疗、药物、睡眠、稳定关系和真实工作条件。把 AI 写成万能药，最后只会制造新的羞耻。\n\n第三，不能把内容写成纯共鸣。共鸣是入口，不是终点。读者说“太真实了”只能说明文章击中了痛点；读者能说出“我卡在启动接口，我需要一个五分钟动作”，才说明文章完成了转译。\n\n这三个校准决定了《问题XXX》系列和普通 ADHD 内容的区别：它不是贩卖身份，不是贩卖焦虑，也不是贩卖工具，而是在搭一套能把痛感转成动作、动作转成反馈、反馈转成资产的系统。\n\n## 05 可执行判断：一篇文章必须留下一个动作\n\n这篇文章最终要留下的动作，是一张《注意力损耗台账》。它不需要复杂，甚至越简单越好。表格只问四件事：我现在卡在哪里；这是哪个执行接口断了；AI 可以接走哪一个最小动作；48 小时内用什么现实信号验证它。\n\n| 当前卡点 | 执行接口 | AI/Agent 最小动作 | 48 小时现实信号 |\n|---|---|---|---|\n| 我一直想但没开始 | 启动接口 | 拆成一个五分钟动作 | 是否真的打开并完成第一步 |\n| 我同时有太多方向 | 排序接口 | 压成三个选项并给取舍理由 | 是否能放弃两个方向 |\n| 我生成了很多内容 | 反馈接口 | 设计一次发布、询问或交付 | 是否收到真实回应 |\n| 我怕工具替代自己 | 委托接口 | 标出哪些可委托、哪些必须自己判断 | 是否保留最终决策 |\n\n这个表的价值，不在于它多漂亮，而在于它把模糊自责改成了可处理的问题。ADHD 用户不需要再问“为什么我又这样”，而是可以问“我现在哪个接口断了”。这就是从情绪叙事进入产品化叙事的分界线。\n\n## 06 结尾：真正的目标不是更正常，而是更可回流\n\nAI 最容易给人的幻觉，是让一切看起来更顺了。文本更顺，计划更顺，表达更顺，简历更顺，汇报更顺。但顺不等于真，顺也不等于完成。对 ADHD 用户来说，真正重要的是：这套系统有没有让现实更快回话？有没有让你更少在脑内空转？有没有让你保留自己的判断，而不是把自己交给模板？\n\n所以这篇文章最后要把读者带到一个更冷静的位置：不要问 AI 有没有让你变正常，要问它有没有让你更能进入现实。不要问自己是不是终于被修好了，要问哪个接口被外部化了，哪个接口还需要人工守住。\n\n这才是 ADHD × AI 的真正命题。不是治愈，不是神化，不是炫耀效率，而是在一个注意力被系统性采掘的时代，为高方差大脑重新设计进入现实的通道。\n\n## 发布接口\n\n公众号版用这一版作为主稿，保留严肃随笔语气。小红书版只截取开场场景和《注意力损耗台账》。知乎版重点回答概念边界：AI 不是治疗，而是外部化脚手架。短视频版抓一句话：工具可以翻译你，但不能替你活。评论区唯一问题：你现在最想让 AI 接住的，是哪个执行接口？\n\n## 07 发布前精修补丁：把锋利度落到第一屏\n\n发布前，这篇文章还需要在第一屏做一次更狠的取舍：不要先解释概念，不要先铺知识背景，也不要先证明作者懂 ADHD。第一屏只做一件事：把读者带进一个他们无法否认的现场。\n\n这个现场可以是：工具已经把文本写得很漂亮，但你仍然没有发布；Agent 已经跑出十个方案，但你反而更难选择；AI 把你翻译得像一个稳定的人，但你突然怀疑自己的原始表达是不是被洗掉了。这个现场一旦成立，后面的理论才有必要出现。\n\n因此，正式发布时建议把开头压成三段。第一段写一个动作现场，第二段写这个现场背后的执行接口，第三段抛出本文判断：为什么 ADHD 是注意力经济的工伤，不是病 不是一个工具问题，而是一个“谁来接住执行功能、谁来保留判断权、谁来承担现实反馈”的问题。\n\n这也是评论区回流的重点。不要问“你怎么看 AI 和 ADHD”，这个问题太大，读者只会泛泛表达。要问：“你现在最想交给 AI 的，是启动、排序、记忆、时间感、情绪门槛，还是反馈回流？”这个问题足够小，才可能带回可用数据。\n\n如果这篇发布后只得到共鸣，它还只是文章；如果它能让读者说出自己的接口断点，它就是资产；如果它进一步让读者索要表格、提示词或模板，它才真正进入产品化路径。", "chars": 4405, "path": "content-packs/问题391/01_正文.md"}, {"id": "问题375", "number": 375, "title": "问题375：为什么 AI 招聘工具会系统性过滤掉最适合神经多样性岗位的人", "priority": "S", "category": "org", "rank": 9, "grade": "A", "desire": 7, "thought": 8, "action": 8, "total": 23, "authenticity": 7, "risk": "中", "failure": "类型模板", "desire_text": "不再把自己伪装成稳定、线性、随叫随到的人，而是想要岗位、会议、招聘和反馈系统真的改接口。", "thought_text": "把“不适合组织”改写成“不适合隐性优先级、即时表达、稳定外壳这套默认组织接口”。", "action_text": "选一个最耗能工作环节，让 AI 写成四句接口说明：输入、输出、确认节奏、反馈格式。", "real_desire": "", "outsourcing_angle": "", "verification_signal": "", "comment": "组织题要从组织咨询语落到个体真实痛点和接口显性化", "article": "# 问题375：为什么 AI 招聘工具会系统性过滤掉最适合神经多样性岗位的人\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想被夸“很有创造力”，而是想在会议、岗位、招聘和反馈系统里，不必先把自己伪装成稳定、线性、随叫随到的人。\n\n**所思：** 原来我不是天然不适合组织，我可能只是不适合一套只奖励即时表达、隐性优先级和稳定外壳的组织接口。AI 的意义不是让我更会伪装，而是逼组织把规则说清楚。\n\n**所行：** 选一个最耗你的工作环节，让 AI 写成四句话：任务输入是什么、期望输出是什么、多久确认一次、反馈用什么格式。然后把它当作一次沟通模板。\n\n## 点火开场：发布版第一屏\n\n你最累的可能不是工作本身，而是每天把自己翻译成一个组织更容易接受的版本：开会要像没走神，汇报要像一直在线，优先级不清也要装作懂了。\n\n所以《为什么 AI 招聘工具会系统性过滤掉最适合神经多样性岗位的人》这篇不能先讲概念。它要先让读者在第三段前停住：这不就是我吗？我不是没有能力，我是一直在用不适配自己的接口硬扛。\n\n真正的 S 级，不是观点锋利，而是三件事同时发生：读者想要一种新的活法，读者重新解释自己的卡点，读者马上做一个小动作。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 不再把自己伪装成稳定、线性、随叫随到的人，而是想要岗位、会议、招聘和反馈系统真的改接口。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 8 | S级优先级带来更强发布势能；已发布前精修；标题自带强冲突/强识别 |\n| 所思 | 把“不适合组织”改写成“不适合隐性优先级、即时表达、稳定外壳这套默认组织接口”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 8 | S级优先级带来更强发布势能；已发布前精修；标题自带强冲突/强识别 |\n| 所行 | 选一个最耗能工作环节，让 AI 写成四句接口说明：输入、输出、确认节奏、反馈格式。 | 结尾必须给一个 3-15 分钟内可执行的 AI/备忘录/微信动作。 | 8 | S级优先级带来更强发布势能；已发布前精修；标题自带强冲突/强识别 |\n| 电流总分 | 先列触动内容，再综合打分。 | 能否把个人痛感推到组织接口、招聘流程、管理节奏和结构承诺。 | 24 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n这不是一篇“再解释一次 ADHD”的文章，而是一篇门面文章：它要替整个《问题XXX》系列证明，ADHD × AI 不是流量标签，而是一套关于执行功能、外部前额叶和现实回流的工作系统。\n\n为什么 AI 招聘工具会系统性过滤掉最适合神经多样性岗位的人。这个题的核心不是“ADHD 很痛，AI 很有用”这种容易写烂的判断，而是：AI 让浅层任务伪装成深度工作，真正的深度仍是判断和赌注。如果这句话讲不清，后面所有平台版、口播版、评论问题和模板入口都会变成包装；如果讲清了，这篇文章就能成为一个真正的闭环资产。\n\n## 01 开场：先从一个不舒服的场景进入\n\n想象一个很具体的画面：你打开 AI，输入需求，几秒钟后它给你一份结构清楚、语气稳定、看起来比你本人更像“正常职场人”的答案。你应该高兴，因为它确实帮你省掉了很多步骤；但你心里又会冒出一个更暗的念头：如果它这么快就能把我翻译好，那我这些年到底算什么？\n\n这个问题的刺就在这里。AI 并没有简单地帮助 ADHD，它也重新定义了 ADHD 的痛感。过去你卡住，是因为启动难、排序难、时间感差、工作记忆漏水；现在工具可以接走很多中间步骤，于是新的问题出现了：工具接走以后，你的主体性、判断力、风险感和真实风格还剩多少？\n\n所以这篇不能写成工具赞歌。它必须承认 AI 的帮助，也必须追问帮助的代价。它不能让读者只获得“我被理解了”的安慰，而要让读者意识到：自己真正需要设计的不是一个更会输出的工具，而是一个不会吞掉判断权的外部执行系统。\n\n## 02 核心判断：问题不在能力，而在接口\n\nADHD 最容易被误解成能力问题。拖延被看成懒，分心被看成不认真，情绪波动被看成不成熟，计划失效被看成不负责任。但在很多真实场景里，当事人并不是不知道目标，也不是没有能力，而是缺少一条从目标到动作的稳定通道。\n\n这条通道，我更愿意叫它“执行接口”。它包括启动接口、排序接口、时间接口、工作记忆接口、情绪接口、反馈接口和委托接口。普通人可能也会卡，但 ADHD 用户会更早、更频繁、更痛地感到这些接口失灵。\n\nAI 的价值，正是在这里出现的。它可以把抽象目标切成步骤，把脑内混乱压成结构，把空白页面变成可修改草稿，把一团焦虑翻译成一个五分钟动作。它不是把你治好，而是暂时补上某个接口。\n\n但这也解释了为什么 AI 有时会让人更痛苦。因为一旦工具补上了接口，社会就更容易说：你看，工具都有了，你怎么还不行？于是原本属于环境、系统和执行功能的摩擦，又被重新塞回个人道德里。\n\n## 03 这个题的真正锋口：深度工作幻觉\n\n深度工作幻觉 不是一个装饰性概念，而是这篇文章必须守住的锋口。它要求我们不要在“AI 能帮忙”这个浅层判断上停下，而要继续问：它帮的是哪一段？它有没有制造新的依赖？它有没有把高方差风格洗成神经典型风格？它有没有把现实反馈变得更清楚，还是只让半成品变多？\n\n对 ADHD 用户来说，最危险的不是工具不好用，而是工具太顺。太顺的工具会让人误以为自己已经完成了现实动作：生成了计划，就像开始了；写出了草稿，就像发布了；整理了知识库，就像做出了判断；让 Agent 跑了一轮，就像自己已经承担了风险。\n\n但现实不是这样运转的。现实只承认动作、交付、对话、反馈和后果。一个 AI 工作流如果不能把人送到这些东西面前，它再漂亮也只是新的缓冲区。\n\n所以这篇文章的锋口要落在一句话上：AI 可以接走摩擦，但不能替你承担判断；Agent 可以执行动作，但不能替你承担赌注；工具可以翻译你，但不能替你活。\n\n## 04 三个校准：防止写成营销号\n\n第一，不能把 ADHD 写成天才徽章。高方差确实可能带来发散、联想、敏感和异常问题感，但这些能力只有在合适接口里才会变成产出。没有接口，高方差只是高损耗。\n\n第二，不能把 AI 写成治疗方案。AI 可以帮助某些任务场景里的执行功能外部化，但它不能替代诊断、治疗、药物、睡眠、稳定关系和真实工作条件。把 AI 写成万能药，最后只会制造新的羞耻。\n\n第三，不能把内容写成纯共鸣。共鸣是入口，不是终点。读者说“太真实了”只能说明文章击中了痛点；读者能说出“我卡在启动接口，我需要一个五分钟动作”，才说明文章完成了转译。\n\n这三个校准决定了《问题XXX》系列和普通 ADHD 内容的区别：它不是贩卖身份，不是贩卖焦虑，也不是贩卖工具，而是在搭一套能把痛感转成动作、动作转成反馈、反馈转成资产的系统。\n\n## 05 可执行判断：一篇文章必须留下一个动作\n\n这篇文章最终要留下的动作，是一张《深度工作真假表》。它不需要复杂，甚至越简单越好。表格只问四件事：我现在卡在哪里；这是哪个执行接口断了；AI 可以接走哪一个最小动作；48 小时内用什么现实信号验证它。\n\n| 当前卡点 | 执行接口 | AI/Agent 最小动作 | 48 小时现实信号 |\n|---|---|---|---|\n| 我一直想但没开始 | 启动接口 | 拆成一个五分钟动作 | 是否真的打开并完成第一步 |\n| 我同时有太多方向 | 排序接口 | 压成三个选项并给取舍理由 | 是否能放弃两个方向 |\n| 我生成了很多内容 | 反馈接口 | 设计一次发布、询问或交付 | 是否收到真实回应 |\n| 我怕工具替代自己 | 委托接口 | 标出哪些可委托、哪些必须自己判断 | 是否保留最终决策 |\n\n这个表的价值，不在于它多漂亮，而在于它把模糊自责改成了可处理的问题。ADHD 用户不需要再问“为什么我又这样”，而是可以问“我现在哪个接口断了”。这就是从情绪叙事进入产品化叙事的分界线。\n\n## 06 结尾：真正的目标不是更正常，而是更可回流\n\nAI 最容易给人的幻觉，是让一切看起来更顺了。文本更顺，计划更顺，表达更顺，简历更顺，汇报更顺。但顺不等于真，顺也不等于完成。对 ADHD 用户来说，真正重要的是：这套系统有没有让现实更快回话？有没有让你更少在脑内空转？有没有让你保留自己的判断，而不是把自己交给模板？\n\n所以这篇文章最后要把读者带到一个更冷静的位置：不要问 AI 有没有让你变正常，要问它有没有让你更能进入现实。不要问自己是不是终于被修好了，要问哪个接口被外部化了，哪个接口还需要人工守住。\n\n这才是 ADHD × AI 的真正命题。不是治愈，不是神化，不是炫耀效率，而是在一个注意力被系统性采掘的时代，为高方差大脑重新设计进入现实的通道。\n\n## 发布接口\n\n公众号版用这一版作为主稿，保留严肃随笔语气。小红书版只截取开场场景和《深度工作真假表》。知乎版重点回答概念边界：AI 不是治疗，而是外部化脚手架。短视频版抓一句话：工具可以翻译你，但不能替你活。评论区唯一问题：你现在最想让 AI 接住的，是哪个执行接口？\n\n## 07 发布前精修补丁：把锋利度落到第一屏\n\n发布前，这篇文章还需要在第一屏做一次更狠的取舍：不要先解释概念，不要先铺知识背景，也不要先证明作者懂 ADHD。第一屏只做一件事：把读者带进一个他们无法否认的现场。\n\n这个现场可以是：工具已经把文本写得很漂亮，但你仍然没有发布；Agent 已经跑出十个方案，但你反而更难选择；AI 把你翻译得像一个稳定的人，但你突然怀疑自己的原始表达是不是被洗掉了。这个现场一旦成立，后面的理论才有必要出现。\n\n因此，正式发布时建议把开头压成三段。第一段写一个动作现场，第二段写这个现场背后的执行接口，第三段抛出本文判断：为什么 AI 招聘工具会系统性过滤掉最适合神经多样性岗位的人 不是一个工具问题，而是一个“谁来接住执行功能、谁来保留判断权、谁来承担现实反馈”的问题。\n\n这也是评论区回流的重点。不要问“你怎么看 AI 和 ADHD”，这个问题太大，读者只会泛泛表达。要问：“你现在最想交给 AI 的，是启动、排序、记忆、时间感、情绪门槛，还是反馈回流？”这个问题足够小，才可能带回可用数据。\n\n如果这篇发布后只得到共鸣，它还只是文章；如果它能让读者说出自己的接口断点，它就是资产；如果它进一步让读者索要表格、提示词或模板，它才真正进入产品化路径。", "chars": 4408, "path": "content-packs/问题375/01_正文.md"}, {"id": "问题390", "number": 390, "title": "问题390：为什么你的 AI 同事正在看着你，而这件事既像帮助，也像监控", "priority": "S", "category": "org", "rank": 10, "grade": "A", "desire": 7, "thought": 8, "action": 8, "total": 23, "authenticity": 7, "risk": "中", "failure": "类型模板", "desire_text": "不再把自己伪装成稳定、线性、随叫随到的人，而是想要岗位、会议、招聘和反馈系统真的改接口。", "thought_text": "把“不适合组织”改写成“不适合隐性优先级、即时表达、稳定外壳这套默认组织接口”。", "action_text": "选一个最耗能工作环节，让 AI 写成四句接口说明：输入、输出、确认节奏、反馈格式。", "real_desire": "", "outsourcing_angle": "", "verification_signal": "", "comment": "组织题要从组织咨询语落到个体真实痛点和接口显性化", "article": "# 问题390：为什么你的 AI 同事正在看着你，而这件事既像帮助，也像监控\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想被夸“很有创造力”，而是想在会议、岗位、招聘和反馈系统里，不必先把自己伪装成稳定、线性、随叫随到的人。\n\n**所思：** 原来我不是天然不适合组织，我可能只是不适合一套只奖励即时表达、隐性优先级和稳定外壳的组织接口。AI 的意义不是让我更会伪装，而是逼组织把规则说清楚。\n\n**所行：** 选一个最耗你的工作环节，让 AI 写成四句话：任务输入是什么、期望输出是什么、多久确认一次、反馈用什么格式。然后把它当作一次沟通模板。\n\n## 点火开场：发布版第一屏\n\n你最累的可能不是工作本身，而是每天把自己翻译成一个组织更容易接受的版本：开会要像没走神，汇报要像一直在线，优先级不清也要装作懂了。\n\n所以《为什么你的 AI 同事正在看着你，而这件事既像帮助，也像监控》这篇不能先讲概念。它要先让读者在第三段前停住：这不就是我吗？我不是没有能力，我是一直在用不适配自己的接口硬扛。\n\n真正的 S 级，不是观点锋利，而是三件事同时发生：读者想要一种新的活法，读者重新解释自己的卡点，读者马上做一个小动作。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 不再把自己伪装成稳定、线性、随叫随到的人，而是想要岗位、会议、招聘和反馈系统真的改接口。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 8 | S级优先级带来更强发布势能；已发布前精修；标题自带强冲突/强识别 |\n| 所思 | 把“不适合组织”改写成“不适合隐性优先级、即时表达、稳定外壳这套默认组织接口”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 8 | S级优先级带来更强发布势能；已发布前精修；标题自带强冲突/强识别 |\n| 所行 | 选一个最耗能工作环节，让 AI 写成四句接口说明：输入、输出、确认节奏、反馈格式。 | 结尾必须给一个 3-15 分钟内可执行的 AI/备忘录/微信动作。 | 8 | S级优先级带来更强发布势能；已发布前精修；标题自带强冲突/强识别 |\n| 电流总分 | 先列触动内容，再综合打分。 | 能否把个人痛感推到组织接口、招聘流程、管理节奏和结构承诺。 | 24 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n这不是一篇“再解释一次 ADHD”的文章，而是一篇门面文章：它要替整个《问题XXX》系列证明，ADHD × AI 不是流量标签，而是一套关于执行功能、外部前额叶和现实回流的工作系统。\n\n为什么你的 AI 同事正在看着你，而这件事既像帮助，也像监控。这个题的核心不是“ADHD 很痛，AI 很有用”这种容易写烂的判断，而是：ADHD 不是流行标签，而是注意力经济把执行功能磨损后的极端样本。如果这句话讲不清，后面所有平台版、口播版、评论问题和模板入口都会变成包装；如果讲清了，这篇文章就能成为一个真正的闭环资产。\n\n## 01 开场：先从一个不舒服的场景进入\n\n想象一个很具体的画面：你打开 AI，输入需求，几秒钟后它给你一份结构清楚、语气稳定、看起来比你本人更像“正常职场人”的答案。你应该高兴，因为它确实帮你省掉了很多步骤；但你心里又会冒出一个更暗的念头：如果它这么快就能把我翻译好，那我这些年到底算什么？\n\n这个问题的刺就在这里。AI 并没有简单地帮助 ADHD，它也重新定义了 ADHD 的痛感。过去你卡住，是因为启动难、排序难、时间感差、工作记忆漏水；现在工具可以接走很多中间步骤，于是新的问题出现了：工具接走以后，你的主体性、判断力、风险感和真实风格还剩多少？\n\n所以这篇不能写成工具赞歌。它必须承认 AI 的帮助，也必须追问帮助的代价。它不能让读者只获得“我被理解了”的安慰，而要让读者意识到：自己真正需要设计的不是一个更会输出的工具，而是一个不会吞掉判断权的外部执行系统。\n\n## 02 核心判断：问题不在能力，而在接口\n\nADHD 最容易被误解成能力问题。拖延被看成懒，分心被看成不认真，情绪波动被看成不成熟，计划失效被看成不负责任。但在很多真实场景里，当事人并不是不知道目标，也不是没有能力，而是缺少一条从目标到动作的稳定通道。\n\n这条通道，我更愿意叫它“执行接口”。它包括启动接口、排序接口、时间接口、工作记忆接口、情绪接口、反馈接口和委托接口。普通人可能也会卡，但 ADHD 用户会更早、更频繁、更痛地感到这些接口失灵。\n\nAI 的价值，正是在这里出现的。它可以把抽象目标切成步骤，把脑内混乱压成结构，把空白页面变成可修改草稿，把一团焦虑翻译成一个五分钟动作。它不是把你治好，而是暂时补上某个接口。\n\n但这也解释了为什么 AI 有时会让人更痛苦。因为一旦工具补上了接口，社会就更容易说：你看，工具都有了，你怎么还不行？于是原本属于环境、系统和执行功能的摩擦，又被重新塞回个人道德里。\n\n## 03 这个题的真正锋口：注意力经济工伤\n\n注意力经济工伤 不是一个装饰性概念，而是这篇文章必须守住的锋口。它要求我们不要在“AI 能帮忙”这个浅层判断上停下，而要继续问：它帮的是哪一段？它有没有制造新的依赖？它有没有把高方差风格洗成神经典型风格？它有没有把现实反馈变得更清楚，还是只让半成品变多？\n\n对 ADHD 用户来说，最危险的不是工具不好用，而是工具太顺。太顺的工具会让人误以为自己已经完成了现实动作：生成了计划，就像开始了；写出了草稿，就像发布了；整理了知识库，就像做出了判断；让 Agent 跑了一轮，就像自己已经承担了风险。\n\n但现实不是这样运转的。现实只承认动作、交付、对话、反馈和后果。一个 AI 工作流如果不能把人送到这些东西面前，它再漂亮也只是新的缓冲区。\n\n所以这篇文章的锋口要落在一句话上：AI 可以接走摩擦，但不能替你承担判断；Agent 可以执行动作，但不能替你承担赌注；工具可以翻译你，但不能替你活。\n\n## 04 三个校准：防止写成营销号\n\n第一，不能把 ADHD 写成天才徽章。高方差确实可能带来发散、联想、敏感和异常问题感，但这些能力只有在合适接口里才会变成产出。没有接口，高方差只是高损耗。\n\n第二，不能把 AI 写成治疗方案。AI 可以帮助某些任务场景里的执行功能外部化，但它不能替代诊断、治疗、药物、睡眠、稳定关系和真实工作条件。把 AI 写成万能药，最后只会制造新的羞耻。\n\n第三，不能把内容写成纯共鸣。共鸣是入口，不是终点。读者说“太真实了”只能说明文章击中了痛点；读者能说出“我卡在启动接口，我需要一个五分钟动作”，才说明文章完成了转译。\n\n这三个校准决定了《问题XXX》系列和普通 ADHD 内容的区别：它不是贩卖身份，不是贩卖焦虑，也不是贩卖工具，而是在搭一套能把痛感转成动作、动作转成反馈、反馈转成资产的系统。\n\n## 05 可执行判断：一篇文章必须留下一个动作\n\n这篇文章最终要留下的动作，是一张《注意力工伤记录表》。它不需要复杂，甚至越简单越好。表格只问四件事：我现在卡在哪里；这是哪个执行接口断了；AI 可以接走哪一个最小动作；48 小时内用什么现实信号验证它。\n\n| 当前卡点 | 执行接口 | AI/Agent 最小动作 | 48 小时现实信号 |\n|---|---|---|---|\n| 我一直想但没开始 | 启动接口 | 拆成一个五分钟动作 | 是否真的打开并完成第一步 |\n| 我同时有太多方向 | 排序接口 | 压成三个选项并给取舍理由 | 是否能放弃两个方向 |\n| 我生成了很多内容 | 反馈接口 | 设计一次发布、询问或交付 | 是否收到真实回应 |\n| 我怕工具替代自己 | 委托接口 | 标出哪些可委托、哪些必须自己判断 | 是否保留最终决策 |\n\n这个表的价值，不在于它多漂亮，而在于它把模糊自责改成了可处理的问题。ADHD 用户不需要再问“为什么我又这样”，而是可以问“我现在哪个接口断了”。这就是从情绪叙事进入产品化叙事的分界线。\n\n## 06 结尾：真正的目标不是更正常，而是更可回流\n\nAI 最容易给人的幻觉，是让一切看起来更顺了。文本更顺，计划更顺，表达更顺，简历更顺，汇报更顺。但顺不等于真，顺也不等于完成。对 ADHD 用户来说，真正重要的是：这套系统有没有让现实更快回话？有没有让你更少在脑内空转？有没有让你保留自己的判断，而不是把自己交给模板？\n\n所以这篇文章最后要把读者带到一个更冷静的位置：不要问 AI 有没有让你变正常，要问它有没有让你更能进入现实。不要问自己是不是终于被修好了，要问哪个接口被外部化了，哪个接口还需要人工守住。\n\n这才是 ADHD × AI 的真正命题。不是治愈，不是神化，不是炫耀效率，而是在一个注意力被系统性采掘的时代，为高方差大脑重新设计进入现实的通道。\n\n## 发布接口\n\n公众号版用这一版作为主稿，保留严肃随笔语气。小红书版只截取开场场景和《注意力工伤记录表》。知乎版重点回答概念边界：AI 不是治疗，而是外部化脚手架。短视频版抓一句话：工具可以翻译你，但不能替你活。评论区唯一问题：你现在最想让 AI 接住的，是哪个执行接口？\n\n## 07 发布前精修补丁：把锋利度落到第一屏\n\n发布前，这篇文章还需要在第一屏做一次更狠的取舍：不要先解释概念，不要先铺知识背景，也不要先证明作者懂 ADHD。第一屏只做一件事：把读者带进一个他们无法否认的现场。\n\n这个现场可以是：工具已经把文本写得很漂亮，但你仍然没有发布；Agent 已经跑出十个方案，但你反而更难选择；AI 把你翻译得像一个稳定的人，但你突然怀疑自己的原始表达是不是被洗掉了。这个现场一旦成立，后面的理论才有必要出现。\n\n因此，正式发布时建议把开头压成三段。第一段写一个动作现场，第二段写这个现场背后的执行接口，第三段抛出本文判断：为什么你的 AI 同事正在看着你，而这件事既像帮助，也像监控 不是一个工具问题，而是一个“谁来接住执行功能、谁来保留判断权、谁来承担现实反馈”的问题。\n\n这也是评论区回流的重点。不要问“你怎么看 AI 和 ADHD”，这个问题太大，读者只会泛泛表达。要问：“你现在最想交给 AI 的，是启动、排序、记忆、时间感、情绪门槛，还是反馈回流？”这个问题足够小，才可能带回可用数据。\n\n如果这篇发布后只得到共鸣，它还只是文章；如果它能让读者说出自己的接口断点，它就是资产；如果它进一步让读者索要表格、提示词或模板，它才真正进入产品化路径。", "chars": 4416, "path": "content-packs/问题390/01_正文.md"}, {"id": "问题395", "number": 395, "title": "问题395：为什么 AI 公司正在高薪招聘“最不集中的人”", "priority": "S", "category": "org", "rank": 11, "grade": "A", "desire": 7, "thought": 8, "action": 8, "total": 23, "authenticity": 7, "risk": "中", "failure": "类型模板", "desire_text": "不再把自己伪装成稳定、线性、随叫随到的人，而是想要岗位、会议、招聘和反馈系统真的改接口。", "thought_text": "把“不适合组织”改写成“不适合隐性优先级、即时表达、稳定外壳这套默认组织接口”。", "action_text": "选一个最耗能工作环节，让 AI 写成四句接口说明：输入、输出、确认节奏、反馈格式。", "real_desire": "", "outsourcing_angle": "", "verification_signal": "", "comment": "组织题要从组织咨询语落到个体真实痛点和接口显性化", "article": "# 问题395：为什么 AI 公司正在高薪招聘“最不集中的人”\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想被夸“很有创造力”，而是想在会议、岗位、招聘和反馈系统里，不必先把自己伪装成稳定、线性、随叫随到的人。\n\n**所思：** 原来我不是天然不适合组织，我可能只是不适合一套只奖励即时表达、隐性优先级和稳定外壳的组织接口。AI 的意义不是让我更会伪装，而是逼组织把规则说清楚。\n\n**所行：** 选一个最耗你的工作环节，让 AI 写成四句话：任务输入是什么、期望输出是什么、多久确认一次、反馈用什么格式。然后把它当作一次沟通模板。\n\n## 点火开场：发布版第一屏\n\n你最累的可能不是工作本身，而是每天把自己翻译成一个组织更容易接受的版本：开会要像没走神，汇报要像一直在线，优先级不清也要装作懂了。\n\n所以《为什么 AI 公司正在高薪招聘“最不集中的人”》这篇不能先讲概念。它要先让读者在第三段前停住：这不就是我吗？我不是没有能力，我是一直在用不适配自己的接口硬扛。\n\n真正的 S 级，不是观点锋利，而是三件事同时发生：读者想要一种新的活法，读者重新解释自己的卡点，读者马上做一个小动作。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 不再把自己伪装成稳定、线性、随叫随到的人，而是想要岗位、会议、招聘和反馈系统真的改接口。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 8 | S级优先级带来更强发布势能；已发布前精修；标题自带强冲突/强识别 |\n| 所思 | 把“不适合组织”改写成“不适合隐性优先级、即时表达、稳定外壳这套默认组织接口”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 8 | S级优先级带来更强发布势能；已发布前精修；标题自带强冲突/强识别 |\n| 所行 | 选一个最耗能工作环节，让 AI 写成四句接口说明：输入、输出、确认节奏、反馈格式。 | 结尾必须给一个 3-15 分钟内可执行的 AI/备忘录/微信动作。 | 8 | S级优先级带来更强发布势能；已发布前精修；标题自带强冲突/强识别 |\n| 电流总分 | 先列触动内容，再综合打分。 | 能否把个人痛感推到组织接口、招聘流程、管理节奏和结构承诺。 | 24 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n这不是一篇“再解释一次 ADHD”的文章，而是一篇门面文章：它要替整个《问题XXX》系列证明，ADHD × AI 不是流量标签，而是一套关于执行功能、外部前额叶和现实回流的工作系统。\n\n为什么 AI 公司正在高薪招聘“最不集中的人”。这个题的核心不是“ADHD 很痛，AI 很有用”这种容易写烂的判断，而是：AI 把执行功能变成生产资料，高方差大脑第一次不只被要求适应系统。如果这句话讲不清，后面所有平台版、口播版、评论问题和模板入口都会变成包装；如果讲清了，这篇文章就能成为一个真正的闭环资产。\n\n## 01 开场：先从一个不舒服的场景进入\n\n想象一个很具体的画面：你打开 AI，输入需求，几秒钟后它给你一份结构清楚、语气稳定、看起来比你本人更像“正常职场人”的答案。你应该高兴，因为它确实帮你省掉了很多步骤；但你心里又会冒出一个更暗的念头：如果它这么快就能把我翻译好，那我这些年到底算什么？\n\n这个问题的刺就在这里。AI 并没有简单地帮助 ADHD，它也重新定义了 ADHD 的痛感。过去你卡住，是因为启动难、排序难、时间感差、工作记忆漏水；现在工具可以接走很多中间步骤，于是新的问题出现了：工具接走以后，你的主体性、判断力、风险感和真实风格还剩多少？\n\n所以这篇不能写成工具赞歌。它必须承认 AI 的帮助，也必须追问帮助的代价。它不能让读者只获得“我被理解了”的安慰，而要让读者意识到：自己真正需要设计的不是一个更会输出的工具，而是一个不会吞掉判断权的外部执行系统。\n\n## 02 核心判断：问题不在能力，而在接口\n\nADHD 最容易被误解成能力问题。拖延被看成懒，分心被看成不认真，情绪波动被看成不成熟，计划失效被看成不负责任。但在很多真实场景里，当事人并不是不知道目标，也不是没有能力，而是缺少一条从目标到动作的稳定通道。\n\n这条通道，我更愿意叫它“执行接口”。它包括启动接口、排序接口、时间接口、工作记忆接口、情绪接口、反馈接口和委托接口。普通人可能也会卡，但 ADHD 用户会更早、更频繁、更痛地感到这些接口失灵。\n\nAI 的价值，正是在这里出现的。它可以把抽象目标切成步骤，把脑内混乱压成结构，把空白页面变成可修改草稿，把一团焦虑翻译成一个五分钟动作。它不是把你治好，而是暂时补上某个接口。\n\n但这也解释了为什么 AI 有时会让人更痛苦。因为一旦工具补上了接口，社会就更容易说：你看，工具都有了，你怎么还不行？于是原本属于环境、系统和执行功能的摩擦，又被重新塞回个人道德里。\n\n## 03 这个题的真正锋口：生产资料反转\n\n生产资料反转 不是一个装饰性概念，而是这篇文章必须守住的锋口。它要求我们不要在“AI 能帮忙”这个浅层判断上停下，而要继续问：它帮的是哪一段？它有没有制造新的依赖？它有没有把高方差风格洗成神经典型风格？它有没有把现实反馈变得更清楚，还是只让半成品变多？\n\n对 ADHD 用户来说，最危险的不是工具不好用，而是工具太顺。太顺的工具会让人误以为自己已经完成了现实动作：生成了计划，就像开始了；写出了草稿，就像发布了；整理了知识库，就像做出了判断；让 Agent 跑了一轮，就像自己已经承担了风险。\n\n但现实不是这样运转的。现实只承认动作、交付、对话、反馈和后果。一个 AI 工作流如果不能把人送到这些东西面前，它再漂亮也只是新的缓冲区。\n\n所以这篇文章的锋口要落在一句话上：AI 可以接走摩擦，但不能替你承担判断；Agent 可以执行动作，但不能替你承担赌注；工具可以翻译你，但不能替你活。\n\n## 04 三个校准：防止写成营销号\n\n第一，不能把 ADHD 写成天才徽章。高方差确实可能带来发散、联想、敏感和异常问题感，但这些能力只有在合适接口里才会变成产出。没有接口，高方差只是高损耗。\n\n第二，不能把 AI 写成治疗方案。AI 可以帮助某些任务场景里的执行功能外部化，但它不能替代诊断、治疗、药物、睡眠、稳定关系和真实工作条件。把 AI 写成万能药，最后只会制造新的羞耻。\n\n第三，不能把内容写成纯共鸣。共鸣是入口，不是终点。读者说“太真实了”只能说明文章击中了痛点；读者能说出“我卡在启动接口，我需要一个五分钟动作”，才说明文章完成了转译。\n\n这三个校准决定了《问题XXX》系列和普通 ADHD 内容的区别：它不是贩卖身份，不是贩卖焦虑，也不是贩卖工具，而是在搭一套能把痛感转成动作、动作转成反馈、反馈转成资产的系统。\n\n## 05 可执行判断：一篇文章必须留下一个动作\n\n这篇文章最终要留下的动作，是一张《生产资料清单》。它不需要复杂，甚至越简单越好。表格只问四件事：我现在卡在哪里；这是哪个执行接口断了；AI 可以接走哪一个最小动作；48 小时内用什么现实信号验证它。\n\n| 当前卡点 | 执行接口 | AI/Agent 最小动作 | 48 小时现实信号 |\n|---|---|---|---|\n| 我一直想但没开始 | 启动接口 | 拆成一个五分钟动作 | 是否真的打开并完成第一步 |\n| 我同时有太多方向 | 排序接口 | 压成三个选项并给取舍理由 | 是否能放弃两个方向 |\n| 我生成了很多内容 | 反馈接口 | 设计一次发布、询问或交付 | 是否收到真实回应 |\n| 我怕工具替代自己 | 委托接口 | 标出哪些可委托、哪些必须自己判断 | 是否保留最终决策 |\n\n这个表的价值，不在于它多漂亮，而在于它把模糊自责改成了可处理的问题。ADHD 用户不需要再问“为什么我又这样”，而是可以问“我现在哪个接口断了”。这就是从情绪叙事进入产品化叙事的分界线。\n\n## 06 结尾：真正的目标不是更正常，而是更可回流\n\nAI 最容易给人的幻觉，是让一切看起来更顺了。文本更顺，计划更顺，表达更顺，简历更顺，汇报更顺。但顺不等于真，顺也不等于完成。对 ADHD 用户来说，真正重要的是：这套系统有没有让现实更快回话？有没有让你更少在脑内空转？有没有让你保留自己的判断，而不是把自己交给模板？\n\n所以这篇文章最后要把读者带到一个更冷静的位置：不要问 AI 有没有让你变正常，要问它有没有让你更能进入现实。不要问自己是不是终于被修好了，要问哪个接口被外部化了，哪个接口还需要人工守住。\n\n这才是 ADHD × AI 的真正命题。不是治愈，不是神化，不是炫耀效率，而是在一个注意力被系统性采掘的时代，为高方差大脑重新设计进入现实的通道。\n\n## 发布接口\n\n公众号版用这一版作为主稿，保留严肃随笔语气。小红书版只截取开场场景和《生产资料清单》。知乎版重点回答概念边界：AI 不是治疗，而是外部化脚手架。短视频版抓一句话：工具可以翻译你，但不能替你活。评论区唯一问题：你现在最想让 AI 接住的，是哪个执行接口？\n\n## 07 发布前精修补丁：把锋利度落到第一屏\n\n发布前，这篇文章还需要在第一屏做一次更狠的取舍：不要先解释概念，不要先铺知识背景，也不要先证明作者懂 ADHD。第一屏只做一件事：把读者带进一个他们无法否认的现场。\n\n这个现场可以是：工具已经把文本写得很漂亮，但你仍然没有发布；Agent 已经跑出十个方案，但你反而更难选择；AI 把你翻译得像一个稳定的人，但你突然怀疑自己的原始表达是不是被洗掉了。这个现场一旦成立，后面的理论才有必要出现。\n\n因此，正式发布时建议把开头压成三段。第一段写一个动作现场，第二段写这个现场背后的执行接口，第三段抛出本文判断：为什么 AI 公司正在高薪招聘“最不集中的人” 不是一个工具问题，而是一个“谁来接住执行功能、谁来保留判断权、谁来承担现实反馈”的问题。\n\n这也是评论区回流的重点。不要问“你怎么看 AI 和 ADHD”，这个问题太大，读者只会泛泛表达。要问：“你现在最想交给 AI 的，是启动、排序、记忆、时间感、情绪门槛，还是反馈回流？”这个问题足够小，才可能带回可用数据。\n\n如果这篇发布后只得到共鸣，它还只是文章；如果它能让读者说出自己的接口断点，它就是资产；如果它进一步让读者索要表格、提示词或模板，它才真正进入产品化路径。", "chars": 4382, "path": "content-packs/问题395/01_正文.md"}, {"id": "问题370", "number": 370, "title": "问题370：为什么 Deep Work 在 AI 时代没有复活，只是被伪装成了义肢式浅层工作", "priority": "A", "category": "org", "rank": 12, "grade": "A", "desire": 7, "thought": 8, "action": 8, "total": 23, "authenticity": 7, "risk": "中", "failure": "类型模板", "desire_text": "不再把自己伪装成稳定、线性、随叫随到的人，而是想要岗位、会议、招聘和反馈系统真的改接口。", "thought_text": "把“不适合组织”改写成“不适合隐性优先级、即时表达、稳定外壳这套默认组织接口”。", "action_text": "选一个最耗能工作环节，让 AI 写成四句接口说明：输入、输出、确认节奏、反馈格式。", "real_desire": "", "outsourcing_angle": "", "verification_signal": "", "comment": "组织题要从组织咨询语落到个体真实痛点和接口显性化", "article": "# 问题370：为什么 Deep Work 在 AI 时代没有复活，只是被伪装成了义肢式浅层工作\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想被夸“很有创造力”，而是想在会议、岗位、招聘和反馈系统里，不必先把自己伪装成稳定、线性、随叫随到的人。\n\n**所思：** 原来我不是天然不适合组织，我可能只是不适合一套只奖励即时表达、隐性优先级和稳定外壳的组织接口。AI 的意义不是让我更会伪装，而是逼组织把规则说清楚。\n\n**所行：** 选一个最耗你的工作环节，让 AI 写成四句话：任务输入是什么、期望输出是什么、多久确认一次、反馈用什么格式。然后把它当作一次沟通模板。\n\n## 点火开场：发布版第一屏\n\n你最累的可能不是工作本身，而是每天把自己翻译成一个组织更容易接受的版本：开会要像没走神，汇报要像一直在线，优先级不清也要装作懂了。\n\n所以《为什么 Deep Work 在 AI 时代没有复活，只是被伪装成了义肢式浅层工作》这篇不能先讲概念。它要先让读者在第三段前停住：这不就是我吗？我不是没有能力，我是一直在用不适配自己的接口硬扛。\n\n真正的 S 级，不是观点锋利，而是三件事同时发生：读者想要一种新的活法，读者重新解释自己的卡点，读者马上做一个小动作。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 不再把自己伪装成稳定、线性、随叫随到的人，而是想要岗位、会议、招聘和反馈系统真的改接口。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 8 | A级优先级，有明确发布潜力；已发布前精修；标题自带强冲突/强识别 |\n| 所思 | 把“不适合组织”改写成“不适合隐性优先级、即时表达、稳定外壳这套默认组织接口”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 8 | A级优先级，有明确发布潜力；已发布前精修；标题自带强冲突/强识别 |\n| 所行 | 选一个最耗能工作环节，让 AI 写成四句接口说明：输入、输出、确认节奏、反馈格式。 | 结尾必须给一个 3-15 分钟内可执行的 AI/备忘录/微信动作。 | 8 | A级优先级，有明确发布潜力；已发布前精修；标题自带强冲突/强识别 |\n| 电流总分 | 先列触动内容，再综合打分。 | 能否把个人痛感推到组织接口、招聘流程、管理节奏和结构承诺。 | 24 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n这是一篇第二梯队的关键文章：它不一定负责最响的标题，但负责把一个容易被误读的概念校准到可发布、可讨论、可回流的精度。\n\n为什么 Deep Work 在 AI 时代没有复活，只是被伪装成了义肢式浅层工作。这个题的核心不是“ADHD 很痛，AI 很有用”这种容易写烂的判断，而是：AI 让浅层工作更像深度工作，ADHD 更需要识别真假投入。如果这句话讲不清，后面所有平台版、口播版、评论问题和模板入口都会变成包装；如果讲清了，这篇文章就能成为一个真正的闭环资产。\n\n## 01 开场：先从一个不舒服的场景进入\n\n想象一个很具体的画面：你打开 AI，输入需求，几秒钟后它给你一份结构清楚、语气稳定、看起来比你本人更像“正常职场人”的答案。你应该高兴，因为它确实帮你省掉了很多步骤；但你心里又会冒出一个更暗的念头：如果它这么快就能把我翻译好，那我这些年到底算什么？\n\n这个问题的刺就在这里。AI 并没有简单地帮助 ADHD，它也重新定义了 ADHD 的痛感。过去你卡住，是因为启动难、排序难、时间感差、工作记忆漏水；现在工具可以接走很多中间步骤，于是新的问题出现了：工具接走以后，你的主体性、判断力、风险感和真实风格还剩多少？\n\n所以这篇不能写成工具赞歌。它必须承认 AI 的帮助，也必须追问帮助的代价。它不能让读者只获得“我被理解了”的安慰，而要让读者意识到：自己真正需要设计的不是一个更会输出的工具，而是一个不会吞掉判断权的外部执行系统。\n\n## 02 核心判断：问题不在能力，而在接口\n\nADHD 最容易被误解成能力问题。拖延被看成懒，分心被看成不认真，情绪波动被看成不成熟，计划失效被看成不负责任。但在很多真实场景里，当事人并不是不知道目标，也不是没有能力，而是缺少一条从目标到动作的稳定通道。\n\n这条通道，我更愿意叫它“执行接口”。它包括启动接口、排序接口、时间接口、工作记忆接口、情绪接口、反馈接口和委托接口。普通人可能也会卡，但 ADHD 用户会更早、更频繁、更痛地感到这些接口失灵。\n\nAI 的价值，正是在这里出现的。它可以把抽象目标切成步骤，把脑内混乱压成结构，把空白页面变成可修改草稿，把一团焦虑翻译成一个五分钟动作。它不是把你治好，而是暂时补上某个接口。\n\n但这也解释了为什么 AI 有时会让人更痛苦。因为一旦工具补上了接口，社会就更容易说：你看，工具都有了，你怎么还不行？于是原本属于环境、系统和执行功能的摩擦，又被重新塞回个人道德里。\n\n## 03 这个题的真正锋口：义肢式浅层工作\n\n义肢式浅层工作 不是一个装饰性概念，而是这篇文章必须守住的锋口。它要求我们不要在“AI 能帮忙”这个浅层判断上停下，而要继续问：它帮的是哪一段？它有没有制造新的依赖？它有没有把高方差风格洗成神经典型风格？它有没有把现实反馈变得更清楚，还是只让半成品变多？\n\n对 ADHD 用户来说，最危险的不是工具不好用，而是工具太顺。太顺的工具会让人误以为自己已经完成了现实动作：生成了计划，就像开始了；写出了草稿，就像发布了；整理了知识库，就像做出了判断；让 Agent 跑了一轮，就像自己已经承担了风险。\n\n但现实不是这样运转的。现实只承认动作、交付、对话、反馈和后果。一个 AI 工作流如果不能把人送到这些东西面前，它再漂亮也只是新的缓冲区。\n\n所以这篇文章的锋口要落在一句话上：AI 可以接走摩擦，但不能替你承担判断；Agent 可以执行动作，但不能替你承担赌注；工具可以翻译你，但不能替你活。\n\n## 04 三个校准：防止写成营销号\n\n第一，不能把 ADHD 写成天才徽章。高方差确实可能带来发散、联想、敏感和异常问题感，但这些能力只有在合适接口里才会变成产出。没有接口，高方差只是高损耗。\n\n第二，不能把 AI 写成治疗方案。AI 可以帮助某些任务场景里的执行功能外部化，但它不能替代诊断、治疗、药物、睡眠、稳定关系和真实工作条件。把 AI 写成万能药，最后只会制造新的羞耻。\n\n第三，不能把内容写成纯共鸣。共鸣是入口，不是终点。读者说“太真实了”只能说明文章击中了痛点；读者能说出“我卡在启动接口，我需要一个五分钟动作”，才说明文章完成了转译。\n\n这三个校准决定了《问题XXX》系列和普通 ADHD 内容的区别：它不是贩卖身份，不是贩卖焦虑，也不是贩卖工具，而是在搭一套能把痛感转成动作、动作转成反馈、反馈转成资产的系统。\n\n## 05 可执行判断：一篇文章必须留下一个动作\n\n这篇文章最终要留下的动作，是一张《真假深度工作表》。它不需要复杂，甚至越简单越好。表格只问四件事：我现在卡在哪里；这是哪个执行接口断了；AI 可以接走哪一个最小动作；48 小时内用什么现实信号验证它。\n\n| 当前卡点 | 执行接口 | AI/Agent 最小动作 | 48 小时现实信号 |\n|---|---|---|---|\n| 我一直想但没开始 | 启动接口 | 拆成一个五分钟动作 | 是否真的打开并完成第一步 |\n| 我同时有太多方向 | 排序接口 | 压成三个选项并给取舍理由 | 是否能放弃两个方向 |\n| 我生成了很多内容 | 反馈接口 | 设计一次发布、询问或交付 | 是否收到真实回应 |\n| 我怕工具替代自己 | 委托接口 | 标出哪些可委托、哪些必须自己判断 | 是否保留最终决策 |\n\n这个表的价值，不在于它多漂亮，而在于它把模糊自责改成了可处理的问题。ADHD 用户不需要再问“为什么我又这样”，而是可以问“我现在哪个接口断了”。这就是从情绪叙事进入产品化叙事的分界线。\n\n## 06 结尾：真正的目标不是更正常，而是更可回流\n\nAI 最容易给人的幻觉，是让一切看起来更顺了。文本更顺，计划更顺，表达更顺，简历更顺，汇报更顺。但顺不等于真，顺也不等于完成。对 ADHD 用户来说，真正重要的是：这套系统有没有让现实更快回话？有没有让你更少在脑内空转？有没有让你保留自己的判断，而不是把自己交给模板？\n\n所以这篇文章最后要把读者带到一个更冷静的位置：不要问 AI 有没有让你变正常，要问它有没有让你更能进入现实。不要问自己是不是终于被修好了，要问哪个接口被外部化了，哪个接口还需要人工守住。\n\n这才是 ADHD × AI 的真正命题。不是治愈，不是神化，不是炫耀效率，而是在一个注意力被系统性采掘的时代，为高方差大脑重新设计进入现实的通道。\n\n## 发布接口\n\n公众号版用这一版作为主稿，保留严肃随笔语气。小红书版只截取开场场景和《真假深度工作表》。知乎版重点回答概念边界：AI 不是治疗，而是外部化脚手架。短视频版抓一句话：工具可以翻译你，但不能替你活。评论区唯一问题：你现在最想让 AI 接住的，是哪个执行接口？\n\n## 07 发布前精修补丁：把锋利度落到第一屏\n\n发布前，这篇文章还需要在第一屏做一次更狠的取舍：不要先解释概念，不要先铺知识背景，也不要先证明作者懂 ADHD。第一屏只做一件事：把读者带进一个他们无法否认的现场。\n\n这个现场可以是：工具已经把文本写得很漂亮，但你仍然没有发布；Agent 已经跑出十个方案，但你反而更难选择；AI 把你翻译得像一个稳定的人，但你突然怀疑自己的原始表达是不是被洗掉了。这个现场一旦成立，后面的理论才有必要出现。\n\n因此，正式发布时建议把开头压成三段。第一段写一个动作现场，第二段写这个现场背后的执行接口，第三段抛出本文判断：为什么 Deep Work 在 AI 时代没有复活，只是被伪装成了义肢式浅层工作 不是一个工具问题，而是一个“谁来接住执行功能、谁来保留判断权、谁来承担现实反馈”的问题。\n\n这也是评论区回流的重点。不要问“你怎么看 AI 和 ADHD”，这个问题太大，读者只会泛泛表达。要问：“你现在最想交给 AI 的，是启动、排序、记忆、时间感、情绪门槛，还是反馈回流？”这个问题足够小，才可能带回可用数据。\n\n如果这篇发布后只得到共鸣，它还只是文章；如果它能让读者说出自己的接口断点，它就是资产；如果它进一步让读者索要表格、提示词或模板，它才真正进入产品化路径。", "chars": 4418, "path": "content-packs/问题370/01_正文.md"}, {"id": "问题377", "number": 377, "title": "问题377：为什么 AI 伦理官、治理岗、异常识别岗，天然需要神经多样性认知，却容易被招聘流程淘汰", "priority": "A", "category": "org", "rank": 13, "grade": "A", "desire": 7, "thought": 8, "action": 8, "total": 23, "authenticity": 7, "risk": "中", "failure": "类型模板", "desire_text": "不再把自己伪装成稳定、线性、随叫随到的人，而是想要岗位、会议、招聘和反馈系统真的改接口。", "thought_text": "把“不适合组织”改写成“不适合隐性优先级、即时表达、稳定外壳这套默认组织接口”。", "action_text": "选一个最耗能工作环节，让 AI 写成四句接口说明：输入、输出、确认节奏、反馈格式。", "real_desire": "", "outsourcing_angle": "", "verification_signal": "", "comment": "组织题要从组织咨询语落到个体真实痛点和接口显性化", "article": "# 问题377：为什么 AI 伦理官、治理岗、异常识别岗，天然需要神经多样性认知，却容易被招聘流程淘汰\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想被夸“很有创造力”，而是想在会议、岗位、招聘和反馈系统里，不必先把自己伪装成稳定、线性、随叫随到的人。\n\n**所思：** 原来我不是天然不适合组织，我可能只是不适合一套只奖励即时表达、隐性优先级和稳定外壳的组织接口。AI 的意义不是让我更会伪装，而是逼组织把规则说清楚。\n\n**所行：** 选一个最耗你的工作环节，让 AI 写成四句话：任务输入是什么、期望输出是什么、多久确认一次、反馈用什么格式。然后把它当作一次沟通模板。\n\n## 点火开场：发布版第一屏\n\n你最累的可能不是工作本身，而是每天把自己翻译成一个组织更容易接受的版本：开会要像没走神，汇报要像一直在线，优先级不清也要装作懂了。\n\n所以《为什么 AI 伦理官、治理岗、异常识别岗，天然需要神经多样性认知，却容易被招聘流程淘汰》这篇不能先讲概念。它要先让读者在第三段前停住：这不就是我吗？我不是没有能力，我是一直在用不适配自己的接口硬扛。\n\n真正的 S 级，不是观点锋利，而是三件事同时发生：读者想要一种新的活法，读者重新解释自己的卡点，读者马上做一个小动作。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 不再把自己伪装成稳定、线性、随叫随到的人，而是想要岗位、会议、招聘和反馈系统真的改接口。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 8 | A级优先级，有明确发布潜力；已发布前精修；标题自带强冲突/强识别 |\n| 所思 | 把“不适合组织”改写成“不适合隐性优先级、即时表达、稳定外壳这套默认组织接口”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 8 | A级优先级，有明确发布潜力；已发布前精修；标题自带强冲突/强识别 |\n| 所行 | 选一个最耗能工作环节，让 AI 写成四句接口说明：输入、输出、确认节奏、反馈格式。 | 结尾必须给一个 3-15 分钟内可执行的 AI/备忘录/微信动作。 | 8 | A级优先级，有明确发布潜力；已发布前精修；标题自带强冲突/强识别 |\n| 电流总分 | 先列触动内容，再综合打分。 | 能否把个人痛感推到组织接口、招聘流程、管理节奏和结构承诺。 | 24 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n这是一篇第二梯队的关键文章：它不一定负责最响的标题，但负责把一个容易被误读的概念校准到可发布、可讨论、可回流的精度。\n\n为什么 AI 伦理官、治理岗、异常识别岗，天然需要神经多样性认知，却容易被招聘流程淘汰。这个题的核心不是“ADHD 很痛，AI 很有用”这种容易写烂的判断，而是：AI 治理需要异常风险感，却常被标准招聘筛掉。如果这句话讲不清，后面所有平台版、口播版、评论问题和模板入口都会变成包装；如果讲清了，这篇文章就能成为一个真正的闭环资产。\n\n## 01 开场：先从一个不舒服的场景进入\n\n想象一个很具体的画面：你打开 AI，输入需求，几秒钟后它给你一份结构清楚、语气稳定、看起来比你本人更像“正常职场人”的答案。你应该高兴，因为它确实帮你省掉了很多步骤；但你心里又会冒出一个更暗的念头：如果它这么快就能把我翻译好，那我这些年到底算什么？\n\n这个问题的刺就在这里。AI 并没有简单地帮助 ADHD，它也重新定义了 ADHD 的痛感。过去你卡住，是因为启动难、排序难、时间感差、工作记忆漏水；现在工具可以接走很多中间步骤，于是新的问题出现了：工具接走以后，你的主体性、判断力、风险感和真实风格还剩多少？\n\n所以这篇不能写成工具赞歌。它必须承认 AI 的帮助，也必须追问帮助的代价。它不能让读者只获得“我被理解了”的安慰，而要让读者意识到：自己真正需要设计的不是一个更会输出的工具，而是一个不会吞掉判断权的外部执行系统。\n\n## 02 核心判断：问题不在能力，而在接口\n\nADHD 最容易被误解成能力问题。拖延被看成懒，分心被看成不认真，情绪波动被看成不成熟，计划失效被看成不负责任。但在很多真实场景里，当事人并不是不知道目标，也不是没有能力，而是缺少一条从目标到动作的稳定通道。\n\n这条通道，我更愿意叫它“执行接口”。它包括启动接口、排序接口、时间接口、工作记忆接口、情绪接口、反馈接口和委托接口。普通人可能也会卡，但 ADHD 用户会更早、更频繁、更痛地感到这些接口失灵。\n\nAI 的价值，正是在这里出现的。它可以把抽象目标切成步骤，把脑内混乱压成结构，把空白页面变成可修改草稿，把一团焦虑翻译成一个五分钟动作。它不是把你治好，而是暂时补上某个接口。\n\n但这也解释了为什么 AI 有时会让人更痛苦。因为一旦工具补上了接口，社会就更容易说：你看，工具都有了，你怎么还不行？于是原本属于环境、系统和执行功能的摩擦，又被重新塞回个人道德里。\n\n## 03 这个题的真正锋口：治理岗位淘汰\n\n治理岗位淘汰 不是一个装饰性概念，而是这篇文章必须守住的锋口。它要求我们不要在“AI 能帮忙”这个浅层判断上停下，而要继续问：它帮的是哪一段？它有没有制造新的依赖？它有没有把高方差风格洗成神经典型风格？它有没有把现实反馈变得更清楚，还是只让半成品变多？\n\n对 ADHD 用户来说，最危险的不是工具不好用，而是工具太顺。太顺的工具会让人误以为自己已经完成了现实动作：生成了计划，就像开始了；写出了草稿，就像发布了；整理了知识库，就像做出了判断；让 Agent 跑了一轮，就像自己已经承担了风险。\n\n但现实不是这样运转的。现实只承认动作、交付、对话、反馈和后果。一个 AI 工作流如果不能把人送到这些东西面前，它再漂亮也只是新的缓冲区。\n\n所以这篇文章的锋口要落在一句话上：AI 可以接走摩擦，但不能替你承担判断；Agent 可以执行动作，但不能替你承担赌注；工具可以翻译你，但不能替你活。\n\n## 04 三个校准：防止写成营销号\n\n第一，不能把 ADHD 写成天才徽章。高方差确实可能带来发散、联想、敏感和异常问题感，但这些能力只有在合适接口里才会变成产出。没有接口，高方差只是高损耗。\n\n第二，不能把 AI 写成治疗方案。AI 可以帮助某些任务场景里的执行功能外部化，但它不能替代诊断、治疗、药物、睡眠、稳定关系和真实工作条件。把 AI 写成万能药，最后只会制造新的羞耻。\n\n第三，不能把内容写成纯共鸣。共鸣是入口，不是终点。读者说“太真实了”只能说明文章击中了痛点；读者能说出“我卡在启动接口，我需要一个五分钟动作”，才说明文章完成了转译。\n\n这三个校准决定了《问题XXX》系列和普通 ADHD 内容的区别：它不是贩卖身份，不是贩卖焦虑，也不是贩卖工具，而是在搭一套能把痛感转成动作、动作转成反馈、反馈转成资产的系统。\n\n## 05 可执行判断：一篇文章必须留下一个动作\n\n这篇文章最终要留下的动作，是一张《治理岗位适配表》。它不需要复杂，甚至越简单越好。表格只问四件事：我现在卡在哪里；这是哪个执行接口断了；AI 可以接走哪一个最小动作；48 小时内用什么现实信号验证它。\n\n| 当前卡点 | 执行接口 | AI/Agent 最小动作 | 48 小时现实信号 |\n|---|---|---|---|\n| 我一直想但没开始 | 启动接口 | 拆成一个五分钟动作 | 是否真的打开并完成第一步 |\n| 我同时有太多方向 | 排序接口 | 压成三个选项并给取舍理由 | 是否能放弃两个方向 |\n| 我生成了很多内容 | 反馈接口 | 设计一次发布、询问或交付 | 是否收到真实回应 |\n| 我怕工具替代自己 | 委托接口 | 标出哪些可委托、哪些必须自己判断 | 是否保留最终决策 |\n\n这个表的价值，不在于它多漂亮，而在于它把模糊自责改成了可处理的问题。ADHD 用户不需要再问“为什么我又这样”，而是可以问“我现在哪个接口断了”。这就是从情绪叙事进入产品化叙事的分界线。\n\n## 06 结尾：真正的目标不是更正常，而是更可回流\n\nAI 最容易给人的幻觉，是让一切看起来更顺了。文本更顺，计划更顺，表达更顺，简历更顺，汇报更顺。但顺不等于真，顺也不等于完成。对 ADHD 用户来说，真正重要的是：这套系统有没有让现实更快回话？有没有让你更少在脑内空转？有没有让你保留自己的判断，而不是把自己交给模板？\n\n所以这篇文章最后要把读者带到一个更冷静的位置：不要问 AI 有没有让你变正常，要问它有没有让你更能进入现实。不要问自己是不是终于被修好了，要问哪个接口被外部化了，哪个接口还需要人工守住。\n\n这才是 ADHD × AI 的真正命题。不是治愈，不是神化，不是炫耀效率，而是在一个注意力被系统性采掘的时代，为高方差大脑重新设计进入现实的通道。\n\n## 发布接口\n\n公众号版用这一版作为主稿，保留严肃随笔语气。小红书版只截取开场场景和《治理岗位适配表》。知乎版重点回答概念边界：AI 不是治疗，而是外部化脚手架。短视频版抓一句话：工具可以翻译你，但不能替你活。评论区唯一问题：你现在最想让 AI 接住的，是哪个执行接口？\n\n## 07 发布前精修补丁：把锋利度落到第一屏\n\n发布前，这篇文章还需要在第一屏做一次更狠的取舍：不要先解释概念，不要先铺知识背景，也不要先证明作者懂 ADHD。第一屏只做一件事：把读者带进一个他们无法否认的现场。\n\n这个现场可以是：工具已经把文本写得很漂亮，但你仍然没有发布；Agent 已经跑出十个方案，但你反而更难选择；AI 把你翻译得像一个稳定的人，但你突然怀疑自己的原始表达是不是被洗掉了。这个现场一旦成立，后面的理论才有必要出现。\n\n因此，正式发布时建议把开头压成三段。第一段写一个动作现场，第二段写这个现场背后的执行接口，第三段抛出本文判断：为什么 AI 伦理官、治理岗、异常识别岗，天然需要神经多样性认知，却容易被招聘流程淘汰 不是一个工具问题，而是一个“谁来接住执行功能、谁来保留判断权、谁来承担现实反馈”的问题。\n\n这也是评论区回流的重点。不要问“你怎么看 AI 和 ADHD”，这个问题太大，读者只会泛泛表达。要问：“你现在最想交给 AI 的，是启动、排序、记忆、时间感、情绪门槛，还是反馈回流？”这个问题足够小，才可能带回可用数据。\n\n如果这篇发布后只得到共鸣，它还只是文章；如果它能让读者说出自己的接口断点，它就是资产；如果它进一步让读者索要表格、提示词或模板，它才真正进入产品化路径。", "chars": 4421, "path": "content-packs/问题377/01_正文.md"}, {"id": "问题289", "number": 289, "title": "问题289：为什么 ADHD 药物可能是救命药，但不是人生总解决方案", "priority": "A", "category": "diagnosis", "rank": 14, "grade": "B", "desire": 7, "thought": 7, "action": 7, "total": 21, "authenticity": 8, "risk": "低", "failure": "类型模板、诊断模板", "desire_text": "被认真区分和支持：不是被一句“你可能是 ADHD”安慰，而是把长期痛感、功能损害、专业评估和现实照护接成一条路。", "thought_text": "把“我是不是有问题”改写成“症状、场景、样本偏差、诊断边界和支持系统之间哪一环断了”。", "action_text": "把最近一次失控场景写成四栏：发生了什么、损害了什么、持续多久、下一步该问医生/专业人士/AI 什么。", "real_desire": "", "outsourcing_angle": "", "verification_signal": "", "comment": "基础评分已生成；建议发布前人工复核题目级痛点。", "article": "# 问题289：为什么 ADHD 药物可能是救命药，但不是人生总解决方案\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想给自己贴一个更响的标签，而是想终于有人把你这些年“明明聪明却总在简单处崩掉”的经历，当成一个需要被认真处理的问题。\n\n**所思：** 原来我需要的不是一次身份确认，而是一条从痛感、症状、场景、专业评估到日常支持的路径。标签只是入口，接口才是出口。\n\n**所行：** 打开备忘录，写下最近一次“我明明想做却启动不了”的具体场景，再让 AI 帮你分成四栏：发生了什么、损害了什么、我怀疑什么、下一步该问谁。\n\n## 点火开场：发布版第一屏\n\n你可能并不是真的想问“我是不是 ADHD”。你更想问的是：为什么我能把一个复杂问题想得很透，却会在回一条微信、打开一个文档、预约一次检查这种小事上反复失败。\n\n所以《为什么 ADHD 药物可能是救命药，但不是人生总解决方案》这篇不能先讲概念。它要先让读者在第三段前停住：这不就是我吗？我不是没有能力，我是一直在用不适配自己的接口硬扛。\n\n真正的 S 级，不是观点锋利，而是三件事同时发生：读者想要一种新的活法，读者重新解释自己的卡点，读者马上做一个小动作。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 被认真区分和支持：不是被一句“你可能是 ADHD”安慰，而是把长期痛感、功能损害、专业评估和现实照护接成一条路。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 7 | A级优先级，有明确发布潜力；已发布前精修；诊断/医疗边界明确 |\n| 所思 | 把“我是不是有问题”改写成“症状、场景、样本偏差、诊断边界和支持系统之间哪一环断了”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 7 | A级优先级，有明确发布潜力；已发布前精修；诊断/医疗边界明确 |\n| 所行 | 把最近一次失控场景写成四栏：发生了什么、损害了什么、持续多久、下一步该问医生/专业人士/AI 什么。 | 结尾必须给一个 3-15 分钟内可执行的 AI/备忘录/微信动作。 | 7 | A级优先级，有明确发布潜力；已发布前精修；诊断/医疗边界明确 |\n| 电流总分 | 先列触动内容，再综合打分。 | 诊断边界、误诊漏诊、AI 模型偏差或医疗支持缺口越具体，分数越高。 | 21 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n这是一篇第二梯队的关键文章：它不一定负责最响的标题，但负责把一个容易被误读的概念校准到可发布、可讨论、可回流的精度。\n\n为什么 ADHD 药物可能是救命药，但不是人生总解决方案。这个题的核心不是“ADHD 很痛，AI 很有用”这种容易写烂的判断，而是：药物可能救命，但药后人生仍需要执行功能基础设施。如果这句话讲不清，后面所有平台版、口播版、评论问题和模板入口都会变成包装；如果讲清了，这篇文章就能成为一个真正的闭环资产。\n\n## 01 开场：先从一个不舒服的场景进入\n\n想象一个很具体的画面：你打开 AI，输入需求，几秒钟后它给你一份结构清楚、语气稳定、看起来比你本人更像“正常职场人”的答案。你应该高兴，因为它确实帮你省掉了很多步骤；但你心里又会冒出一个更暗的念头：如果它这么快就能把我翻译好，那我这些年到底算什么？\n\n这个问题的刺就在这里。AI 并没有简单地帮助 ADHD，它也重新定义了 ADHD 的痛感。过去你卡住，是因为启动难、排序难、时间感差、工作记忆漏水；现在工具可以接走很多中间步骤，于是新的问题出现了：工具接走以后，你的主体性、判断力、风险感和真实风格还剩多少？\n\n所以这篇不能写成工具赞歌。它必须承认 AI 的帮助，也必须追问帮助的代价。它不能让读者只获得“我被理解了”的安慰，而要让读者意识到：自己真正需要设计的不是一个更会输出的工具，而是一个不会吞掉判断权的外部执行系统。\n\n## 02 核心判断：问题不在能力，而在接口\n\nADHD 最容易被误解成能力问题。拖延被看成懒，分心被看成不认真，情绪波动被看成不成熟，计划失效被看成不负责任。但在很多真实场景里，当事人并不是不知道目标，也不是没有能力，而是缺少一条从目标到动作的稳定通道。\n\n这条通道，我更愿意叫它“执行接口”。它包括启动接口、排序接口、时间接口、工作记忆接口、情绪接口、反馈接口和委托接口。普通人可能也会卡，但 ADHD 用户会更早、更频繁、更痛地感到这些接口失灵。\n\nAI 的价值，正是在这里出现的。它可以把抽象目标切成步骤，把脑内混乱压成结构，把空白页面变成可修改草稿，把一团焦虑翻译成一个五分钟动作。它不是把你治好，而是暂时补上某个接口。\n\n但这也解释了为什么 AI 有时会让人更痛苦。因为一旦工具补上了接口，社会就更容易说：你看，工具都有了，你怎么还不行？于是原本属于环境、系统和执行功能的摩擦，又被重新塞回个人道德里。\n\n## 03 这个题的真正锋口：药物边界\n\n药物边界 不是一个装饰性概念，而是这篇文章必须守住的锋口。它要求我们不要在“AI 能帮忙”这个浅层判断上停下，而要继续问：它帮的是哪一段？它有没有制造新的依赖？它有没有把高方差风格洗成神经典型风格？它有没有把现实反馈变得更清楚，还是只让半成品变多？\n\n对 ADHD 用户来说，最危险的不是工具不好用，而是工具太顺。太顺的工具会让人误以为自己已经完成了现实动作：生成了计划，就像开始了；写出了草稿，就像发布了；整理了知识库，就像做出了判断；让 Agent 跑了一轮，就像自己已经承担了风险。\n\n但现实不是这样运转的。现实只承认动作、交付、对话、反馈和后果。一个 AI 工作流如果不能把人送到这些东西面前，它再漂亮也只是新的缓冲区。\n\n所以这篇文章的锋口要落在一句话上：AI 可以接走摩擦，但不能替你承担判断；Agent 可以执行动作，但不能替你承担赌注；工具可以翻译你，但不能替你活。\n\n## 04 三个校准：防止写成营销号\n\n第一，不能把 ADHD 写成天才徽章。高方差确实可能带来发散、联想、敏感和异常问题感，但这些能力只有在合适接口里才会变成产出。没有接口，高方差只是高损耗。\n\n第二，不能把 AI 写成治疗方案。AI 可以帮助某些任务场景里的执行功能外部化，但它不能替代诊断、治疗、药物、睡眠、稳定关系和真实工作条件。把 AI 写成万能药，最后只会制造新的羞耻。\n\n第三，不能把内容写成纯共鸣。共鸣是入口，不是终点。读者说“太真实了”只能说明文章击中了痛点；读者能说出“我卡在启动接口，我需要一个五分钟动作”，才说明文章完成了转译。\n\n这三个校准决定了《问题XXX》系列和普通 ADHD 内容的区别：它不是贩卖身份，不是贩卖焦虑，也不是贩卖工具，而是在搭一套能把痛感转成动作、动作转成反馈、反馈转成资产的系统。\n\n## 05 可执行判断：一篇文章必须留下一个动作\n\n这篇文章最终要留下的动作，是一张《药后人生操作系统》。它不需要复杂，甚至越简单越好。表格只问四件事：我现在卡在哪里；这是哪个执行接口断了；AI 可以接走哪一个最小动作；48 小时内用什么现实信号验证它。\n\n| 当前卡点 | 执行接口 | AI/Agent 最小动作 | 48 小时现实信号 |\n|---|---|---|---|\n| 我一直想但没开始 | 启动接口 | 拆成一个五分钟动作 | 是否真的打开并完成第一步 |\n| 我同时有太多方向 | 排序接口 | 压成三个选项并给取舍理由 | 是否能放弃两个方向 |\n| 我生成了很多内容 | 反馈接口 | 设计一次发布、询问或交付 | 是否收到真实回应 |\n| 我怕工具替代自己 | 委托接口 | 标出哪些可委托、哪些必须自己判断 | 是否保留最终决策 |\n\n这个表的价值，不在于它多漂亮，而在于它把模糊自责改成了可处理的问题。ADHD 用户不需要再问“为什么我又这样”，而是可以问“我现在哪个接口断了”。这就是从情绪叙事进入产品化叙事的分界线。\n\n## 06 结尾：真正的目标不是更正常，而是更可回流\n\nAI 最容易给人的幻觉，是让一切看起来更顺了。文本更顺，计划更顺，表达更顺，简历更顺，汇报更顺。但顺不等于真，顺也不等于完成。对 ADHD 用户来说，真正重要的是：这套系统有没有让现实更快回话？有没有让你更少在脑内空转？有没有让你保留自己的判断，而不是把自己交给模板？\n\n所以这篇文章最后要把读者带到一个更冷静的位置：不要问 AI 有没有让你变正常，要问它有没有让你更能进入现实。不要问自己是不是终于被修好了，要问哪个接口被外部化了，哪个接口还需要人工守住。\n\n这才是 ADHD × AI 的真正命题。不是治愈，不是神化，不是炫耀效率，而是在一个注意力被系统性采掘的时代，为高方差大脑重新设计进入现实的通道。\n\n## 发布接口\n\n公众号版用这一版作为主稿，保留严肃随笔语气。小红书版只截取开场场景和《药后人生操作系统》。知乎版重点回答概念边界：AI 不是治疗，而是外部化脚手架。短视频版抓一句话：工具可以翻译你，但不能替你活。评论区唯一问题：你现在最想让 AI 接住的，是哪个执行接口？\n\n## 07 发布前精修补丁：把锋利度落到第一屏\n\n发布前，这篇文章还需要在第一屏做一次更狠的取舍：不要先解释概念，不要先铺知识背景，也不要先证明作者懂 ADHD。第一屏只做一件事：把读者带进一个他们无法否认的现场。\n\n这个现场可以是：工具已经把文本写得很漂亮，但你仍然没有发布；Agent 已经跑出十个方案，但你反而更难选择；AI 把你翻译得像一个稳定的人，但你突然怀疑自己的原始表达是不是被洗掉了。这个现场一旦成立，后面的理论才有必要出现。\n\n因此，正式发布时建议把开头压成三段。第一段写一个动作现场，第二段写这个现场背后的执行接口，第三段抛出本文判断：为什么 ADHD 药物可能是救命药，但不是人生总解决方案 不是一个工具问题，而是一个“谁来接住执行功能、谁来保留判断权、谁来承担现实反馈”的问题。\n\n这也是评论区回流的重点。不要问“你怎么看 AI 和 ADHD”，这个问题太大，读者只会泛泛表达。要问：“你现在最想交给 AI 的，是启动、排序、记忆、时间感、情绪门槛，还是反馈回流？”这个问题足够小，才可能带回可用数据。\n\n如果这篇发布后只得到共鸣，它还只是文章；如果它能让读者说出自己的接口断点，它就是资产；如果它进一步让读者索要表格、提示词或模板，它才真正进入产品化路径。", "chars": 4384, "path": "content-packs/问题289/01_正文.md"}, {"id": "问题313", "number": 313, "title": "问题313：为什么“小红书/TikTok 确诊 ADHD”既在去污名，也在制造新的确认偏误", "priority": "A", "category": "self", "rank": 15, "grade": "B", "desire": 7, "thought": 7, "action": 7, "total": 21, "authenticity": 7, "risk": "中", "failure": "类型模板、泛共鸣", "desire_text": "不再把聪明和失控撕裂地活着，而是想知道自己的高方差大脑怎样接上现实。", "thought_text": "把“我就是废/懒/怪”改写成“我的启动、排序、反馈、能量或环境接口错配了”。", "action_text": "打开备忘录写下当前最卡的一件事，让 AI 拆成一个五分钟动作和一个现实反馈信号。", "real_desire": "", "outsourcing_angle": "", "verification_signal": "", "comment": "self 题要落到具体羞耻现场，不要泛共鸣", "article": "# 问题313：为什么“小红书/TikTok 确诊 ADHD”既在去污名，也在制造新的确认偏误\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想被安慰“你没有问题”，而是想终于找到一种方式，让自己这种不稳定但高能量的系统可以被接住。\n\n**所思：** 原来我的问题不只是性格、习惯或意志力，而是输入、启动、反馈和回流接口长期错配。\n\n**所行：** 写下一个最近最反复的卡点，让 AI 帮你翻译成三句话：我想要什么、我卡在哪里、下一步三分钟做什么。\n\n## 点火开场：发布版第一屏\n\n你可能已经听过太多建议：自律一点、规划一点、坚持一点。但真正的问题是，你不是不知道这些道理，而是每次要把道理变成动作时，系统就断电。\n\n所以《为什么“小红书/TikTok 确诊 ADHD”既在去污名，也在制造新的确认偏误》这篇不能先讲概念。它要先让读者在第三段前停住：这不就是我吗？我不是没有能力，我是一直在用不适配自己的接口硬扛。\n\n真正的 S 级，不是观点锋利，而是三件事同时发生：读者想要一种新的活法，读者重新解释自己的卡点，读者马上做一个小动作。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 不再把聪明和失控撕裂地活着，而是想知道自己的高方差大脑怎样接上现实。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 7 | A级优先级，有明确发布潜力；已发布前精修 |\n| 所思 | 把“我就是废/懒/怪”改写成“我的启动、排序、反馈、能量或环境接口错配了”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 7 | A级优先级，有明确发布潜力；已发布前精修 |\n| 所行 | 打开备忘录写下当前最卡的一件事，让 AI 拆成一个五分钟动作和一个现实反馈信号。 | 结尾必须给一个 3-15 分钟内可执行的 AI/备忘录/微信动作。 | 7 | A级优先级，有明确发布潜力；已发布前精修 |\n| 电流总分 | 先列触动内容，再综合打分。 | 越能给出具体生活现场、接口解释和立即动作，分数越高。 | 21 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n这是一篇第二梯队的关键文章：它不一定负责最响的标题，但负责把一个容易被误读的概念校准到可发布、可讨论、可回流的精度。\n\n为什么“小红书/TikTok 确诊 ADHD”既在去污名，也在制造新的确认偏误。这个题的核心不是“ADHD 很痛，AI 很有用”这种容易写烂的判断，而是：去污名和确认偏误同时发生，问题是如何保留入口又守住边界。如果这句话讲不清，后面所有平台版、口播版、评论问题和模板入口都会变成包装；如果讲清了，这篇文章就能成为一个真正的闭环资产。\n\n## 01 开场：先从一个不舒服的场景进入\n\n想象一个很具体的画面：你打开 AI，输入需求，几秒钟后它给你一份结构清楚、语气稳定、看起来比你本人更像“正常职场人”的答案。你应该高兴，因为它确实帮你省掉了很多步骤；但你心里又会冒出一个更暗的念头：如果它这么快就能把我翻译好，那我这些年到底算什么？\n\n这个问题的刺就在这里。AI 并没有简单地帮助 ADHD，它也重新定义了 ADHD 的痛感。过去你卡住，是因为启动难、排序难、时间感差、工作记忆漏水；现在工具可以接走很多中间步骤，于是新的问题出现了：工具接走以后，你的主体性、判断力、风险感和真实风格还剩多少？\n\n所以这篇不能写成工具赞歌。它必须承认 AI 的帮助，也必须追问帮助的代价。它不能让读者只获得“我被理解了”的安慰，而要让读者意识到：自己真正需要设计的不是一个更会输出的工具，而是一个不会吞掉判断权的外部执行系统。\n\n## 02 核心判断：问题不在能力，而在接口\n\nADHD 最容易被误解成能力问题。拖延被看成懒，分心被看成不认真，情绪波动被看成不成熟，计划失效被看成不负责任。但在很多真实场景里，当事人并不是不知道目标，也不是没有能力，而是缺少一条从目标到动作的稳定通道。\n\n这条通道，我更愿意叫它“执行接口”。它包括启动接口、排序接口、时间接口、工作记忆接口、情绪接口、反馈接口和委托接口。普通人可能也会卡，但 ADHD 用户会更早、更频繁、更痛地感到这些接口失灵。\n\nAI 的价值，正是在这里出现的。它可以把抽象目标切成步骤，把脑内混乱压成结构，把空白页面变成可修改草稿，把一团焦虑翻译成一个五分钟动作。它不是把你治好，而是暂时补上某个接口。\n\n但这也解释了为什么 AI 有时会让人更痛苦。因为一旦工具补上了接口，社会就更容易说：你看，工具都有了，你怎么还不行？于是原本属于环境、系统和执行功能的摩擦，又被重新塞回个
