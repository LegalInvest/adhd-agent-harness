-|---:|---|\n| 所欲 | 既想要 AI 接住启动、排序、记忆和表达，又不想把判断权、自我效能和真实风格一起交出去。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 9 | S级优先级带来更强发布势能；已发布前精修；标题自带强冲突/强识别 |\n| 所思 | 把“我终于有工具了”改写成“这是外部前额叶、执行功能假肢，也可能制造依赖阈值和主体性稀释”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 8 | S级优先级带来更强发布势能；已发布前精修；标题自带强冲突/强识别 |\n| 所行 | 把一个任务分成可委托、必须自己判断、需要现实反馈三栏，再只交给 AI 最小一块。 | 结尾必须给一个 3-15 分钟内可执行的 AI/备忘录/微信动作。 | 8 | S级优先级带来更强发布势能；已发布前精修；标题自带强冲突/强识别 |\n| 电流总分 | 先列触动内容，再综合打分。 | 越能处理 AI 帮助与依赖、委托与控制、增强与替代之间的张力，分数越高。 | 25 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n这不是一篇“再解释一次 ADHD”的文章，而是一篇门面文章：它要替整个《问题XXX》系列证明，ADHD × AI 不是流量标签，而是一套关于执行功能、外部前额叶和现实回流的工作系统。\n\n为什么 ADHD 的 Agent 系统必须限制数量，而不是无限扩展。这个题的核心不是“ADHD 很痛，AI 很有用”这种容易写烂的判断，而是：ADHD 的 Agent 系统要反直觉地限量，否则外部前额叶会变成外部噪音。如果这句话讲不清，后面所有平台版、口播版、评论问题和模板入口都会变成包装；如果讲清了，这篇文章就能成为一个真正的闭环资产。\n\n## 01 开场：先从一个不舒服的场景进入\n\n想象一个很具体的画面：你打开 AI，输入需求，几秒钟后它给你一份结构清楚、语气稳定、看起来比你本人更像“正常职场人”的答案。你应该高兴，因为它确实帮你省掉了很多步骤；但你心里又会冒出一个更暗的念头：如果它这么快就能把我翻译好，那我这些年到底算什么？\n\n这个问题的刺就在这里。AI 并没有简单地帮助 ADHD，它也重新定义了 ADHD 的痛感。过去你卡住，是因为启动难、排序难、时间感差、工作记忆漏水；现在工具可以接走很多中间步骤，于是新的问题出现了：工具接走以后，你的主体性、判断力、风险感和真实风格还剩多少？\n\n所以这篇不能写成工具赞歌。它必须承认 AI 的帮助，也必须追问帮助的代价。它不能让读者只获得“我被理解了”的安慰，而要让读者意识到：自己真正需要设计的不是一个更会输出的工具，而是一个不会吞掉判断权的外部执行系统。\n\n## 02 核心判断：问题不在能力，而在接口\n\nADHD 最容易被误解成能力问题。拖延被看成懒，分心被看成不认真，情绪波动被看成不成熟，计划失效被看成不负责任。但在很多真实场景里，当事人并不是不知道目标，也不是没有能力，而是缺少一条从目标到动作的稳定通道。\n\n这条通道，我更愿意叫它“执行接口”。它包括启动接口、排序接口、时间接口、工作记忆接口、情绪接口、反馈接口和委托接口。普通人可能也会卡，但 ADHD 用户会更早、更频繁、更痛地感到这些接口失灵。\n\nAI 的价值，正是在这里出现的。它可以把抽象目标切成步骤，把脑内混乱压成结构，把空白页面变成可修改草稿，把一团焦虑翻译成一个五分钟动作。它不是把你治好，而是暂时补上某个接口。\n\n但这也解释了为什么 AI 有时会让人更痛苦。因为一旦工具补上了接口，社会就更容易说：你看，工具都有了，你怎么还不行？于是原本属于环境、系统和执行功能的摩擦，又被重新塞回个人道德里。\n\n## 03 这个题的真正锋口：限制数量\n\n限制数量 不是一个装饰性概念，而是这篇文章必须守住的锋口。它要求我们不要在“AI 能帮忙”这个浅层判断上停下，而要继续问：它帮的是哪一段？它有没有制造新的依赖？它有没有把高方差风格洗成神经典型风格？它有没有把现实反馈变得更清楚，还是只让半成品变多？\n\n对 ADHD 用户来说，最危险的不是工具不好用，而是工具太顺。太顺的工具会让人误以为自己已经完成了现实动作：生成了计划，就像开始了；写出了草稿，就像发布了；整理了知识库，就像做出了判断；让 Agent 跑了一轮，就像自己已经承担了风险。\n\n但现实不是这样运转的。现实只承认动作、交付、对话、反馈和后果。一个 AI 工作流如果不能把人送到这些东西面前，它再漂亮也只是新的缓冲区。\n\n所以这篇文章的锋口要落在一句话上：AI 可以接走摩擦，但不能替你承担判断；Agent 可以执行动作，但不能替你承担赌注；工具可以翻译你，但不能替你活。\n\n## 04 三个校准：防止写成营销号\n\n第一，不能把 ADHD 写成天才徽章。高方差确实可能带来发散、联想、敏感和异常问题感，但这些能力只有在合适接口里才会变成产出。没有接口，高方差只是高损耗。\n\n第二，不能把 AI 写成治疗方案。AI 可以帮助某些任务场景里的执行功能外部化，但它不能替代诊断、治疗、药物、睡眠、稳定关系和真实工作条件。把 AI 写成万能药，最后只会制造新的羞耻。\n\n第三，不能把内容写成纯共鸣。共鸣是入口，不是终点。读者说“太真实了”只能说明文章击中了痛点；读者能说出“我卡在启动接口，我需要一个五分钟动作”，才说明文章完成了转译。\n\n这三个校准决定了《问题XXX》系列和普通 ADHD 内容的区别：它不是贩卖身份，不是贩卖焦虑，也不是贩卖工具，而是在搭一套能把痛感转成动作、动作转成反馈、反馈转成资产的系统。\n\n## 05 可执行判断：一篇文章必须留下一个动作\n\n这篇文章最终要留下的动作，是一张《Agent 数量上限表》。它不需要复杂，甚至越简单越好。表格只问四件事：我现在卡在哪里；这是哪个执行接口断了；AI 可以接走哪一个最小动作；48 小时内用什么现实信号验证它。\n\n| 当前卡点 | 执行接口 | AI/Agent 最小动作 | 48 小时现实信号 |\n|---|---|---|---|\n| 我一直想但没开始 | 启动接口 | 拆成一个五分钟动作 | 是否真的打开并完成第一步 |\n| 我同时有太多方向 | 排序接口 | 压成三个选项并给取舍理由 | 是否能放弃两个方向 |\n| 我生成了很多内容 | 反馈接口 | 设计一次发布、询问或交付 | 是否收到真实回应 |\n| 我怕工具替代自己 | 委托接口 | 标出哪些可委托、哪些必须自己判断 | 是否保留最终决策 |\n\n这个表的价值，不在于它多漂亮，而在于它把模糊自责改成了可处理的问题。ADHD 用户不需要再问“为什么我又这样”，而是可以问“我现在哪个接口断了”。这就是从情绪叙事进入产品化叙事的分界线。\n\n## 06 结尾：真正的目标不是更正常，而是更可回流\n\nAI 最容易给人的幻觉，是让一切看起来更顺了。文本更顺，计划更顺，表达更顺，简历更顺，汇报更顺。但顺不等于真，顺也不等于完成。对 ADHD 用户来说，真正重要的是：这套系统有没有让现实更快回话？有没有让你更少在脑内空转？有没有让你保留自己的判断，而不是把自己交给模板？\n\n所以这篇文章最后要把读者带到一个更冷静的位置：不要问 AI 有没有让你变正常，要问它有没有让你更能进入现实。不要问自己是不是终于被修好了，要问哪个接口被外部化了，哪个接口还需要人工守住。\n\n这才是 ADHD × AI 的真正命题。不是治愈，不是神化，不是炫耀效率，而是在一个注意力被系统性采掘的时代，为高方差大脑重新设计进入现实的通道。\n\n## 发布接口\n\n公众号版用这一版作为主稿，保留严肃随笔语气。小红书版只截取开场场景和《Agent 数量上限表》。知乎版重点回答概念边界：AI 不是治疗，而是外部化脚手架。短视频版抓一句话：工具可以翻译你，但不能替你活。评论区唯一问题：你现在最想让 AI 接住的，是哪个执行接口？\n\n## 07 发布前精修补丁：把锋利度落到第一屏\n\n发布前，这篇文章还需要在第一屏做一次更狠的取舍：不要先解释概念，不要先铺知识背景，也不要先证明作者懂 ADHD。第一屏只做一件事：把读者带进一个他们无法否认的现场。\n\n这个现场可以是：工具已经把文本写得很漂亮，但你仍然没有发布；Agent 已经跑出十个方案，但你反而更难选择；AI 把你翻译得像一个稳定的人，但你突然怀疑自己的原始表达是不是被洗掉了。这个现场一旦成立，后面的理论才有必要出现。\n\n因此，正式发布时建议把开头压成三段。第一段写一个动作现场，第二段写这个现场背后的执行接口，第三段抛出本文判断：为什么 ADHD 的 Agent 系统必须限制数量，而不是无限扩展 不是一个工具问题，而是一个“谁来接住执行功能、谁来保留判断权、谁来承担现实反馈”的问题。\n\n这也是评论区回流的重点。不要问“你怎么看 AI 和 ADHD”，这个问题太大，读者只会泛泛表达。要问：“你现在最想交给 AI 的，是启动、排序、记忆、时间感、情绪门槛，还是反馈回流？”这个问题足够小，才可能带回可用数据。\n\n如果这篇发布后只得到共鸣，它还只是文章；如果它能让读者说出自己的接口断点，它就是资产；如果它进一步让读者索要表格、提示词或模板，它才真正进入产品化路径。", "chars": 4402, "path": "content-packs/问题359/01_正文.md"}, {"id": "问题361", "number": 361, "title": "问题361：｜为什么越用 AI 的人，越容易觉得自己没用？", "priority": "S", "category": "ai_interface", "rank": 298, "grade": "D", "desire": 3, "thought": 4, "action": 4, "total": 11, "authenticity": 3, "risk": "高", "failure": "类型模板、风险先行", "desire_text": "既想要 AI 接住启动、排序、记忆和表达，又不想把判断权、自我效能和真实风格一起交出去。", "thought_text": "把“我终于有工具了”改写成“这是外部前额叶、执行功能假肢，也可能制造依赖阈值和主体性稀释”。", "action_text": "把一个任务分成可委托、必须自己判断、需要现实反馈三栏，再只交给 AI 最小一块。", "real_desire": "", "outsourcing_angle": "", "verification_signal": "", "comment": "高风险：发布前必须题目级真实欲望校准；注意 Agentic AI 题不要默认害怕委托，要先承认全痛点外包欲望", "article": "# 问题361：｜为什么越用 AI 的人，越容易觉得自己没用？\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想又多一个效率工具，而是想在卡住的第一秒，有东西能把你从空白、混乱、羞耻和过载里拉出来。\n\n**所思：** 原来我卡住的不是能力，而是接口；我缺的不是更多道理，而是一个能承接启动、排序、记忆、反馈和委托的外部系统。\n\n**所行：** 把今天最卡的一件事丢给 AI，只要求它输出三行：第一步、三分钟版本、失败后重启句。不要让它替你写宏大计划。\n\n## 点火开场：发布版第一屏\n\n你最熟悉的崩溃不是“我不会”，而是“我明明会，但我开始不了”。屏幕是空的，脑子是满的，任务在那里，你也在那里，中间却像断了一根线。\n\n所以《为什么越用 AI 的人，越容易觉得自己没用》这篇不能先讲概念。它要先让读者在第三段前停住：这不就是我吗？我不是没有能力，我是一直在用不适配自己的接口硬扛。\n\n真正的 S 级，不是观点锋利，而是三件事同时发生：读者想要一种新的活法，读者重新解释自己的卡点，读者马上做一个小动作。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 既想要 AI 接住启动、排序、记忆和表达，又不想把判断权、自我效能和真实风格一起交出去。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 9 | S级优先级带来更强发布势能；已发布前精修；标题自带强冲突/强识别 |\n| 所思 | 把“我终于有工具了”改写成“这是外部前额叶、执行功能假肢，也可能制造依赖阈值和主体性稀释”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 8 | S级优先级带来更强发布势能；已发布前精修；标题自带强冲突/强识别 |\n| 所行 | 把一个任务分成可委托、必须自己判断、需要现实反馈三栏，再只交给 AI 最小一块。 | 结尾必须给一个 3-15 分钟内可执行的 AI/备忘录/微信动作。 | 8 | S级优先级带来更强发布势能；已发布前精修；标题自带强冲突/强识别 |\n| 电流总分 | 先列触动内容，再综合打分。 | 越能处理 AI 帮助与依赖、委托与控制、增强与替代之间的张力，分数越高。 | 25 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n这不是一篇“再解释一次 ADHD”的文章，而是一篇门面文章：它要替整个《问题XXX》系列证明，ADHD × AI 不是流量标签，而是一套关于执行功能、外部前额叶和现实回流的工作系统。\n\n｜为什么越用 AI 的人，越容易觉得自己没用？。这个题的核心不是“ADHD 很痛，AI 很有用”这种容易写烂的判断，而是：AI 让效率翻倍，也可能让人更觉得自己没用，因为参照系被重置。如果这句话讲不清，后面所有平台版、口播版、评论问题和模板入口都会变成包装；如果讲清了，这篇文章就能成为一个真正的闭环资产。\n\n## 01 开场：先从一个不舒服的场景进入\n\n想象一个很具体的画面：你打开 AI，输入需求，几秒钟后它给你一份结构清楚、语气稳定、看起来比你本人更像“正常职场人”的答案。你应该高兴，因为它确实帮你省掉了很多步骤；但你心里又会冒出一个更暗的念头：如果它这么快就能把我翻译好，那我这些年到底算什么？\n\n这个问题的刺就在这里。AI 并没有简单地帮助 ADHD，它也重新定义了 ADHD 的痛感。过去你卡住，是因为启动难、排序难、时间感差、工作记忆漏水；现在工具可以接走很多中间步骤，于是新的问题出现了：工具接走以后，你的主体性、判断力、风险感和真实风格还剩多少？\n\n所以这篇不能写成工具赞歌。它必须承认 AI 的帮助，也必须追问帮助的代价。它不能让读者只获得“我被理解了”的安慰，而要让读者意识到：自己真正需要设计的不是一个更会输出的工具，而是一个不会吞掉判断权的外部执行系统。\n\n## 02 核心判断：问题不在能力，而在接口\n\nADHD 最容易被误解成能力问题。拖延被看成懒，分心被看成不认真，情绪波动被看成不成熟，计划失效被看成不负责任。但在很多真实场景里，当事人并不是不知道目标，也不是没有能力，而是缺少一条从目标到动作的稳定通道。\n\n这条通道，我更愿意叫它“执行接口”。它包括启动接口、排序接口、时间接口、工作记忆接口、情绪接口、反馈接口和委托接口。普通人可能也会卡，但 ADHD 用户会更早、更频繁、更痛地感到这些接口失灵。\n\nAI 的价值，正是在这里出现的。它可以把抽象目标切成步骤，把脑内混乱压成结构，把空白页面变成可修改草稿，把一团焦虑翻译成一个五分钟动作。它不是把你治好，而是暂时补上某个接口。\n\n但这也解释了为什么 AI 有时会让人更痛苦。因为一旦工具补上了接口，社会就更容易说：你看，工具都有了，你怎么还不行？于是原本属于环境、系统和执行功能的摩擦，又被重新塞回个人道德里。\n\n## 03 这个题的真正锋口：效率羞耻\n\n效率羞耻 不是一个装饰性概念，而是这篇文章必须守住的锋口。它要求我们不要在“AI 能帮忙”这个浅层判断上停下，而要继续问：它帮的是哪一段？它有没有制造新的依赖？它有没有把高方差风格洗成神经典型风格？它有没有把现实反馈变得更清楚，还是只让半成品变多？\n\n对 ADHD 用户来说，最危险的不是工具不好用，而是工具太顺。太顺的工具会让人误以为自己已经完成了现实动作：生成了计划，就像开始了；写出了草稿，就像发布了；整理了知识库，就像做出了判断；让 Agent 跑了一轮，就像自己已经承担了风险。\n\n但现实不是这样运转的。现实只承认动作、交付、对话、反馈和后果。一个 AI 工作流如果不能把人送到这些东西面前，它再漂亮也只是新的缓冲区。\n\n所以这篇文章的锋口要落在一句话上：AI 可以接走摩擦，但不能替你承担判断；Agent 可以执行动作，但不能替你承担赌注；工具可以翻译你，但不能替你活。\n\n## 04 三个校准：防止写成营销号\n\n第一，不能把 ADHD 写成天才徽章。高方差确实可能带来发散、联想、敏感和异常问题感，但这些能力只有在合适接口里才会变成产出。没有接口，高方差只是高损耗。\n\n第二，不能把 AI 写成治疗方案。AI 可以帮助某些任务场景里的执行功能外部化，但它不能替代诊断、治疗、药物、睡眠、稳定关系和真实工作条件。把 AI 写成万能药，最后只会制造新的羞耻。\n\n第三，不能把内容写成纯共鸣。共鸣是入口，不是终点。读者说“太真实了”只能说明文章击中了痛点；读者能说出“我卡在启动接口，我需要一个五分钟动作”，才说明文章完成了转译。\n\n这三个校准决定了《问题XXX》系列和普通 ADHD 内容的区别：它不是贩卖身份，不是贩卖焦虑，也不是贩卖工具，而是在搭一套能把痛感转成动作、动作转成反馈、反馈转成资产的系统。\n\n## 05 可执行判断：一篇文章必须留下一个动作\n\n这篇文章最终要留下的动作，是一张《AI 效率羞耻拆解表》。它不需要复杂，甚至越简单越好。表格只问四件事：我现在卡在哪里；这是哪个执行接口断了；AI 可以接走哪一个最小动作；48 小时内用什么现实信号验证它。\n\n| 当前卡点 | 执行接口 | AI/Agent 最小动作 | 48 小时现实信号 |\n|---|---|---|---|\n| 我一直想但没开始 | 启动接口 | 拆成一个五分钟动作 | 是否真的打开并完成第一步 |\n| 我同时有太多方向 | 排序接口 | 压成三个选项并给取舍理由 | 是否能放弃两个方向 |\n| 我生成了很多内容 | 反馈接口 | 设计一次发布、询问或交付 | 是否收到真实回应 |\n| 我怕工具替代自己 | 委托接口 | 标出哪些可委托、哪些必须自己判断 | 是否保留最终决策 |\n\n这个表的价值，不在于它多漂亮，而在于它把模糊自责改成了可处理的问题。ADHD 用户不需要再问“为什么我又这样”，而是可以问“我现在哪个接口断了”。这就是从情绪叙事进入产品化叙事的分界线。\n\n## 06 结尾：真正的目标不是更正常，而是更可回流\n\nAI 最容易给人的幻觉，是让一切看起来更顺了。文本更顺，计划更顺，表达更顺，简历更顺，汇报更顺。但顺不等于真，顺也不等于完成。对 ADHD 用户来说，真正重要的是：这套系统有没有让现实更快回话？有没有让你更少在脑内空转？有没有让你保留自己的判断，而不是把自己交给模板？\n\n所以这篇文章最后要把读者带到一个更冷静的位置：不要问 AI 有没有让你变正常，要问它有没有让你更能进入现实。不要问自己是不是终于被修好了，要问哪个接口被外部化了，哪个接口还需要人工守住。\n\n这才是 ADHD × AI 的真正命题。不是治愈，不是神化，不是炫耀效率，而是在一个注意力被系统性采掘的时代，为高方差大脑重新设计进入现实的通道。\n\n## 发布接口\n\n公众号版用这一版作为主稿，保留严肃随笔语气。小红书版只截取开场场景和《AI 效率羞耻拆解表》。知乎版重点回答概念边界：AI 不是治疗，而是外部化脚手架。短视频版抓一句话：工具可以翻译你，但不能替你活。评论区唯一问题：你现在最想让 AI 接住的，是哪个执行接口？\n\n## 07 发布前精修补丁：把锋利度落到第一屏\n\n发布前，这篇文章还需要在第一屏做一次更狠的取舍：不要先解释概念，不要先铺知识背景，也不要先证明作者懂 ADHD。第一屏只做一件事：把读者带进一个他们无法否认的现场。\n\n这个现场可以是：工具已经把文本写得很漂亮，但你仍然没有发布；Agent 已经跑出十个方案，但你反而更难选择；AI 把你翻译得像一个稳定的人，但你突然怀疑自己的原始表达是不是被洗掉了。这个现场一旦成立，后面的理论才有必要出现。\n\n因此，正式发布时建议把开头压成三段。第一段写一个动作现场，第二段写这个现场背后的执行接口，第三段抛出本文判断：｜为什么越用 AI 的人，越容易觉得自己没用？ 不是一个工具问题，而是一个“谁来接住执行功能、谁来保留判断权、谁来承担现实反馈”的问题。\n\n这也是评论区回流的重点。不要问“你怎么看 AI 和 ADHD”，这个问题太大，读者只会泛泛表达。要问：“你现在最想交给 AI 的，是启动、排序、记忆、时间感、情绪门槛，还是反馈回流？”这个问题足够小，才可能带回可用数据。\n\n如果这篇发布后只得到共鸣，它还只是文章；如果它能让读者说出自己的接口断点，它就是资产；如果它进一步让读者索要表格、提示词或模板，它才真正进入产品化路径。", "chars": 4351, "path": "content-packs/问题361/01_正文.md"}, {"id": "问题318", "number": 318, "title": "问题318：为什么 ADHD 用户会觉得 ChatGPT 的输出“非常神经典型”", "priority": "A", "category": "ai_interface", "rank": 299, "grade": "D", "desire": 3, "thought": 4, "action": 4, "total": 11, "authenticity": 3, "risk": "高", "failure": "类型模板、风险先行", "desire_text": "既想要 AI 接住启动、排序、记忆和表达，又不想把判断权、自我效能和真实风格一起交出去。", "thought_text": "把“我终于有工具了”改写成“这是外部前额叶、执行功能假肢，也可能制造依赖阈值和主体性稀释”。", "action_text": "把一个任务分成可委托、必须自己判断、需要现实反馈三栏，再只交给 AI 最小一块。", "real_desire": "", "outsourcing_angle": "", "verification_signal": "", "comment": "高风险：发布前必须题目级真实欲望校准；注意 Agentic AI 题不要默认害怕委托，要先承认全痛点外包欲望", "article": "# 问题318：为什么 ADHD 用户会觉得 ChatGPT 的输出“非常神经典型”\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想又多一个效率工具，而是想在卡住的第一秒，有东西能把你从空白、混乱、羞耻和过载里拉出来。\n\n**所思：** 原来我卡住的不是能力，而是接口；我缺的不是更多道理，而是一个能承接启动、排序、记忆、反馈和委托的外部系统。\n\n**所行：** 把今天最卡的一件事丢给 AI，只要求它输出三行：第一步、三分钟版本、失败后重启句。不要让它替你写宏大计划。\n\n## 点火开场：发布版第一屏\n\n你最熟悉的崩溃不是“我不会”，而是“我明明会，但我开始不了”。屏幕是空的，脑子是满的，任务在那里，你也在那里，中间却像断了一根线。\n\n所以《为什么 ADHD 用户会觉得 ChatGPT 的输出“非常神经典型”》这篇不能先讲概念。它要先让读者在第三段前停住：这不就是我吗？我不是没有能力，我是一直在用不适配自己的接口硬扛。\n\n真正的 S 级，不是观点锋利，而是三件事同时发生：读者想要一种新的活法，读者重新解释自己的卡点，读者马上做一个小动作。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 既想要 AI 接住启动、排序、记忆和表达，又不想把判断权、自我效能和真实风格一起交出去。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 7 | A级优先级，有明确发布潜力；已发布前精修；AI接口张力明确 |\n| 所思 | 把“我终于有工具了”改写成“这是外部前额叶、执行功能假肢，也可能制造依赖阈值和主体性稀释”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 7 | A级优先级，有明确发布潜力；已发布前精修；AI接口张力明确 |\n| 所行 | 把一个任务分成可委托、必须自己判断、需要现实反馈三栏，再只交给 AI 最小一块。 | 结尾必须给一个 3-15 分钟内可执行的 AI/备忘录/微信动作。 | 7 | A级优先级，有明确发布潜力；已发布前精修；AI接口张力明确 |\n| 电流总分 | 先列触动内容，再综合打分。 | 越能处理 AI 帮助与依赖、委托与控制、增强与替代之间的张力，分数越高。 | 21 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n这是一篇第二梯队的关键文章：它不一定负责最响的标题，但负责把一个容易被误读的概念校准到可发布、可讨论、可回流的精度。\n\n为什么 ADHD 用户会觉得 ChatGPT 的输出“非常神经典型”。这个题的核心不是“ADHD 很痛，AI 很有用”这种容易写烂的判断，而是：ChatGPT 的默认好文本，常常是神经典型秩序感的复制。如果这句话讲不清，后面所有平台版、口播版、评论问题和模板入口都会变成包装；如果讲清了，这篇文章就能成为一个真正的闭环资产。\n\n## 01 开场：先从一个不舒服的场景进入\n\n想象一个很具体的画面：你打开 AI，输入需求，几秒钟后它给你一份结构清楚、语气稳定、看起来比你本人更像“正常职场人”的答案。你应该高兴，因为它确实帮你省掉了很多步骤；但你心里又会冒出一个更暗的念头：如果它这么快就能把我翻译好，那我这些年到底算什么？\n\n这个问题的刺就在这里。AI 并没有简单地帮助 ADHD，它也重新定义了 ADHD 的痛感。过去你卡住，是因为启动难、排序难、时间感差、工作记忆漏水；现在工具可以接走很多中间步骤，于是新的问题出现了：工具接走以后，你的主体性、判断力、风险感和真实风格还剩多少？\n\n所以这篇不能写成工具赞歌。它必须承认 AI 的帮助，也必须追问帮助的代价。它不能让读者只获得“我被理解了”的安慰，而要让读者意识到：自己真正需要设计的不是一个更会输出的工具，而是一个不会吞掉判断权的外部执行系统。\n\n## 02 核心判断：问题不在能力，而在接口\n\nADHD 最容易被误解成能力问题。拖延被看成懒，分心被看成不认真，情绪波动被看成不成熟，计划失效被看成不负责任。但在很多真实场景里，当事人并不是不知道目标，也不是没有能力，而是缺少一条从目标到动作的稳定通道。\n\n这条通道，我更愿意叫它“执行接口”。它包括启动接口、排序接口、时间接口、工作记忆接口、情绪接口、反馈接口和委托接口。普通人可能也会卡，但 ADHD 用户会更早、更频繁、更痛地感到这些接口失灵。\n\nAI 的价值，正是在这里出现的。它可以把抽象目标切成步骤，把脑内混乱压成结构，把空白页面变成可修改草稿，把一团焦虑翻译成一个五分钟动作。它不是把你治好，而是暂时补上某个接口。\n\n但这也解释了为什么 AI 有时会让人更痛苦。因为一旦工具补上了接口，社会就更容易说：你看，工具都有了，你怎么还不行？于是原本属于环境、系统和执行功能的摩擦，又被重新塞回个人道德里。\n\n## 03 这个题的真正锋口：神经典型输出\n\n神经典型输出 不是一个装饰性概念，而是这篇文章必须守住的锋口。它要求我们不要在“AI 能帮忙”这个浅层判断上停下，而要继续问：它帮的是哪一段？它有没有制造新的依赖？它有没有把高方差风格洗成神经典型风格？它有没有把现实反馈变得更清楚，还是只让半成品变多？\n\n对 ADHD 用户来说，最危险的不是工具不好用，而是工具太顺。太顺的工具会让人误以为自己已经完成了现实动作：生成了计划，就像开始了；写出了草稿，就像发布了；整理了知识库，就像做出了判断；让 Agent 跑了一轮，就像自己已经承担了风险。\n\n但现实不是这样运转的。现实只承认动作、交付、对话、反馈和后果。一个 AI 工作流如果不能把人送到这些东西面前，它再漂亮也只是新的缓冲区。\n\n所以这篇文章的锋口要落在一句话上：AI 可以接走摩擦，但不能替你承担判断；Agent 可以执行动作，但不能替你承担赌注；工具可以翻译你，但不能替你活。\n\n## 04 三个校准：防止写成营销号\n\n第一，不能把 ADHD 写成天才徽章。高方差确实可能带来发散、联想、敏感和异常问题感，但这些能力只有在合适接口里才会变成产出。没有接口，高方差只是高损耗。\n\n第二，不能把 AI 写成治疗方案。AI 可以帮助某些任务场景里的执行功能外部化，但它不能替代诊断、治疗、药物、睡眠、稳定关系和真实工作条件。把 AI 写成万能药，最后只会制造新的羞耻。\n\n第三，不能把内容写成纯共鸣。共鸣是入口，不是终点。读者说“太真实了”只能说明文章击中了痛点；读者能说出“我卡在启动接口，我需要一个五分钟动作”，才说明文章完成了转译。\n\n这三个校准决定了《问题XXX》系列和普通 ADHD 内容的区别：它不是贩卖身份，不是贩卖焦虑，也不是贩卖工具，而是在搭一套能把痛感转成动作、动作转成反馈、反馈转成资产的系统。\n\n## 05 可执行判断：一篇文章必须留下一个动作\n\n这篇文章最终要留下的动作，是一张《神经典型改写痕迹表》。它不需要复杂，甚至越简单越好。表格只问四件事：我现在卡在哪里；这是哪个执行接口断了；AI 可以接走哪一个最小动作；48 小时内用什么现实信号验证它。\n\n| 当前卡点 | 执行接口 | AI/Agent 最小动作 | 48 小时现实信号 |\n|---|---|---|---|\n| 我一直想但没开始 | 启动接口 | 拆成一个五分钟动作 | 是否真的打开并完成第一步 |\n| 我同时有太多方向 | 排序接口 | 压成三个选项并给取舍理由 | 是否能放弃两个方向 |\n| 我生成了很多内容 | 反馈接口 | 设计一次发布、询问或交付 | 是否收到真实回应 |\n| 我怕工具替代自己 | 委托接口 | 标出哪些可委托、哪些必须自己判断 | 是否保留最终决策 |\n\n这个表的价值，不在于它多漂亮，而在于它把模糊自责改成了可处理的问题。ADHD 用户不需要再问“为什么我又这样”，而是可以问“我现在哪个接口断了”。这就是从情绪叙事进入产品化叙事的分界线。\n\n## 06 结尾：真正的目标不是更正常，而是更可回流\n\nAI 最容易给人的幻觉，是让一切看起来更顺了。文本更顺，计划更顺，表达更顺，简历更顺，汇报更顺。但顺不等于真，顺也不等于完成。对 ADHD 用户来说，真正重要的是：这套系统有没有让现实更快回话？有没有让你更少在脑内空转？有没有让你保留自己的判断，而不是把自己交给模板？\n\n所以这篇文章最后要把读者带到一个更冷静的位置：不要问 AI 有没有让你变正常，要问它有没有让你更能进入现实。不要问自己是不是终于被修好了，要问哪个接口被外部化了，哪个接口还需要人工守住。\n\n这才是 ADHD × AI 的真正命题。不是治愈，不是神化，不是炫耀效率，而是在一个注意力被系统性采掘的时代，为高方差大脑重新设计进入现实的通道。\n\n## 发布接口\n\n公众号版用这一版作为主稿，保留严肃随笔语气。小红书版只截取开场场景和《神经典型改写痕迹表》。知乎版重点回答概念边界：AI 不是治疗，而是外部化脚手架。短视频版抓一句话：工具可以翻译你，但不能替你活。评论区唯一问题：你现在最想让 AI 接住的，是哪个执行接口？\n\n## 07 发布前精修补丁：把锋利度落到第一屏\n\n发布前，这篇文章还需要在第一屏做一次更狠的取舍：不要先解释概念，不要先铺知识背景，也不要先证明作者懂 ADHD。第一屏只做一件事：把读者带进一个他们无法否认的现场。\n\n这个现场可以是：工具已经把文本写得很漂亮，但你仍然没有发布；Agent 已经跑出十个方案，但你反而更难选择；AI 把你翻译得像一个稳定的人，但你突然怀疑自己的原始表达是不是被洗掉了。这个现场一旦成立，后面的理论才有必要出现。\n\n因此，正式发布时建议把开头压成三段。第一段写一个动作现场，第二段写这个现场背后的执行接口，第三段抛出本文判断：为什么 ADHD 用户会觉得 ChatGPT 的输出“非常神经典型” 不是一个工具问题，而是一个“谁来接住执行功能、谁来保留判断权、谁来承担现实反馈”的问题。\n\n这也是评论区回流的重点。不要问“你怎么看 AI 和 ADHD”，这个问题太大，读者只会泛泛表达。要问：“你现在最想交给 AI 的，是启动、排序、记忆、时间感、情绪门槛，还是反馈回流？”这个问题足够小，才可能带回可用数据。\n\n如果这篇发布后只得到共鸣，它还只是文章；如果它能让读者说出自己的接口断点，它就是资产；如果它进一步让读者索要表格、提示词或模板，它才真正进入产品化路径。", "chars": 4355, "path": "content-packs/问题318/01_正文.md"}, {"id": "问题367", "number": 367, "title": "问题367：为什么“多巴胺排毒”正在被整个社会 ADHD 化", "priority": "A", "category": "attention", "rank": 300, "grade": "D", "desire": 3, "thought": 4, "action": 4, "total": 11, "authenticity": 3, "risk": "高", "failure": "类型模板、自律化/审计化", "desire_text": "从被平台、短视频、AI 顺滑输出牵着走，变成重新夺回一点注意力、时间感和现实动作。", "thought_text": "把“我不自律”改写成“注意力被竞价、时间感被工具改写、深度工作被浅层动作伪装”。", "action_text": "做一次 15 分钟注意力审计：刚才谁拿走了我的注意力，它换回了什么现实结果。", "real_desire": "", "outsourcing_angle": "", "verification_signal": "", "comment": "高风险：发布前必须题目级真实欲望校准；注意力题优先写“系统替我挡掉掠夺”，不要写成靠意志力夺回", "article": "# 问题367：为什么“多巴胺排毒”正在被整个社会 ADHD 化\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想更自律，而是想从一套不断切碎你注意力的系统里，把自己的脑子赎回来。\n\n**所思：** 原来分心不只是个人意志失败，也可能是平台、工作流、即时通讯和奖励机制共同制造的执行功能损耗。AI 的价值，是帮我重建进入现实的通道，而不是制造更多入口。\n\n**所行：** 让 AI 帮你列出今天三个最大注意力泄漏点，每个只配一个阻断动作：静音、延迟回复、批处理，或五分钟单点启动。\n\n## 点火开场：发布版第一屏\n\n你不是不知道要做什么。你只是刚准备开始，就被消息、平台、提醒、群聊、短视频和脑内噪音同时拽走。等你回过神，最该做的事已经变成一团羞耻。\n\n所以《为什么“多巴胺排毒”正在被整个社会 ADHD 化》这篇不能先讲概念。它要先让读者在第三段前停住：这不就是我吗？我不是没有能力，我是一直在用不适配自己的接口硬扛。\n\n真正的 S 级，不是观点锋利，而是三件事同时发生：读者想要一种新的活法，读者重新解释自己的卡点，读者马上做一个小动作。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 从被平台、短视频、AI 顺滑输出牵着走，变成重新夺回一点注意力、时间感和现实动作。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 7 | A级优先级，有明确发布潜力；已发布前精修 |\n| 所思 | 把“我不自律”改写成“注意力被竞价、时间感被工具改写、深度工作被浅层动作伪装”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 7 | A级优先级，有明确发布潜力；已发布前精修 |\n| 所行 | 做一次 15 分钟注意力审计：刚才谁拿走了我的注意力，它换回了什么现实结果。 | 结尾必须给一个 3-15 分钟内可执行的 AI/备忘录/微信动作。 | 7 | A级优先级，有明确发布潜力；已发布前精修 |\n| 电流总分 | 先列触动内容，再综合打分。 | 越能指出注意力被采掘、时间感被改变、现实动作被替代，分数越高。 | 21 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n这是一篇第二梯队的关键文章：它不一定负责最响的标题，但负责把一个容易被误读的概念校准到可发布、可讨论、可回流的精度。\n\n为什么“多巴胺排毒”正在被整个社会 ADHD 化。这个题的核心不是“ADHD 很痛，AI 很有用”这种容易写烂的判断，而是：多巴胺排毒容易把所有现代人都 ADHD 化，却忽略临床差异。如果这句话讲不清，后面所有平台版、口播版、评论问题和模板入口都会变成包装；如果讲清了，这篇文章就能成为一个真正的闭环资产。\n\n## 01 开场：先从一个不舒服的场景进入\n\n想象一个很具体的画面：你打开 AI，输入需求，几秒钟后它给你一份结构清楚、语气稳定、看起来比你本人更像“正常职场人”的答案。你应该高兴，因为它确实帮你省掉了很多步骤；但你心里又会冒出一个更暗的念头：如果它这么快就能把我翻译好，那我这些年到底算什么？\n\n这个问题的刺就在这里。AI 并没有简单地帮助 ADHD，它也重新定义了 ADHD 的痛感。过去你卡住，是因为启动难、排序难、时间感差、工作记忆漏水；现在工具可以接走很多中间步骤，于是新的问题出现了：工具接走以后，你的主体性、判断力、风险感和真实风格还剩多少？\n\n所以这篇不能写成工具赞歌。它必须承认 AI 的帮助，也必须追问帮助的代价。它不能让读者只获得“我被理解了”的安慰，而要让读者意识到：自己真正需要设计的不是一个更会输出的工具，而是一个不会吞掉判断权的外部执行系统。\n\n## 02 核心判断：问题不在能力，而在接口\n\nADHD 最容易被误解成能力问题。拖延被看成懒，分心被看成不认真，情绪波动被看成不成熟，计划失效被看成不负责任。但在很多真实场景里，当事人并不是不知道目标，也不是没有能力，而是缺少一条从目标到动作的稳定通道。\n\n这条通道，我更愿意叫它“执行接口”。它包括启动接口、排序接口、时间接口、工作记忆接口、情绪接口、反馈接口和委托接口。普通人可能也会卡，但 ADHD 用户会更早、更频繁、更痛地感到这些接口失灵。\n\nAI 的价值，正是在这里出现的。它可以把抽象目标切成步骤，把脑内混乱压成结构，把空白页面变成可修改草稿，把一团焦虑翻译成一个五分钟动作。它不是把你治好，而是暂时补上某个接口。\n\n但这也解释了为什么 AI 有时会让人更痛苦。因为一旦工具补上了接口，社会就更容易说：你看，工具都有了，你怎么还不行？于是原本属于环境、系统和执行功能的摩擦，又被重新塞回个人道德里。\n\n## 03 这个题的真正锋口：多巴胺排毒\n\n多巴胺排毒 不是一个装饰性概念，而是这篇文章必须守住的锋口。它要求我们不要在“AI 能帮忙”这个浅层判断上停下，而要继续问：它帮的是哪一段？它有没有制造新的依赖？它有没有把高方差风格洗成神经典型风格？它有没有把现实反馈变得更清楚，还是只让半成品变多？\n\n对 ADHD 用户来说，最危险的不是工具不好用，而是工具太顺。太顺的工具会让人误以为自己已经完成了现实动作：生成了计划，就像开始了；写出了草稿，就像发布了；整理了知识库，就像做出了判断；让 Agent 跑了一轮，就像自己已经承担了风险。\n\n但现实不是这样运转的。现实只承认动作、交付、对话、反馈和后果。一个 AI 工作流如果不能把人送到这些东西面前，它再漂亮也只是新的缓冲区。\n\n所以这篇文章的锋口要落在一句话上：AI 可以接走摩擦，但不能替你承担判断；Agent 可以执行动作，但不能替你承担赌注；工具可以翻译你，但不能替你活。\n\n## 04 三个校准：防止写成营销号\n\n第一，不能把 ADHD 写成天才徽章。高方差确实可能带来发散、联想、敏感和异常问题感，但这些能力只有在合适接口里才会变成产出。没有接口，高方差只是高损耗。\n\n第二，不能把 AI 写成治疗方案。AI 可以帮助某些任务场景里的执行功能外部化，但它不能替代诊断、治疗、药物、睡眠、稳定关系和真实工作条件。把 AI 写成万能药，最后只会制造新的羞耻。\n\n第三，不能把内容写成纯共鸣。共鸣是入口，不是终点。读者说“太真实了”只能说明文章击中了痛点；读者能说出“我卡在启动接口，我需要一个五分钟动作”，才说明文章完成了转译。\n\n这三个校准决定了《问题XXX》系列和普通 ADHD 内容的区别：它不是贩卖身份，不是贩卖焦虑，也不是贩卖工具，而是在搭一套能把痛感转成动作、动作转成反馈、反馈转成资产的系统。\n\n## 05 可执行判断：一篇文章必须留下一个动作\n\n这篇文章最终要留下的动作，是一张《刺激摄入分层表》。它不需要复杂，甚至越简单越好。表格只问四件事：我现在卡在哪里；这是哪个执行接口断了；AI 可以接走哪一个最小动作；48 小时内用什么现实信号验证它。\n\n| 当前卡点 | 执行接口 | AI/Agent 最小动作 | 48 小时现实信号 |\n|---|---|---|---|\n| 我一直想但没开始 | 启动接口 | 拆成一个五分钟动作 | 是否真的打开并完成第一步 |\n| 我同时有太多方向 | 排序接口 | 压成三个选项并给取舍理由 | 是否能放弃两个方向 |\n| 我生成了很多内容 | 反馈接口 | 设计一次发布、询问或交付 | 是否收到真实回应 |\n| 我怕工具替代自己 | 委托接口 | 标出哪些可委托、哪些必须自己判断 | 是否保留最终决策 |\n\n这个表的价值，不在于它多漂亮，而在于它把模糊自责改成了可处理的问题。ADHD 用户不需要再问“为什么我又这样”，而是可以问“我现在哪个接口断了”。这就是从情绪叙事进入产品化叙事的分界线。\n\n## 06 结尾：真正的目标不是更正常，而是更可回流\n\nAI 最容易给人的幻觉，是让一切看起来更顺了。文本更顺，计划更顺，表达更顺，简历更顺，汇报更顺。但顺不等于真，顺也不等于完成。对 ADHD 用户来说，真正重要的是：这套系统有没有让现实更快回话？有没有让你更少在脑内空转？有没有让你保留自己的判断，而不是把自己交给模板？\n\n所以这篇文章最后要把读者带到一个更冷静的位置：不要问 AI 有没有让你变正常，要问它有没有让你更能进入现实。不要问自己是不是终于被修好了，要问哪个接口被外部化了，哪个接口还需要人工守住。\n\n这才是 ADHD × AI 的真正命题。不是治愈，不是神化，不是炫耀效率，而是在一个注意力被系统性采掘的时代，为高方差大脑重新设计进入现实的通道。\n\n## 发布接口\n\n公众号版用这一版作为主稿，保留严肃随笔语气。小红书版只截取开场场景和《刺激摄入分层表》。知乎版重点回答概念边界：AI 不是治疗，而是外部化脚手架。短视频版抓一句话：工具可以翻译你，但不能替你活。评论区唯一问题：你现在最想让 AI 接住的，是哪个执行接口？\n\n## 07 发布前精修补丁：把锋利度落到第一屏\n\n发布前，这篇文章还需要在第一屏做一次更狠的取舍：不要先解释概念，不要先铺知识背景，也不要先证明作者懂 ADHD。第一屏只做一件事：把读者带进一个他们无法否认的现场。\n\n这个现场可以是：工具已经把文本写得很漂亮，但你仍然没有发布；Agent 已经跑出十个方案，但你反而更难选择；AI 把你翻译得像一个稳定的人，但你突然怀疑自己的原始表达是不是被洗掉了。这个现场一旦成立，后面的理论才有必要出现。\n\n因此，正式发布时建议把开头压成三段。第一段写一个动作现场，第二段写这个现场背后的执行接口，第三段抛出本文判断：为什么“多巴胺排毒”正在被整个社会 ADHD 化 不是一个工具问题，而是一个“谁来接住执行功能、谁来保留判断权、谁来承担现实反馈”的问题。\n\n这也是评论区回流的重点。不要问“你怎么看 AI 和 ADHD”，这个问题太大，读者只会泛泛表达。要问：“你现在最想交给 AI 的，是启动、排序、记忆、时间感、情绪门槛，还是反馈回流？”这个问题足够小，才可能带回可用数据。\n\n如果这篇发布后只得到共鸣，它还只是文章；如果它能让读者说出自己的接口断点，它就是资产；如果它进一步让读者索要表格、提示词或模板，它才真正进入产品化路径。", "chars": 4283, "path": "content-packs/问题367/01_正文.md"}, {"id": "问题381", "number": 381, "title": "问题381：为什么研究很难区分“能力提高”与“成功外包认知”这两件完全不同的事", "priority": "A", "category": "ai_interface", "rank": 301, "grade": "D", "desire": 3, "thought": 4, "action": 4, "total": 11, "authenticity": 3, "risk": "高", "failure": "类型模板、风险先行", "desire_text": "既想要 AI 接住启动、排序、记忆和表达，又不想把判断权、自我效能和真实风格一起交出去。", "thought_text": "把“我终于有工具了”改写成“这是外部前额叶、执行功能假肢，也可能制造依赖阈值和主体性稀释”。", "action_text": "把一个任务分成可委托、必须自己判断、需要现实反馈三栏，再只交给 AI 最小一块。", "real_desire": "", "outsourcing_angle": "", "verification_signal": "", "comment": "高风险：发布前必须题目级真实欲望校准；注意 Agentic AI 题不要默认害怕委托，要先承认全痛点外包欲望", "article": "# 问题381：为什么研究很难区分“能力提高”与“成功外包认知”这两件完全不同的事\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想又多一个效率工具，而是想在卡住的第一秒，有东西能把你从空白、混乱、羞耻和过载里拉出来。\n\n**所思：** 原来我卡住的不是能力，而是接口；我缺的不是更多道理，而是一个能承接启动、排序、记忆、反馈和委托的外部系统。\n\n**所行：** 把今天最卡的一件事丢给 AI，只要求它输出三行：第一步、三分钟版本、失败后重启句。不要让它替你写宏大计划。\n\n## 点火开场：发布版第一屏\n\n你最熟悉的崩溃不是“我不会”，而是“我明明会，但我开始不了”。屏幕是空的，脑子是满的，任务在那里，你也在那里，中间却像断了一根线。\n\n所以《为什么研究很难区分“能力提高”与“成功外包认知”这两件完全不同的事》这篇不能先讲概念。它要先让读者在第三段前停住：这不就是我吗？我不是没有能力，我是一直在用不适配自己的接口硬扛。\n\n真正的 S 级，不是观点锋利，而是三件事同时发生：读者想要一种新的活法，读者重新解释自己的卡点，读者马上做一个小动作。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 既想要 AI 接住启动、排序、记忆和表达，又不想把判断权、自我效能和真实风格一起交出去。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 7 | A级优先级，有明确发布潜力；已发布前精修；AI接口张力明确 |\n| 所思 | 把“我终于有工具了”改写成“这是外部前额叶、执行功能假肢，也可能制造依赖阈值和主体性稀释”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 7 | A级优先级，有明确发布潜力；已发布前精修；AI接口张力明确 |\n| 所行 | 把一个任务分成可委托、必须自己判断、需要现实反馈三栏，再只交给 AI 最小一块。 | 结尾必须给一个 3-15 分钟内可执行的 AI/备忘录/微信动作。 | 7 | A级优先级，有明确发布潜力；已发布前精修；AI接口张力明确 |\n| 电流总分 | 先列触动内容，再综合打分。 | 越能处理 AI 帮助与依赖、委托与控制、增强与替代之间的张力，分数越高。 | 21 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n这是一篇第二梯队的关键文章：它不一定负责最响的标题，但负责把一个容易被误读的概念校准到可发布、可讨论、可回流的精度。\n\n为什么研究很难区分“能力提高”与“成功外包认知”这两件完全不同的事。这个题的核心不是“ADHD 很痛，AI 很有用”这种容易写烂的判断，而是：AI 提高的是能力，还是只是把认知成本暂时外包出去。如果这句话讲不清，后面所有平台版、口播版、评论问题和模板入口都会变成包装；如果讲清了，这篇文章就能成为一个真正的闭环资产。\n\n## 01 开场：先从一个不舒服的场景进入\n\n想象一个很具体的画面：你打开 AI，输入需求，几秒钟后它给你一份结构清楚、语气稳定、看起来比你本人更像“正常职场人”的答案。你应该高兴，因为它确实帮你省掉了很多步骤；但你心里又会冒出一个更暗的念头：如果它这么快就能把我翻译好，那我这些年到底算什么？\n\n这个问题的刺就在这里。AI 并没有简单地帮助 ADHD，它也重新定义了 ADHD 的痛感。过去你卡住，是因为启动难、排序难、时间感差、工作记忆漏水；现在工具可以接走很多中间步骤，于是新的问题出现了：工具接走以后，你的主体性、判断力、风险感和真实风格还剩多少？\n\n所以这篇不能写成工具赞歌。它必须承认 AI 的帮助，也必须追问帮助的代价。它不能让读者只获得“我被理解了”的安慰，而要让读者意识到：自己真正需要设计的不是一个更会输出的工具，而是一个不会吞掉判断权的外部执行系统。\n\n## 02 核心判断：问题不在能力，而在接口\n\nADHD 最容易被误解成能力问题。拖延被看成懒，分心被看成不认真，情绪波动被看成不成熟，计划失效被看成不负责任。但在很多真实场景里，当事人并不是不知道目标，也不是没有能力，而是缺少一条从目标到动作的稳定通道。\n\n这条通道，我更愿意叫它“执行接口”。它包括启动接口、排序接口、时间接口、工作记忆接口、情绪接口、反馈接口和委托接口。普通人可能也会卡，但 ADHD 用户会更早、更频繁、更痛地感到这些接口失灵。\n\nAI 的价值，正是在这里出现的。它可以把抽象目标切成步骤，把脑内混乱压成结构，把空白页面变成可修改草稿，把一团焦虑翻译成一个五分钟动作。它不是把你治好，而是暂时补上某个接口。\n\n但这也解释了为什么 AI 有时会让人更痛苦。因为一旦工具补上了接口，社会就更容易说：你看，工具都有了，你怎么还不行？于是原本属于环境、系统和执行功能的摩擦，又被重新塞回个人道德里。\n\n## 03 这个题的真正锋口：能力还是外包\n\n能力还是外包 不是一个装饰性概念，而是这篇文章必须守住的锋口。它要求我们不要在“AI 能帮忙”这个浅层判断上停下，而要继续问：它帮的是哪一段？它有没有制造新的依赖？它有没有把高方差风格洗成神经典型风格？它有没有把现实反馈变得更清楚，还是只让半成品变多？\n\n对 ADHD 用户来说，最危险的不是工具不好用，而是工具太顺。太顺的工具会让人误以为自己已经完成了现实动作：生成了计划，就像开始了；写出了草稿，就像发布了；整理了知识库，就像做出了判断；让 Agent 跑了一轮，就像自己已经承担了风险。\n\n但现实不是这样运转的。现实只承认动作、交付、对话、反馈和后果。一个 AI 工作流如果不能把人送到这些东西面前，它再漂亮也只是新的缓冲区。\n\n所以这篇文章的锋口要落在一句话上：AI 可以接走摩擦，但不能替你承担判断；Agent 可以执行动作，但不能替你承担赌注；工具可以翻译你，但不能替你活。\n\n## 04 三个校准：防止写成营销号\n\n第一，不能把 ADHD 写成天才徽章。高方差确实可能带来发散、联想、敏感和异常问题感，但这些能力只有在合适接口里才会变成产出。没有接口，高方差只是高损耗。\n\n第二，不能把 AI 写成治疗方案。AI 可以帮助某些任务场景里的执行功能外部化，但它不能替代诊断、治疗、药物、睡眠、稳定关系和真实工作条件。把 AI 写成万能药，最后只会制造新的羞耻。\n\n第三，不能把内容写成纯共鸣。共鸣是入口，不是终点。读者说“太真实了”只能说明文章击中了痛点；读者能说出“我卡在启动接口，我需要一个五分钟动作”，才说明文章完成了转译。\n\n这三个校准决定了《问题XXX》系列和普通 ADHD 内容的区别：它不是贩卖身份，不是贩卖焦虑，也不是贩卖工具，而是在搭一套能把痛感转成动作、动作转成反馈、反馈转成资产的系统。\n\n## 05 可执行判断：一篇文章必须留下一个动作\n\n这篇文章最终要留下的动作，是一张《能力/外包区分表》。它不需要复杂，甚至越简单越好。表格只问四件事：我现在卡在哪里；这是哪个执行接口断了；AI 可以接走哪一个最小动作；48 小时内用什么现实信号验证它。\n\n| 当前卡点 | 执行接口 | AI/Agent 最小动作 | 48 小时现实信号 |\n|---|---|---|---|\n| 我一直想但没开始 | 启动接口 | 拆成一个五分钟动作 | 是否真的打开并完成第一步 |\n| 我同时有太多方向 | 排序接口 | 压成三个选项并给取舍理由 | 是否能放弃两个方向 |\n| 我生成了很多内容 | 反馈接口 | 设计一次发布、询问或交付 | 是否收到真实回应 |\n| 我怕工具替代自己 | 委托接口 | 标出哪些可委托、哪些必须自己判断 | 是否保留最终决策 |\n\n这个表的价值，不在于它多漂亮，而在于它把模糊自责改成了可处理的问题。ADHD 用户不需要再问“为什么我又这样”，而是可以问“我现在哪个接口断了”。这就是从情绪叙事进入产品化叙事的分界线。\n\n## 06 结尾：真正的目标不是更正常，而是更可回流\n\nAI 最容易给人的幻觉，是让一切看起来更顺了。文本更顺，计划更顺，表达更顺，简历更顺，汇报更顺。但顺不等于真，顺也不等于完成。对 ADHD 用户来说，真正重要的是：这套系统有没有让现实更快回话？有没有让你更少在脑内空转？有没有让你保留自己的判断，而不是把自己交给模板？\n\n所以这篇文章最后要把读者带到一个更冷静的位置：不要问 AI 有没有让你变正常，要问它有没有让你更能进入现实。不要问自己是不是终于被修好了，要问哪个接口被外部化了，哪个接口还需要人工守住。\n\n这才是 ADHD × AI 的真正命题。不是治愈，不是神化，不是炫耀效率，而是在一个注意力被系统性采掘的时代，为高方差大脑重新设计进入现实的通道。\n\n## 发布接口\n\n公众号版用这一版作为主稿，保留严肃随笔语气。小红书版只截取开场场景和《能力/外包区分表》。知乎版重点回答概念边界：AI 不是治疗，而是外部化脚手架。短视频版抓一句话：工具可以翻译你，但不能替你活。评论区唯一问题：你现在最想让 AI 接住的，是哪个执行接口？\n\n## 07 发布前精修补丁：把锋利度落到第一屏\n\n发布前，这篇文章还需要在第一屏做一次更狠的取舍：不要先解释概念，不要先铺知识背景，也不要先证明作者懂 ADHD。第一屏只做一件事：把读者带进一个他们无法否认的现场。\n\n这个现场可以是：工具已经把文本写得很漂亮，但你仍然没有发布；Agent 已经跑出十个方案，但你反而更难选择；AI 把你翻译得像一个稳定的人，但你突然怀疑自己的原始表达是不是被洗掉了。这个现场一旦成立，后面的理论才有必要出现。\n\n因此，正式发布时建议把开头压成三段。第一段写一个动作现场，第二段写这个现场背后的执行接口，第三段抛出本文判断：为什么研究很难区分“能力提高”与“成功外包认知”这两件完全不同的事 不是一个工具问题，而是一个“谁来接住执行功能、谁来保留判断权、谁来承担现实反馈”的问题。\n\n这也是评论区回流的重点。不要问“你怎么看 AI 和 ADHD”，这个问题太大，读者只会泛泛表达。要问：“你现在最想交给 AI 的，是启动、排序、记忆、时间感、情绪门槛，还是反馈回流？”这个问题足够小，才可能带回可用数据。\n\n如果这篇发布后只得到共鸣，它还只是文章；如果它能让读者说出自己的接口断点，它就是资产；如果它进一步让读者索要表格、提示词或模板，它才真正进入产品化路径。", "chars": 4346, "path": "content-packs/问题381/01_正文.md"}, {"id": "问题389", "number": 389, "title": "问题389：为什么“身体加倍”的数字化，不只是生产力工具，而是在重构陪伴和专注", "priority": "A", "category": "attention", "rank": 302, "grade": "D", "desire": 3, "thought": 4, "action": 4, "total": 11, "authenticity": 3, "risk": "高", "failure": "类型模板、自律化/审计化", "desire_text": "从被平台、短视频、AI 顺滑输出牵着走，变成重新夺回一点注意力、时间感和现实动作。", "thought_text": "把“我不自律”改写成“注意力被竞价、时间感被工具改写、深度工作被浅层动作伪装”。", "action_text": "做一次 15 分钟注意力审计：刚才谁拿走了我的注意力，它换回了什么现实结果。", "real_desire": "", "outsourcing_angle": "", "verification_signal": "", "comment": "高风险：发布前必须题目级真实欲望校准；注意力题优先写“系统替我挡掉掠夺”，不要写成靠意志力夺回", "article": "# 问题389：为什么“身体加倍”的数字化，不只是生产力工具，而是在重构陪伴和专注\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想又多一个效率工具，而是想在卡住的第一秒，有东西能把你从空白、混乱、羞耻和过载里拉出来。\n\n**所思：** 原来我卡住的不是能力，而是接口；我缺的不是更多道理，而是一个能承接启动、排序、记忆、反馈和委托的外部系统。\n\n**所行：** 把今天最卡的一件事丢给 AI，只要求它输出三行：第一步、三分钟版本、失败后重启句。不要让它替你写宏大计划。\n\n## 点火开场：发布版第一屏\n\n你最熟悉的崩溃不是“我不会”，而是“我明明会，但我开始不了”。屏幕是空的，脑子是满的，任务在那里，你也在那里，中间却像断了一根线。\n\n所以《为什么“身体加倍”的数字化，不只是生产力工具，而是在重构陪伴和专注》这篇不能先讲概念。它要先让读者在第三段前停住：这不就是我吗？我不是没有能力，我是一直在用不适配自己的接口硬扛。\n\n真正的 S 级，不是观点锋利，而是三件事同时发生：读者想要一种新的活法，读者重新解释自己的卡点，读者马上做一个小动作。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 从被平台、短视频、AI 顺滑输出牵着走，变成重新夺回一点注意力、时间感和现实动作。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 7 | A级优先级，有明确发布潜力；已发布前精修 |\n| 所思 | 把“我不自律”改写成“注意力被竞价、时间感被工具改写、深度工作被浅层动作伪装”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 7 | A级优先级，有明确发布潜力；已发布前精修 |\n| 所行 | 做一次 15 分钟注意力审计：刚才谁拿走了我的注意力，它换回了什么现实结果。 | 结尾必须给一个 3-15 分钟内可执行的 AI/备忘录/微信动作。 | 7 | A级优先级，有明确发布潜力；已发布前精修 |\n| 电流总分 | 先列触动内容，再综合打分。 | 越能指出注意力被采掘、时间感被改变、现实动作被替代，分数越高。 | 21 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n这是一篇第二梯队的关键文章：它不一定负责最响的标题，但负责把一个容易被误读的概念校准到可发布、可讨论、可回流的精度。\n\n为什么“身体加倍”的数字化，不只是生产力工具，而是在重构陪伴和专注。这个题的核心不是“ADHD 很痛，AI 很有用”这种容易写烂的判断，而是：AI 不是纯脑力工具，它正在制造新的数字身体加倍。如果这句话讲不清，后面所有平台版、口播版、评论问题和模板入口都会变成包装；如果讲清了，这篇文章就能成为一个真正的闭环资产。\n\n## 01 开场：先从一个不舒服的场景进入\n\n想象一个很具体的画面：你打开 AI，输入需求，几秒钟后它给你一份结构清楚、语气稳定、看起来比你本人更像“正常职场人”的答案。你应该高兴，因为它确实帮你省掉了很多步骤；但你心里又会冒出一个更暗的念头：如果它这么快就能把我翻译好，那我这些年到底算什么？\n\n这个问题的刺就在这里。AI 并没有简单地帮助 ADHD，它也重新定义了 ADHD 的痛感。过去你卡住，是因为启动难、排序难、时间感差、工作记忆漏水；现在工具可以接走很多中间步骤，于是新的问题出现了：工具接走以后，你的主体性、判断力、风险感和真实风格还剩多少？\n\n所以这篇不能写成工具赞歌。它必须承认 AI 的帮助，也必须追问帮助的代价。它不能让读者只获得“我被理解了”的安慰，而要让读者意识到：自己真正需要设计的不是一个更会输出的工具，而是一个不会吞掉判断权的外部执行系统。\n\n## 02 核心判断：问题不在能力，而在接口\n\nADHD 最容易被误解成能力问题。拖延被看成懒，分心被看成不认真，情绪波动被看成不成熟，计划失效被看成不负责任。但在很多真实场景里，当事人并不是不知道目标，也不是没有能力，而是缺少一条从目标到动作的稳定通道。\n\n这条通道，我更愿意叫它“执行接口”。它包括启动接口、排序接口、时间接口、工作记忆接口、情绪接口、反馈接口和委托接口。普通人可能也会卡，但 ADHD 用户会更早、更频繁、更痛地感到这些接口失灵。\n\nAI 的价值，正是在这里出现的。它可以把抽象目标切成步骤，把脑内混乱压成结构，把空白页面变成可修改草稿，把一团焦虑翻译成一个五分钟动作。它不是把你治好，而是暂时补上某个接口。\n\n但这也解释了为什么 AI 有时会让人更痛苦。因为一旦工具补上了接口，社会就更容易说：你看，工具都有了，你怎么还不行？于是原本属于环境、系统和执行功能的摩擦，又被重新塞回个人道德里。\n\n## 03 这个题的真正锋口：数字身体加倍\n\n数字身体加倍 不是一个装饰性概念，而是这篇文章必须守住的锋口。它要求我们不要在“AI 能帮忙”这个浅层判断上停下，而要继续问：它帮的是哪一段？它有没有制造新的依赖？它有没有把高方差风格洗成神经典型风格？它有没有把现实反馈变得更清楚，还是只让半成品变多？\n\n对 ADHD 用户来说，最危险的不是工具不好用，而是工具太顺。太顺的工具会让人误以为自己已经完成了现实动作：生成了计划，就像开始了；写出了草稿，就像发布了；整理了知识库，就像做出了判断；让 Agent 跑了一轮，就像自己已经承担了风险。\n\n但现实不是这样运转的。现实只承认动作、交付、对话、反馈和后果。一个 AI 工作流如果不能把人送到这些东西面前，它再漂亮也只是新的缓冲区。\n\n所以这篇文章的锋口要落在一句话上：AI 可以接走摩擦，但不能替你承担判断；Agent 可以执行动作，但不能替你承担赌注；工具可以翻译你，但不能替你活。\n\n## 04 三个校准：防止写成营销号\n\n第一，不能把 ADHD 写成天才徽章。高方差确实可能带来发散、联想、敏感和异常问题感，但这些能力只有在合适接口里才会变成产出。没有接口，高方差只是高损耗。\n\n第二，不能把 AI 写成治疗方案。AI 可以帮助某些任务场景里的执行功能外部化，但它不能替代诊断、治疗、药物、睡眠、稳定关系和真实工作条件。把 AI 写成万能药，最后只会制造新的羞耻。\n\n第三，不能把内容写成纯共鸣。共鸣是入口，不是终点。读者说“太真实了”只能说明文章击中了痛点；读者能说出“我卡在启动接口，我需要一个五分钟动作”，才说明文章完成了转译。\n\n这三个校准决定了《问题XXX》系列和普通 ADHD 内容的区别：它不是贩卖身份，不是贩卖焦虑，也不是贩卖工具，而是在搭一套能把痛感转成动作、动作转成反馈、反馈转成资产的系统。\n\n## 05 可执行判断：一篇文章必须留下一个动作\n\n这篇文章最终要留下的动作，是一张《数字身体协作表》。它不需要复杂，甚至越简单越好。表格只问四件事：我现在卡在哪里；这是哪个执行接口断了；AI 可以接走哪一个最小动作；48 小时内用什么现实信号验证它。\n\n| 当前卡点 | 执行接口 | AI/Agent 最小动作 | 48 小时现实信号 |\n|---|---|---|---|\n| 我一直想但没开始 | 启动接口 | 拆成一个五分钟动作 | 是否真的打开并完成第一步 |\n| 我同时有太多方向 | 排序接口 | 压成三个选项并给取舍理由 | 是否能放弃两个方向 |\n| 我生成了很多内容 | 反馈接口 | 设计一次发布、询问或交付 | 是否收到真实回应 |\n| 我怕工具替代自己 | 委托接口 | 标出哪些可委托、哪些必须自己判断 | 是否保留最终决策 |\n\n这个表的价值，不在于它多漂亮，而在于它把模糊自责改成了可处理的问题。ADHD 用户不需要再问“为什么我又这样”，而是可以问“我现在哪个接口断了”。这就是从情绪叙事进入产品化叙事的分界线。\n\n## 06 结尾：真正的目标不是更正常，而是更可回流\n\nAI 最容易给人的幻觉，是让一切看起来更顺了。文本更顺，计划更顺，表达更顺，简历更顺，汇报更顺。但顺不等于真，顺也不等于完成。对 ADHD 用户来说，真正重要的是：这套系统有没有让现实更快回话？有没有让你更少在脑内空转？有没有让你保留自己的判断，而不是把自己交给模板？\n\n所以这篇文章最后要把读者带到一个更冷静的位置：不要问 AI 有没有让你变正常，要问它有没有让你更能进入现实。不要问自己是不是终于被修好了，要问哪个接口被外部化了，哪个接口还需要人工守住。\n\n这才是 ADHD × AI 的真正命题。不是治愈，不是神化，不是炫耀效率，而是在一个注意力被系统性采掘的时代，为高方差大脑重新设计进入现实的通道。\n\n## 发布接口\n\n公众号版用这一版作为主稿，保留严肃随笔语气。小红书版只截取开场场景和《数字身体协作表》。知乎版重点回答概念边界：AI 不是治疗，而是外部化脚手架。短视频版抓一句话：工具可以翻译你，但不能替你活。评论区唯一问题：你现在最想让 AI 接住的，是哪个执行接口？\n\n## 07 发布前精修补丁：把锋利度落到第一屏\n\n发布前，这篇文章还需要在第一屏做一次更狠的取舍：不要先解释概念，不要先铺知识背景，也不要先证明作者懂 ADHD。第一屏只做一件事：把读者带进一个他们无法否认的现场。\n\n这个现场可以是：工具已经把文本写得很漂亮，但你仍然没有发布；Agent 已经跑出十个方案，但你反而更难选择；AI 把你翻译得像一个稳定的人，但你突然怀疑自己的原始表达是不是被洗掉了。这个现场一旦成立，后面的理论才有必要出现。\n\n因此，正式发布时建议把开头压成三段。第一段写一个动作现场，第二段写这个现场背后的执行接口，第三段抛出本文判断：为什么“身体加倍”的数字化，不只是生产力工具，而是在重构陪伴和专注 不是一个工具问题，而是一个“谁来接住执行功能、谁来保留判断权、谁来承担现实反馈”的问题。\n\n这也是评论区回流的重点。不要问“你怎么看 AI 和 ADHD”，这个问题太大，读者只会泛泛表达。要问：“你现在最想交给 AI 的，是启动、排序、记忆、时间感、情绪门槛，还是反馈回流？”这个问题足够小，才可能带回可用数据。\n\n如果这篇发布后只得到共鸣，它还只是文章；如果它能让读者说出自己的接口断点，它就是资产；如果它进一步让读者索要表格、提示词或模板，它才真正进入产品化路径。", "chars": 4300, "path": "content-packs/问题389/01_正文.md"}, {"id": "问题399", "number": 399, "title": "问题399：当所有人都需要 AI 才能专注，“正常”的定义已经死了", "priority": "A", "category": "attention", "rank": 303, "grade": "D", "desire": 3, "thought": 4, "action": 4, "total": 11, "authenticity": 3, "risk": "高", "failure": "类型模板、自律化/审计化", "desire_text": "从被平台、短视频、AI 顺滑输出牵着走，变成重新夺回一点注意力、时间感和现实动作。", "thought_text": "把“我不自律”改写成“注意力被竞价、时间感被工具改写、深度工作被浅层动作伪装”。", "action_text": "做一次 15 分钟注意力审计：刚才谁拿走了我的注意力，它换回了什么现实结果。", "real_desire": "", "outsourcing_angle": "", "verification_signal": "", "comment": "高风险：发布前必须题目级真实欲望校准；注意力题优先写“系统替我挡掉掠夺”，不要写成靠意志力夺回", "article": "# 问题399：当所有人都需要 AI 才能专注，“正常”的定义已经死了\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想又多一个效率工具，而是想在卡住的第一秒，有东西能把你从空白、混乱、羞耻和过载里拉出来。\n\n**所思：** 原来我卡住的不是能力，而是接口；我缺的不是更多道理，而是一个能承接启动、排序、记忆、反馈和委托的外部系统。\n\n**所行：** 把今天最卡的一件事丢给 AI，只要求它输出三行：第一步、三分钟版本、失败后重启句。不要让它替你写宏大计划。\n\n## 点火开场：发布版第一屏\n\n你最熟悉的崩溃不是“我不会”，而是“我明明会，但我开始不了”。屏幕是空的，脑子是满的，任务在那里，你也在那里，中间却像断了一根线。\n\n所以《当所有人都需要 AI 才能专注，“正常”的定义已经死了》这篇不能先讲概念。它要先让读者在第三段前停住：这不就是我吗？我不是没有能力，我是一直在用不适配自己的接口硬扛。\n\n真正的 S 级，不是观点锋利，而是三件事同时发生：读者想要一种新的活法，读者重新解释自己的卡点，读者马上做一个小动作。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 从被平台、短视频、AI 顺滑输出牵着走，变成重新夺回一点注意力、时间感和现实动作。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 9 | A级优先级，有明确发布潜力；已发布前精修；标题自带强冲突/强识别 |\n| 所思 | 把“我不自律”改写成“注意力被竞价、时间感被工具改写、深度工作被浅层动作伪装”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 8 | A级优先级，有明确发布潜力；已发布前精修；标题自带强冲突/强识别 |\n| 所行 | 做一次 15 分钟注意力审计：刚才谁拿走了我的注意力，它换回了什么现实结果。 | 结尾必须给一个 3-15 分钟内可执行的 AI/备忘录/微信动作。 | 8 | A级优先级，有明确发布潜力；已发布前精修；标题自带强冲突/强识别 |\n| 电流总分 | 先列触动内容，再综合打分。 | 越能指出注意力被采掘、时间感被改变、现实动作被替代，分数越高。 | 25 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n这是一篇第二梯队的关键文章：它不一定负责最响的标题，但负责把一个容易被误读的概念校准到可发布、可讨论、可回流的精度。\n\n当所有人都需要 AI 才能专注，“正常”的定义已经死了。这个题的核心不是“ADHD 很痛，AI 很有用”这种容易写烂的判断，而是：当所有人都需要 AI 才能专注，正常的定义已经被工作系统改写。如果这句话讲不清，后面所有平台版、口播版、评论问题和模板入口都会变成包装；如果讲清了，这篇文章就能成为一个真正的闭环资产。\n\n## 01 开场：先从一个不舒服的场景进入\n\n想象一个很具体的画面：你打开 AI，输入需求，几秒钟后它给你一份结构清楚、语气稳定、看起来比你本人更像“正常职场人”的答案。你应该高兴，因为它确实帮你省掉了很多步骤；但你心里又会冒出一个更暗的念头：如果它这么快就能把我翻译好，那我这些年到底算什么？\n\n这个问题的刺就在这里。AI 并没有简单地帮助 ADHD，它也重新定义了 ADHD 的痛感。过去你卡住，是因为启动难、排序难、时间感差、工作记忆漏水；现在工具可以接走很多中间步骤，于是新的问题出现了：工具接走以后，你的主体性、判断力、风险感和真实风格还剩多少？\n\n所以这篇不能写成工具赞歌。它必须承认 AI 的帮助，也必须追问帮助的代价。它不能让读者只获得“我被理解了”的安慰，而要让读者意识到：自己真正需要设计的不是一个更会输出的工具，而是一个不会吞掉判断权的外部执行系统。\n\n## 02 核心判断：问题不在能力，而在接口\n\nADHD 最容易被误解成能力问题。拖延被看成懒，分心被看成不认真，情绪波动被看成不成熟，计划失效被看成不负责任。但在很多真实场景里，当事人并不是不知道目标，也不是没有能力，而是缺少一条从目标到动作的稳定通道。\n\n这条通道，我更愿意叫它“执行接口”。它包括启动接口、排序接口、时间接口、工作记忆接口、情绪接口、反馈接口和委托接口。普通人可能也会卡，但 ADHD 用户会更早、更频繁、更痛地感到这些接口失灵。\n\nAI 的价值，正是在这里出现的。它可以把抽象目标切成步骤，把脑内混乱压成结构，把空白页面变成可修改草稿，把一团焦虑翻译成一个五分钟动作。它不是把你治好，而是暂时补上某个接口。\n\n但这也解释了为什么 AI 有时会让人更痛苦。因为一旦工具补上了接口，社会就更容易说：你看，工具都有了，你怎么还不行？于是原本属于环境、系统和执行功能的摩擦，又被重新塞回个人道德里。\n\n## 03 这个题的真正锋口：正常崩塌\n\n正常崩塌 不是一个装饰性概念，而是这篇文章必须守住的锋口。它要求我们不要在“AI 能帮忙”这个浅层判断上停下，而要继续问：它帮的是哪一段？它有没有制造新的依赖？它有没有把高方差风格洗成神经典型风格？它有没有把现实反馈变得更清楚，还是只让半成品变多？\n\n对 ADHD 用户来说，最危险的不是工具不好用，而是工具太顺。太顺的工具会让人误以为自己已经完成了现实动作：生成了计划，就像开始了；写出了草稿，就像发布了；整理了知识库，就像做出了判断；让 Agent 跑了一轮，就像自己已经承担了风险。\n\n但现实不是这样运转的。现实只承认动作、交付、对话、反馈和后果。一个 AI 工作流如果不能把人送到这些东西面前，它再漂亮也只是新的缓冲区。\n\n所以这篇文章的锋口要落在一句话上：AI 可以接走摩擦，但不能替你承担判断；Agent 可以执行动作，但不能替你承担赌注；工具可以翻译你，但不能替你活。\n\n## 04 三个校准：防止写成营销号\n\n第一，不能把 ADHD 写成天才徽章。高方差确实可能带来发散、联想、敏感和异常问题感，但这些能力只有在合适接口里才会变成产出。没有接口，高方差只是高损耗。\n\n第二，不能把 AI 写成治疗方案。AI 可以帮助某些任务场景里的执行功能外部化，但它不能替代诊断、治疗、药物、睡眠、稳定关系和真实工作条件。把 AI 写成万能药，最后只会制造新的羞耻。\n\n第三，不能把内容写成纯共鸣。共鸣是入口，不是终点。读者说“太真实了”只能说明文章击中了痛点；读者能说出“我卡在启动接口，我需要一个五分钟动作”，才说明文章完成了转译。\n\n这三个校准决定了《问题XXX》系列和普通 ADHD 内容的区别：它不是贩卖身份，不是贩卖焦虑，也不是贩卖工具，而是在搭一套能把痛感转成动作、动作转成反馈、反馈转成资产的系统。\n\n## 05 可执行判断：一篇文章必须留下一个动作\n\n这篇文章最终要留下的动作，是一张《正常性边界卡》。它不需要复杂，甚至越简单越好。表格只问四件事：我现在卡在哪里；这是哪个执行接口断了；AI 可以接走哪一个最小动作；48 小时内用什么现实信号验证它。\n\n| 当前卡点 | 执行接口 | AI/Agent 最小动作 | 48 小时现实信号 |\n|---|---|---|---|\n| 我一直想但没开始 | 启动接口 | 拆成一个五分钟动作 | 是否真的打开并完成第一步 |\n| 我同时有太多方向 | 排序接口 | 压成三个选项并给取舍理由 | 是否能放弃两个方向 |\n| 我生成了很多内容 | 反馈接口 | 设计一次发布、询问或交付 | 是否收到真实回应 |\n| 我怕工具替代自己 | 委托接口 | 标出哪些可委托、哪些必须自己判断 | 是否保留最终决策 |\n\n这个表的价值，不在于它多漂亮，而在于它把模糊自责改成了可处理的问题。ADHD 用户不需要再问“为什么我又这样”，而是可以问“我现在哪个接口断了”。这就是从情绪叙事进入产品化叙事的分界线。\n\n## 06 结尾：真正的目标不是更正常，而是更可回流\n\nAI 最容易给人的幻觉，是让一切看起来更顺了。文本更顺，计划更顺，表达更顺，简历更顺，汇报更顺。但顺不等于真，顺也不等于完成。对 ADHD 用户来说，真正重要的是：这套系统有没有让现实更快回话？有没有让你更少在脑内空转？有没有让你保留自己的判断，而不是把自己交给模板？\n\n所以这篇文章最后要把读者带到一个更冷静的位置：不要问 AI 有没有让你变正常，要问它有没有让你更能进入现实。不要问自己是不是终于被修好了，要问哪个接口被外部化了，哪个接口还需要人工守住。\n\n这才是 ADHD × AI 的真正命题。不是治愈，不是神化，不是炫耀效率，而是在一个注意力被系统性采掘的时代，为高方差大脑重新设计进入现实的通道。\n\n## 发布接口\n\n公众号版用这一版作为主稿，保留严肃随笔语气。小红书版只截取开场场景和《正常性边界卡》。知乎版重点回答概念边界：AI 不是治疗，而是外部化脚手架。短视频版抓一句话：工具可以翻译你，但不能替你活。评论区唯一问题：你现在最想让 AI 接住的，是哪个执行接口？\n\n## 07 发布前精修补丁：把锋利度落到第一屏\n\n发布前，这篇文章还需要在第一屏做一次更狠的取舍：不要先解释概念，不要先铺知识背景，也不要先证明作者懂 ADHD。第一屏只做一件事：把读者带进一个他们无法否认的现场。\n\n这个现场可以是：工具已经把文本写得很漂亮，但你仍然没有发布；Agent 已经跑出十个方案，但你反而更难选择；AI 把你翻译得像一个稳定的人，但你突然怀疑自己的原始表达是不是被洗掉了。这个现场一旦成立，后面的理论才有必要出现。\n\n因此，正式发布时建议把开头压成三段。第一段写一个动作现场，第二段写这个现场背后的执行接口，第三段抛出本文判断：当所有人都需要 AI 才能专注，“正常”的定义已经死了 不是一个工具问题，而是一个“谁来接住执行功能、谁来保留判断权、谁来承担现实反馈”的问题。\n\n这也是评论区回流的重点。不要问“你怎么看 AI 和 ADHD”，这个问题太大，读者只会泛泛表达。要问：“你现在最想交给 AI 的，是启动、排序、记忆、时间感、情绪门槛，还是反馈回流？”这个问题足够小，才可能带回可用数据。\n\n如果这篇发布后只得到共鸣，它还只是文章；如果它能让读者说出自己的接口断点，它就是资产；如果它进一步让读者索要表格、提示词或模板，它才真正进入产品化路径。", "chars": 4312, "path": "content-packs/问题399/01_正文.md"}, {"id": "问题002", "number": 2, "title": "问题002：AI Agent是不是ADHD等了20年的接口——你的外部前额叶终于有了可调用形态", "priority": "B", "category": "ai_interface", "rank": 304, "grade": "D", "desire": 3, "thought": 4, "action": 4, "total": 11, "authenticity": 3, "risk": "高", "failure": "类型模板、风险先行", "desire_text": "既想要 AI 接住启动、排序、记忆和表达，又不想把判断权、自我效能和真实风格一起交出去。", "thought_text": "把“我终于有工具了”改写成“这是外部前额叶、执行功能假肢，也可能制造依赖阈值和主体性稀释”。", "action_text": "把一个任务分成可委托、必须自己判断、需要现实反馈三栏，再只交给 AI 最小一块。", "real_desire": "", "outsourcing_angle": "", "verification_signal": "", "comment": "高风险：发布前必须题目级真实欲望校准；注意 Agentic AI 题不要默认害怕委托，要先承认全痛点外包欲望", "article": "# 问题002：AI Agent是不是ADHD等了20年的接口——你的外部前额叶终于有了可调用形态\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想又多一个效率工具，而是想在卡住的第一秒，有东西能把你从空白、混乱、羞耻和过载里拉出来。\n\n**所思：** 原来我卡住的不是能力，而是接口；我缺的不是更多道理，而是一个能承接启动、排序、记忆、反馈和委托的外部系统。\n\n**所行：** 把今天最卡的一件事丢给 AI，只要求它输出三行：第一步、三分钟版本、失败后重启句。不要让它替你写宏大计划。\n\n## 点火开场：发布版第一屏\n\n你最熟悉的崩溃不是“我不会”，而是“我明明会，但我开始不了”。屏幕是空的，脑子是满的，任务在那里，你也在那里，中间却像断了一根线。\n\n所以《AI Agent是不是ADHD等了20年的接口——你的外部前额叶终于有了可调用形态》这篇不能先讲概念。它要先让读者在第三段前停住：这不就是我吗？我不是没有能力，我是一直在用不适配自己的接口硬扛。\n\n真正的 S 级，不是观点锋利，而是三件事同时发生：读者想要一种新的活法，读者重新解释自己的卡点，读者马上做一个小动作。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 既想要 AI 接住启动、排序、记忆和表达，又不想把判断权、自我效能和真实风格一起交出去。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 7 | 标题自带强冲突/强识别；正文承载不足；AI接口张力明确 |\n| 所思 | 把“我终于有工具了”改写成“这是外部前额叶、执行功能假肢，也可能制造依赖阈值和主体性稀释”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 6 | 标题自带强冲突/强识别；正文承载不足；AI接口张力明确 |\n| 所行 | 把一个任务分成可委托、必须自己判断、需要现实反馈三栏，再只交给 AI 最小一块。 | 结尾必须给一个 3-15 分钟内可 "desire_text": "不再把自己伪装成稳定、线性、随叫随到的人，而是想要岗位、会议、招聘和反馈系统真的改接口。", "thought_text": "把“不适合组织”改写成“不适合隐性优先级、即时表达、稳定外壳这套默认组织接口”。", "action_text": "选一个最耗能工作环节，让 AI 写成四句接口说明：输入、输出、确认节奏、反馈格式。", "real_desire": "", "outsourcing_angle": "", "verification_signal": "", "comment": "高风险：发布前必须题目级真实欲望校准；组织题要从组织咨询语落到个体真实痛点和接口显性化", "article": "# 问题065：为什么ADHD的\"人设疲劳\"需要Agent来做社交面具管理——你不是装得太累，是切得太频\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想被夸“很有创造力”，而是想在会议、岗位、招聘和反馈系统里，不必先把自己伪装成稳定、线性、随叫随到的人。\n\n**所思：** 原来我不是天然不适合组织，我可能只是不适合一套只奖励即时表达、隐性优先级和稳定外壳的组织接口。AI 的意义不是让我更会伪装，而是逼组织把规则说清楚。\n\n**所行：** 选一个最耗你的工作环节，让 AI 写成四句话：任务输入是什么、期望输出是什么、多久确认一次、反馈用什么格式。然后把它当作一次沟通模板。\n\n## 点火开场：发布版第一屏\n\n你最累的可能不是工作本身，而是每天把自己翻译成一个组织更容易接受的版本：开会要像没走神，汇报要像一直在线，优先级不清也要装作懂了。\n\n所以《为什么ADHD的\"人设疲劳\"需要Agent来做社交面具管理——你不是装得太累，是切得太频》这篇不能先讲概念。它要先让读者在第三段前停住：这不就是我吗？我不是没有能力，我是一直在用不适配自己的接口硬扛。\n\n真正的 S 级，不是观点锋利，而是三件事同时发生：读者想要一种新的活法，读者重新解释自己的卡点，读者马上做一个小动作。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 不再把自己伪装成稳定、线性、随叫随到的人，而是想要岗位、会议、招聘和反馈系统真的改接口。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 6 | 标题自带强冲突/强识别；正文承载不足 |\n| 所思 | 把“不适合组织”改写成“不适合隐性优先级、即时表达、稳定外壳这套默认组织接口”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 6 | 标题自带强冲突/强识别；正文承载不足 |\n| 所行 | 选一个最耗能工作环节，让 AI 写成四句接口说明：输入、输出、确认节奏、反馈格式。 | 结尾必须给一个 3-15 分钟内可执行的 AI/备忘录/微信动作。 | 6 | 标题自带强冲突/强识别；正文承载不足 |\n| 电流总分 | 先列触动内容，再综合打分。 | 能否把个人痛感推到组织接口、招聘流程、管理节奏和结构承诺。 | 18 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n", "chars": 1068, "path": "content-packs/问题065/01_正文.md"}, {"id": "问题076", "number": 76, "title": "问题076：为什么ADHD的心算困难是大脑把工作记忆让位给了发散网络？你不是数学差，是缓存被联想占满了", "priority": "B", "category": "org", "rank": 308, "grade": "D", "desire": 3, "thought": 4, "action": 4, "total": 11, "authenticity": 3, "risk": "高", "failure": "类型模板、组织咨询化错位", "desire_text": "不再把自己伪装成稳定、线性、随叫随到的人，而是想要岗位、会议、招聘和反馈系统真的改接口。", "thought_text": "把“不适合组织”改写成“不适合隐性优先级、即时表达、稳定外壳这套默认组织接口”。", "action_text": "选一个最耗能工作环节，让 AI 写成四句接口说明：输入、输出、确认节奏、反馈格式。", "real_desire": "", "outsourcing_angle": "", "verification_signal": 、时间感被改变、现实动作被替代，分数越高。 | 18 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n", "chars": 989, "path": "content-packs/问题124/01_正文.md"}, {"id": "问题299", "number": 299, "title": "问题299：为什么ADHD 真正需要的不是“全自动人生”，而是“有保底手动入口的外部前额叶”？", "priority": "B", "category": "ai_interface", "rank": 313, "grade": "D", "desire": 3, "thought": 4, "action": 4, "total": 11, "authenticity": 3, "risk": "高", "failure": "类型模板、风险先行", "desire_text": "既想要 AI 接住启动、排序、记忆和表达，又不想把判断权、自我效能和真实风格一起交出去。", "thought_text": "把“我终于有工具了”改写成“这是外部前额叶、执行功能假肢，也可能制造依赖阈值和主体性稀释”。", "action_text": "把一个任务分成可委托、必须自己判断、需要现实反馈三栏，再只交给 AI 最小一块。", "real_desire": "", "outsourcing_angle": "", "verification_signal": "", "comment": "高风险：发布前必须题目级真实欲望校准；注意 Agentic AI 题不要默认害怕委托，要先承认全痛点外包欲望", "article": "# 问题299：为什么ADHD 真正需要的不是“全自动人生”，而是“有保底手动入口的外部前额叶”？\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想又多一个效率工具，而是想在卡住的第一秒，有东西能把你从空白、混乱、羞耻和过载里拉出来。\n\n**所思：** 原来我卡住的不是能力，而是接口；我缺的不是更多道理，而是一个能承接启动、排序、记忆、反馈和委托的外部系统。\n\n**所行：** 把今天最卡的一件事丢给 AI，只要求它输出三行：第一步、三分钟版本、失败后重启句。不要让它替你写宏大计划。\n\n## 点火开场：发布版第一屏\n\n你最熟悉的崩溃不是“我不会”，而是“我明明会，但我开始不了”。屏幕是空的，脑子是满的，任务在那里，你也在那里，中间却像断了一根线。\n\n所以《为什么ADHD 真正需要的不是“全自动人生”，而是“有保底手动入口的外部前额叶”？》这篇不能先讲概念。它要先让读者在第三段前停住：这不就是我吗？我不是没有能力，我是一直在用不适配自己的接口硬扛。\n\n真正的 S 级，不是观点锋利，而是三件事同时发生：读者想要一种新的活法，读者重新解释自己的卡点，读者马上做一个小动作。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 既想要 AI 接住启动、排序、记忆和表达，又不想把判断权、自我效能和真实风格一起交出去。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 7 | 标题自带强冲突/强识别；正文承载不足；AI接口张力明确 |\n| 所思 | 把“我终于有工具了”改写成“这是外部前额叶、执行功能假肢，也可能制造依赖阈值和主体性稀释”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 6 | 标题自带强冲突/强识别；正文承载不足；AI接口张力明确 |\n| 所行 | 把一个任务分成可委托、必须自己判断、需要现实反馈三栏，再只交给 AI 最小一块。 | 结尾必须给一个 3-15 分钟内可执行的 AI/备忘录/微信动作。 | 6 | 标题自带强冲突/强识别；正文承载不足；AI接口张力明确 |\n| 电流总分 | 先列触动内容，再综合打分。 | 越能处理 AI 帮助与依赖、委托与控制、增强与替代之间的张力，分数越高。 | 19 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n", "chars": 1058, "path": "content-packs/问题299/01_正文.md"}, {"id": "问题304", "number": 304, "title": "问题304：为什么“外部前额叶”一旦设计错误，就会从救生圈变成认知代偿陷阱？", "priority": "B", "category": "ai_inte 达、稳定外壳这套默认组织接口”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 6 | 正文承载不足 |\n| 所行 | 选一个最耗能工作环节，让 AI 写成四句接口说明：输入、输出、确认节奏、反馈格式。 | 结尾必须给一个 3-15 分钟内可执行的 AI/备忘录/微信动作。 | 6 | 正文承载不足 |\n| 电流总分 | 先列触动内容，再综合打分。 | 能否把个人痛感推到组织接口、招聘流程、管理节奏和结构承诺。 | 18 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n", "chars": 988, "path": "content-packs/问题340/01_正文.md"}, {"id": "问题343", "number": 343, "title": "问题343：为什么数字认知生态一旦断电，ADHD 会经历认知义肢脱落？", "priority": "B", "category": "ai_interface", "rank": 319, "grade": "D", "desire": 3, "thought": 4, "action": 4, "total": 11, "authenticity": 3, "risk": "高", "failure": "类型模板、风险先行", "desire_text": "既想要 AI 接住启动、排序、记忆和表达，又不想把判断权、自我效能和真实风格一起交出去。", "thought_text": "把“我终于有工具了”改写成“这是外部前额叶、执行功能假肢，也可能制造依赖阈值和主体性稀释”。", "action_text": "把一个任务分成可委托、必须自己判断、需要现实反馈三栏，再只交给 AI 最小一块。", "real_desire": "", "outsourcing_angle": "", "verification_signal": "", "comment": "高风险：发布前必须题目级真实欲望校准；注意 Agentic AI 题不要默认害怕委托，要先承认全痛点外包欲望", "article": "# 问题343：为什么数字认知生态一旦断电，ADHD 会经历认知义肢脱落？\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想被安慰“你没有问题”，而是想终于找到一种方式，让自己这种不稳定但高能量的系统可以被接住。\n\n**所思：** 原来我的问题不只是性格、习惯或意志力，而是输入、启动、反馈和回流接口长期错配。\n\n**所行：** 写下一个最近最反复的卡点，让 AI 帮你翻译成三句话：我想要什么、我卡在哪里、下一步三分钟做什么。\n\n## 点火开场：发布版第一屏\n\n你可能已经听过太多建议：自律一点、规划一点、坚持一点。但真正的问题是，你不是不知道这些道理，而是每次要把道理变成动作时，系统就断电。\n\n所以《为什么数字认知生态一旦断电，ADHD 会经历认知义肢脱落？》这篇不能先讲概念。它要先让读者在第三段前停住：这不就是我吗？我不是没有能力，我是一直在用不适配自己的接口硬扛。\n\n真正的 S 级，不是观点锋利，而是三件事同时发生：读者想要一种新的活法，读者重新解释自己的卡点，读者马上做一个小动作。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 既想要 AI 接住启动、排序、记忆和表达，又不想把判断权、自我效能和真实风格一起交出去。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 7 | 标题自带强冲突/强识别；正文承载不足；AI接口张力明确 |\n| 所思 | 把“我终于有工具了”改写成“这是外部前额叶、执行功能假肢，也可能制造依赖阈值和主体性稀释”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 6 | 标题自带强冲突/强识别；正文承载不足；AI接口张力明确 |\n| 所行 | 把一个任务分成可委托、必须自己判断、需要现实反馈三栏，再只交给 AI 最小一块。 | 结尾必须给一个 3-15 分钟内可执行的 AI/备忘录/微信动作。 | 6 | 标题自带强冲突/强识别；正文承载不足；AI接口张力明确 |\n| 电流总分 | 先列触动内容，再综合打分。 | 越能处理 AI 帮助与依赖、委托与控制、增强与替代之间的张力，分数越高。 | 19 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n", "chars": 1018, "pa e": "类型模板、风险先行", "desire_text": "既想要 AI 接住启动、排序、记忆和表达，又不想把判断权、自我效能和真实风格一起交出去。", "thought_text": "把“我终于有工具了”改写成“这是外部前额叶、执行功能假肢，也可能制造依赖阈值和主体性稀释”。", "action_text": "把一个任务分成可委托、必须自己判断、需要现实反馈三栏，再只交给 AI 最小一块。", "real_desire": "", "outsourcing_angle": "", "verification_signal": "", "comment": "高风险：发布前必须题目级真实欲望校准；注意 Agentic AI 题不要默认害怕委托，要先承认全痛点外包欲望", "article": "# 问题360：为什么多 Agent 时代最稀缺的不是 Agent，而是任务仲裁器？\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想又多一个效率工具，而是想在卡住的第一秒，有东西能把你从空白、混乱、羞耻和过载里拉出来。\n\n**所思：** 原来我卡住的不是能力，而是接口；我缺的不是更多道理，而是一个能承接启动、排序、记忆、反馈和委托的外部系统。\n\n**所行：** 把今天最卡的一件事丢给 AI，只要求它输出三行：第一步、三分钟版本、失败后重启句。不要让它替你写宏大计划。\n\n## 点火开场：发布版第一屏\n\n你最熟悉的崩溃不是“我不会”，而是“我明明会，但我开始不了”。屏幕是空的，脑子是满的，任务在那里，你也在那里，中间却像断了一根线。\n\n所以《为什么多 Agent 时代最稀缺的不是 Agent，而是任务仲裁器？》这篇不能先讲概念。它要先让读者在第三段前停住：这不就是我吗？我不是没有能力，我是一直在用不适配自己的接口硬扛。\n\n真正的 S 级，不是观点锋利，而是三件事同时发生：读者想要一种新的活法，读者重新解释自己的卡点，读者马上做一个小动作。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 既想要 AI 接住启动、排序、记忆和表达，又不想把判断权、自我效能和真实风格一起交出去。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 7 | 标题自带强冲突/强识别；正文承载不足；AI接口张力明确 |\n| 所思 | 把“我终于有工具了”改写成“这是外部前额叶、执行功能假肢，也可能制造依赖阈值和主体性稀释”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 6 | 标题自带强冲突/强识别；正文承载不足；AI接口张力明确 |\n| 所行 | 把一个任务分成可委托、必须自己判断、需要现实反馈三栏，再只交给 AI 最小一块。 | 结尾必须给一个 3-15 分钟内可执行的 AI/备忘录/微信动作。 | 6 | 标题自带强冲突/强识别；正文承载不足；AI接口张力明确 |\n| 电流总分 | 先列触动内容，再综合打分。 | 越能处理 AI 帮助与依赖、委托与控制、增强与替代之间的张力，分数越高。 | 19 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n", "chars": 1044, "path": "content-packs/问题360/01_正文.md"}, {"id": "问题004", "number": 4, "title": "问题004：AI能模拟ADHD的超聚焦吗——模型可以持续计算，但未必会被世界刺穿", "priority": "B", "category": "ai_interface", "rank": 322, "grade": "D", "desire": 2, "thought": 3, "action": 3, "total": 8, "authenticity": 2, "risk": "高", "failure": "类型模板、风险先行", "desire_text": "既想要 AI 接住启动、排序、记忆和表达，又不想把判断权、自我效能和真实风格一起交出去。", "thought_text": "把“我终于有工具了”改写成“这是外部前额叶、执行功能假肢，也可能制造依赖阈值和主体性稀释”。", "action_text": "把一个任务分成可委托、必须自己判断、需要现实反馈三栏，再只交给 AI 最小一块。", "real_desire": "", "outsourcing_angle": "", "verification_signa  S 级，不是观点锋利，而是三件事同时发生：读者想要一种新的活法，读者重新解释自己的卡点，读者马上做一个小动作。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 既想要 AI 接住启动、排序、记忆和表达，又不想把判断权、自我效能和真实风格一起交出去。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 6 | 正文承载不足 |\n| 所思 | 把“我终于有工具了”改写成“这是外部前额叶、执行功能假肢，也可能制造依赖阈值和主体性稀释”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 6 | 正文承载不足 |\n| 所行 | 把一个任务分成可委托、必须自己判断、需要现实反馈三栏，再只交给 AI 最小一块。 | 结尾必须给一个 3-15 分钟内可执行的 AI/备忘录/微信动作。 | 6 | 正文承载不足 |\n| 电流总分 | 先列触动内容，再综合打分。 | 越能处理 AI 帮助与依赖、委托与控制、增强与替代之间的张力，分数越高。 | 18 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n", "chars": 981, "path": "content-packs/问题010/01_正文.md"}, {"id": "问题011", "number": 11, "title": "《问题011：ADHD 如何用 Agent 完成\"从信息到洞察到选题\"的完整链路？》", "priority": "B", "category": "attention", "rank": 325, "grade": "D", "desire": 2, "thought": 3, "action": 3, "total": 8, "authenticity": 2, "risk": "高", "failure": "类型模板、自律化/审计化", "desire_text": "从被平台、短视频、AI 顺滑输出牵着走，变成重新夺回一点注意力、时间感和现实动作。", "thought_text": "把“我不自律”改写成“注意力被竞价、时间感被工具改写、深度工作被浅层动作伪装”。", "action_text": "做一次 15 分钟注意力审计：刚才谁拿走了我的注意力，它换回了什么现实结果。", "real_desire": "", "outsourcing_angle": "", "verification_signal": "", "comment": "高风险：发布前必须题目级真实欲望校准；注意力题优先写“系统替我挡掉掠夺”，不要写成靠意志力夺回", "article": "# 《问题011：ADHD 如何用 Agent 完成\"从信息到洞察到选题\"的完整链路？》\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想更自律，而是想从一套不断切碎你注意力的系统里，把自己的脑子赎回来。\n\n**所思：** 原来分心不只是个人意志失败，也可能是平台、工作流、即时通讯和奖励机制共同制造的执行功能损耗。AI 的价值，是帮我重建进入现实的通道，而不是制造更多入口。\n\n**所行：** 让 AI 帮你列出今天三个最大注意力泄漏点，每个只配一个阻断动作：静音、延迟回复、批处理，或五分钟单点启动。\n\n## 点火开场：发布版第一屏\n\n你不是不知道要做什么。你只是刚准备开始，就被消息、平台、提醒、群聊、短视频和脑内噪音同时拽走。等你回过神，最该做的事已经变成一团羞耻。\n\n所以《ADHD如何用Agent完成从信息到洞察到选题的完整链路》这篇不能先讲概念。它要先让读者在第三段前停住：这不就是我吗？我不是没有能力，我是一直在用不适配自己的接口硬扛。\n\n真正的 S 级，不是观点锋利，而是三件事同时发生：读者想要一种新的活法，读者重新解释自己的卡点，读者马上做一个小动作。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 从被平台、短视频、AI 顺滑输出牵着走，变成重新夺回一点注意力、时间感和现实动作。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 7 | 标题自带强冲突/强识别；正文承载不足 |\n| 所思 | 把“我不自律”改写成“注意力被竞价、时间感被工具改写、深度工作被浅层动作伪装”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 6 | 标题自带强冲突/强识别；正文承载不足 |\n| 所行 | 做一次 15 分钟注意力审计：刚才谁拿走了我的注意力，它换回了什么现实结果。 | 结尾必须给一个 3-15 分钟内可执行的 AI/备忘录/微信动作。 | 6 | 标题自带强冲突/强识别；正文承载不足 |\n| 电流总分 | 先列触动内容，再综合打分。 | 越能指出注意力被采掘、时间感被改变、现实动作被替代，分数越高。 | 19 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n", "chars": 1013, "path": "content-packs/问题011/01_正文.md"}, {"id": "问题012", "number": 12, "title": "问题012：ADHD和LLM都是时间盲，Agent如何同时治愈两个大脑？", "priority": "B", "category": "ai_interface", "rank": 326, "grade": "D", "desire": 2, "thought": 3, "action": 3, "total": 8, "authenticity": 2, "risk": "高", "failure": "类型模板、风险先行", "desire_text": "既想要 AI 接住启动、排序、记忆和表达，又不想把判断权、自我效能和真实风格一起交出去。", "thought_text": "把“我终于有工具了”改写成“这是外部前额叶、执行功能假肢，也可能制造依赖阈值和主体性稀释”。", "action_text": "把一个任务分成可委托、必须自己判断、需要现实反馈三栏，再只交给 AI 最小一块。", "real_desire": "", "outsourcing_angle": "", "verification_signal": "", "comment": "高风险：发布前必须题目级真实欲望校准；注意 Agentic AI 题不要默认害怕委托，要先承认全痛点外包欲望", "article": "# 问题012：ADHD和LLM都是时间盲，Agent如何同时治愈两个大脑？\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想又多一个效率工具，而是想在卡住的第一秒，有东西能把你从空白、混乱、羞耻和过载里拉出来。\n\n**所思：** 原来我卡住的不是能力，而是接口；我缺的不是更多道理，而是一个能承接启动、排序、记忆、反馈和委托的外部系统。\n\n**所行：** 把今天最卡的一件事丢给 AI，只要求它输出三行：第一步、三分钟版本、失败后重启句。不要让它替你写宏大计划。\n\n## 点火开场：发布版第一屏\n\n你最熟悉的崩溃不是“我不会”，而是“我明明会，但我开始不了”。屏幕是空的，脑子是满的，任务在那里，你也在那里，中间却像断了一根线。\n\n所以《ADHD和LLM都是时间盲，Agent如何同时治愈两个大脑？》这篇不能先讲概念。它要先让读者在第三段前停住：这不就是我吗？我不是没有能力，我是一直在用不适配自己的接口硬扛。\n\n真正的 S 级，不是观点锋利，而是三件事同时发生：读者想要一种新的活法，读者重新解释自己的卡点，读者马上做一个小动作。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 既想要 AI 接住启动、排序、记忆和表达，又不想把判断权、自我效能和真实风格一起交出去。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 7 | 标题自带强冲突/强识别；正文承载不足；AI接口张力明确 |\n| 所思 | 把“我终于有工具了”改写成“这是外部前额叶、执行功能假肢，也可能制造依赖阈值和主体性稀释”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 6 | 标题自带强冲突/强识别；正文承载不足；AI接口张力明确 |\n| 所行 | 把一个任务分成可委托、必须自己判断、需要现实反馈三栏，再只交给 AI 最小一块。 | 结尾必须给一个 3-15 分钟内可执行的 AI/备忘录/微信动作。 | 6 | 标题自带强冲突/强识别；正文承载不足；AI接口张力明确 |\n| 电流总分 | 先列触动内容，再综合打分。 | 越能处理 AI 帮助与依赖、委托与控制、增强与替代之间的张力，分数越高。 | 19 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n", "chars": 1036, "path ng_angle": "", "verification_signal": "", "comment": "高风险：发布前必须题目级真实欲望校准；注意力题优先写“系统替我挡掉掠夺”，不要写成靠意志力夺回", "article": "# 问题021：为什么Agent正在成为ADHD新的多巴胺来源？危险不在工具好用，而在回路太顺\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想更自律，而是想从一套不断切碎你注意力的系统里，把自己的脑子赎回来。\n\n**所思：** 原来分心不只是个人意志失败，也可能是平台、工作流、即时通讯和奖励机制共同制造的执行功能损耗。AI 的价值，是帮我重建进入现实的通道，而不是制造更多入口。\n\n**所行：** 让 AI 帮你列出今天三个最大注意力泄漏点，每个只配一个阻断动作：静音、延迟回复、批处理，或五分钟单点启动。\n\n## 点火开场：发布版第一屏\n\n你不是不知道要做什么。你只是刚准备开始，就被消息、平台、提醒、群聊、短视频和脑内噪音同时拽走。等你回过神，最该做的事已经变成一团羞耻。\n\n所以《为什么Agent正在成为ADHD新的多巴胺来源？危险不在工具好用，而在回路太顺》这篇不能先讲概念。它要先让读者在第三段前停住：这不就是我吗？我不是没有能力，我是一直在用不适配自己的接口硬扛。\n\n真正的 S 级，不是观点锋利，而是三件事同时发生：读者想要一种新的活法，读者重新解释自己的卡点，读者马上做一个小动作。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 从被平台、短视频、AI 顺滑输出牵着走，变成重新夺回一点注意力、时间感和现实动作。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 7 | 标题自带强冲突/强识别；正文承载不足 |\n| 所思 | 把“我不自律”改写成“注意力被竞价、时间感被工具改写、深度工作被浅层动作伪装”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 6 | 标题自带强冲突/强识别；正文承载不足 |\n| 所行 | 做一次 15 分钟注意力审计：刚才谁拿走了我的注意力，它换回了什么现实结果。 | 结尾必须给一个 3-15 分钟内可执行的 AI/备忘录/微信动作。 | 6 | 标题自带强冲突/强识别；正文承载不足 |\n| 电流总分 | 先列触动内容，再综合打分。 | 越能指出注意力被采掘、时间感被改变、现实动作被替代，分数越高。 | 19 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n", "chars": 1027, "path": "content-packs/问题021/01_正文.md"}, {"id": "问题026", "number": 26, "title": "问题026：为什么不是ADHD像AI，而是AI像ADHD？高发散系统终于成了时代默认界面", "priority": "B", "category": "ai_interface", "rank": 330, "grade": "D", "desire": 2, "thought": 3, "action": 3, "total": 8, "authenticity": 2, "risk": "高", "failure": "类型模板、风险先行", "desire_text": "既想要 AI 接住启动、排序、记忆和表达，又不想把判断权、自我效能和真实风格一起交出去。", "thought_text": "把“我终于有工具了”改写成“这是外部前额叶、执行功能假肢，也可能制造依赖阈值和主体性稀释”。", "action_text": "把一个任务分成可委托、必须自己判断、需要现实反馈三栏，再只交给 AI 最小一块。", "real_desire": "", "outsourcing_angle": "", "verification_signal": "", "comment": "高风险：发布前必须题目级真实欲望校准；注意 Agentic AI 题不要默认害怕委托，要先承认全痛点外包欲望", "article": "# 问题026：为什么不是ADHD像AI，而是AI像ADHD？高发散系统终于成了时代默认界面\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想又多一个效率工具，而是想在卡住的第一秒，有东西能把你从空白、混乱、羞耻和过载里拉出来。\n\n**所思：** 原来我卡住的不是能力，而是接口；我缺的不是更多道理，而是 e": "类型模板、风险先行", "desire_text": "既想要 AI 接住启动、排序、记忆和表达，又不想把判断权、自我效能和真实风格一起交出去。", "thought_text": "把“我终于有工具了”改写成“这是外部前额叶、执行功能假肢，也可能制造依赖阈值和主体性稀释”。", "action_text": "把一个任务分成可委托、必须自己判断、需要现实反馈三栏，再只交给 AI 最小一块。", "real_desire": "", "outsourcing_angle": "", "verification_signal": "", "comment": "高风险：发布前必须题目级真实欲望校准；注意 Agentic AI 题不要默认害怕委托，要先承认全痛点外包欲望", "article": "# 问题047：为什么200个Skill不是数字囤积而是MoE专家库——你的囤积癖正在搭建认知基础设施\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想被安慰“你没有问题”，而是想终于找到一种方式，让自己这种不稳定但高能量的系统可以被接住。\n\n**所思：** 原来我的问题不只是性格、习惯或意志力，而是输入、启动、反馈和回流接口长期错配。\n\n**所行：** 写下一个最近最反复的卡点，让 AI 帮你翻译成三句话：我想要什么、我卡在哪里、下一步三分钟做什么。\n\n## 点火开场：发布版第一屏\n\n你可能已经听过太多建议：自律一点、规划一点、坚持一点。但真正的问题是，你不是不知道这些道理，而是每次要把道理变成动作时，系统就断电。\n\n所以《为什么200个Skill不是数字囤积而是MoE专家库——你的囤积癖正在搭建认知基础设施》这篇不能先讲概念。它要先让读者在第三段前停住：这不就是我吗？我不是没有能力，我是一直在用不适配自己的接口硬扛。\n\n真正的 S 级，不是观点锋利，而是三件事同时发生：读者想要一种新的活法，读者重新解释自己的卡点，读者马上做一个小动作。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 既想要 AI 接住启动、排序、记忆和表达，又不想把判断权、自我效能和真实风格一起交出去。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 6 | 正文承载不足 |\n| 所思 | 把“我终于有工具了”改写成“这是外部前额叶、执行功能假肢，也可能制造依赖阈值和主体性稀释”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 6 | 正文承载不足 |\n| 所行 | 把一个任务分成可委托、必须自己判断、需要现实反馈三栏，再只交给 AI 最小一块。 | 结尾必须给一个 3-15 分钟内可执行的 AI/备忘录/微信动作。 | 6 | 正文承载不足 |\n| 电流总分 | 先列触动内容，再综合打分。 | 越能处理 AI 帮助与依赖、委托与控制、增强与替代之间的张力，分数越高。 | 18 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n", "chars": 983, "path": "content-packs/问题047/01_正文.md"}, {"id": "问题051", "number": 51, "title": "问题051：为什么ADHD的\"准备行为\"是最贵的认知税——你在用装修拖延开火", "priority": "B", "category": "ai_interface", "rank": 336, "grade": "D", "desire": 2, "thought": 3, "action": 3, "total": 8, "authenticity": 2, "risk": "高", "failure": "类型模板、风险先行", "desire_text": "既想要 AI 接住启动、排序、记忆和表达，又不想把判断权、自我效能和真实风格一起交出去。", "thought_text": "把“我终于有工具了”改写成“这是外部前额叶、执行功能假肢，也可能制造依赖阈值和主体性稀释”。", "action_text": "把一个任务分成可委托、必须自己判断、需要现实反馈三栏，再只交给 AI 最小一块。", "real_desire": "", "outsourcing_angle": "", "verification_signal": "", "comment": "高风险：发布前必须题目级真实欲望校准；注意 Agentic AI 题不要默认害怕委 esire_text": "既想要 AI 接住启动、排序、记忆和表达，又不想把判断权、自我效能和真实风格一起交出去。", "thought_text": "把“我终于有工具了”改写成“这是外部前额叶、执行功能假肢，也可能制造依赖阈值和主体性稀释”。", "action_text": "把一个任务分成可委托、必须自己判断、需要现实反馈三栏，再只交给 AI 最小一块。", "real_desire": "", "outsourcing_angle": "", "verification_signal": "", "comment": "高风险：发布前必须题目级真实欲望校准；注意 Agentic AI 题不要默认害怕委托，要先承认全痛点外包欲望", "article": "# 问题193：为什么 ADHD x AI 工具测评不能只讲好用，而要讲反噬场景？最危险的工具往往一开始最爽\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想又多一个效率工具，而是想在卡住的第一秒，有东西能把你从空白、混乱、羞耻和过载里拉出来。\n\n**所思：** 原来我卡住的不是能力，而是接口；我缺的不是更多道理，而是一个能承接启动、排序、记忆、反馈和委托的外部系统。\n\n**所行：** 把今天最卡的一件事丢给 AI，只要求它输出三行：第一步、三分钟版本、失败后重启句。不要让它替你写宏大计划。\n\n## 点火开场：发布版第一屏\n\n你最熟悉的崩溃不是“我不会”，而是“我明明会，但我开始不了”。屏幕是空的，脑子是满的，任务在那里，你也在那里，中间却像断了一根线。\n\n所以《为什么ADHD x AI 工具测评不能只讲好用，而要讲反噬场景？最危险的工具往往一开始最爽》这篇不能先讲概念。它要先让读者在第三段前停住：这不就是我吗？我不是没有能力，我是一直在用不适配自己的接口硬扛。\n\n真正的 S 级，不是观点锋利，而是三件事同时发生：读者想要一种新的活法，读者重新解释自己的卡点，读者马上做一个小动作。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 既想要 AI 接住启动、排序、记忆和表达，又不想把判断权、自我效能和真实风格一起交出去。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 7 | 标题自带强冲突/强识别；正文承载不足 |\n| 所思 | 把“我终于有工具了”改写成“这是外部前额叶、执行功能假肢，也可能制造依赖阈值和主体性稀释”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 6 | 标题自带强冲突/强识别；正文承载不足 |\n| 所行 | 把一个任务分成可委托、必须自己判断、需要现实反馈三栏，再只交给 AI 最小一块。 | 结尾必须给一个 3-15 分钟内可执行的 AI/备忘录/微信动作。 | 6 | 标题自带强冲突/强识别；正文承载不足 |\n| 电流总分 | 先列触动内容，再综合打分。 | 越能处理 AI 帮助与依赖、委托与控制、增强与替代之间的张力，分数越高。 | 19 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n", "chars": 1040, "path": "content-packs/问题193/01_正文.md"}, {"id": "问题195", "number": 195, "title": "问题195：为什么 ADHD 工具必须有“退出机制”？没有刹车的多巴胺工具不是外骨骼，是捕兽夹", "priority": "B", "category": "attention", "rank": 357, "grade": "D", "desire": 2, "thought": 3, "action": 3, "total": 8, "authenticity": 2, "risk": "高", "failure": "类型模板、自律化/审计化", "desire_text": "从被平台、短视频、AI 顺滑输出牵着走，变成重新夺回一点注意力、时间感和现实动作。", "thought_text": "把“我不自律”改写成“注意力被竞价、时间感被工具改写、深度工作被浅层动作伪装”。", "action_text": "做一次 15 分钟注意力审计：刚才谁拿走了我的注意力，它换回了什么现实结果。", "real_desire": "", "outsourcing_angle": "", "verification_signal": "", "comment": "高风险：发 ber": 240, "title": "问题240：为什么 ADHD 的法律旧粉迁移可以从案件压力表开始，而不是从 ADHD 科普开始？先救场，再换地图", "priority": "B", "category": "attention", "rank": 363, "grade": "D", "desire": 2, "thought": 3, "action": 3, "total": 8, "authenticity": 2, "risk": "高", "failure": "类型模板、自律化/审计化", "desire_text": "从被平台、短视频、AI 顺滑输出牵着走，变成重新夺回一点注意力、时间感和现实动作。", "thought_text": "把“我不自律”改写成“注意力被竞价、时间感被工具改写、深度工作被浅层动作伪装”。", "action_text": "做一次 15 分钟注意力审计：刚才谁拿走了我的注意力，它换回了什么现实结果。", "real_desire": "", "outsourcing_angle": "", "verification_signal": "", "comment": "高风险：发布前必须题目级真实欲望校准；注意力题优先写“系统替我挡掉掠夺”，不要写成靠意志力夺回", "article": "# 问题240：为什么 ADHD 的法律旧粉迁移可以从案件压力表开始，而不是从 ADHD 科普开始？先救场，再换地图\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想更自律，而是想从一套不断切碎你注意力的系统里，把自己的脑子赎回来。\n\n**所思：** 原来分心不只是个人意志失败，也可能是平台、工作流、即时通讯和奖励机制共同制造的执行功能损耗。AI 的价值，是帮我重建进入现实的通道，而不是制造更多入口。\n\n**所行：** 让 AI 帮你列出今天三个最大注意力泄漏点，每个只配一个阻断动作：静音、延迟回复、批处理，或五分钟单点启动。\n\n## 点火开场：发布版第一屏\n\n你不是不知道要做什么。你只是刚准备开始，就被消息、平台、提醒、群聊、短视频和脑内噪音同时拽走。等你回过神，最该做的事已经变成一团羞耻。\n\n所以《为什么ADHD 创作者最该研究的不是平台算法，而是需求流算法？》这篇不能先讲概念。它要先让读者在第三段前停住：这不就是我吗？我不是没有能力，我是一直在用不适配自己的接口硬扛。\n\n真正的 S 级，不是观点锋利，而是三件事同时发生：读者想要一种新的活法，读者重新解释自己的卡点，读者马上做一个小动作。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 从被平台、短视频、AI 顺滑输出牵着走，变成重新夺回一点注意力、时间感和现实动作。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 6 | 正文承载不足 |\n| 所思 | 把“我不自律”改写成“注意力被竞价、时间感被工具改写、深度工作被浅层动作伪装”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 6 | 正文承载不足 |\n| 所行 | 做一次 15 分钟注意力审计：刚才谁拿走了我的注意力，它换回了什么现实结果。 | 结尾必须给一个 3-15 分钟内可执行的 AI/备忘录/微信动作。 | 6 | 正文承载不足 |\n| 电流总分 | 先列触动内容，再综合打分。 | 越能指出注意力被采掘、时间感被改变、现实动作被替代，分数越高。 | 18 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n", "chars": 994, "path": "content-packs/问题240/01_正文.md"}, {"id": "问题249", "number": 249, "title": "问题249：为什么 ADHD 的付费产品要有低能量版本？用户最需要你时，往往没有力气使用你", "priority": "B", "category": "attention", "rank": 364, "grade": "D", "desire": 2, "thought": 3, "action": 3, "total": 8, "authenticity": 2, "risk": "高", "failure": "类型模板、自律化/审计化", "desire_text": "从被平台、短视频、AI 顺滑输出牵着走，变成重新夺回一点注意力、时间感和现实动作。", "thought_t 行\n\n**所欲：** 不是想又多一个效率工具，而是想在卡住的第一秒，有东西能把你从空白、混乱、羞耻和过载里拉出来。\n\n**所思：** 原来我卡住的不是能力，而是接口；我缺的不是更多道理，而是一个能承接启动、排序、记忆、反馈和委托的外部系统。\n\n**所行：** 把今天最卡的一件事丢给 AI，只要求它输出三行：第一步、三分钟版本、失败后重启句。不要让它替你写宏大计划。\n\n## 点火开场：发布版第一屏\n\n你最熟悉的崩溃不是“我不会”，而是“我明明会，但我开始不了”。屏幕是空的，脑子是满的，任务在那里，你也在那里，中间却像断了一根线。\n\n所以《为什么你需要一套评论→需求的 Agent 提示词，而不是手工整理？》这篇不能先讲概念。它要先让读者在第三段前停住：这不就是我吗？我不是没有能力，我是一直在用不适配自己的接口硬扛。\n\n真正的 S 级，不是观点锋利，而是三件事同时发生：读者想要一种新的活法，读者重新解释自己的卡点，读者马上做一个小动作。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 既想要 AI 接住启动、排序、记忆和表达，又不想把判断权、自我效能和真实风格一起交出去。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 7 | 标题自带强冲突/强识别；正文承载不足；AI接口张力明确 |\n| 所思 | 把“我终于有工具了”改写成“这是外部前额叶、执行功能假肢，也可能制造依赖阈值和主体性稀释”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 6 | 标题自带强冲突/强识别；正文承载不足；AI接口张力明确 |\n| 所行 | 把一个任务分成可委托、必须自己判断、需要现实反馈三栏，再只交给 AI 最小一块。 | 结尾必须给一个 3-15 分钟内可执行的 AI/备忘录/微信动作。 | 6 | 标题自带强冲突/强识别；正文承载不足；AI接口张力明确 |\n| 电流总分 | 先列触动内容，再综合打分。 | 越能处理 AI 帮助与依赖、委托与控制、增强与替代之间的张力，分数越高。 | 19 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n", "chars": 1052, "path": "content-packs/问题255/01_正文.md"}, {"id": "问题259", "number": 259, "title": "问题259：为什么 ADHD 的产品说明不能太完整？说明越长，启动越晚", "priority": "B", "category": "ai_interface", "rank": 366, "grade": "D", "desire": 2, "thought": 3, "action": 3, "total": 8, "authenticity": 2, "risk": "高", "failure": "类型模板、风险先行", "desire_text": "既想要 AI 接住启动、排序、记忆和表达，又不想把判断权、自我效能和真实风格一起交出去。", "thought_text": "把“我终于有工具了”改写成“这是外部前额叶、执行功能假肢，也可能制造依赖阈值和主体性稀释”。", "action_text": "把一个任务分成可委托、必须自己判断、需要现实反馈三栏，再只交给 AI 最小一块。", "real_desire": "", "outsourcing_angle": "", "verification_signal": "", "comment": "高风险：发布前必须题目级真实欲望校准；注意 Agentic AI 题不要默认害怕委托，要先承认全痛点外包欲望", "article": "# 问题259：为什么 ADHD 的产品说明不能太完整？说明越长，启动越晚\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想又多一个效率工具，而是想在卡住的第一秒，有东西能把你从空白、混乱、羞耻和过载里拉出来。\n\n**所思：** 原来我卡住的不是能力，而是接口；我缺的不是更多道理，而是一个能承接启动、排序、记忆、反馈和委托的外部系统。\n\n**所行：** 把今天最卡的一件事丢给 AI，只要求它输出三行：第一步、三分钟版本、失败后重启句。不要让它替你写宏大计划。\n\n## 点火开场：发布版第一屏\n\n你最熟悉的崩溃不是“我不会”，而是“我明明会，但我开始不了”。屏幕是空的，脑子是满的，任务在那里，你也在那里，中间却像断了一根线。\ 个小动作。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 从被平台、短视频、AI 顺滑输出牵着走，变成重新夺回一点注意力、时间感和现实动作。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 6 | 正文承载不足 |\n| 所思 | 把“我不自律”改写成“注意力被竞价、时间感被工具改写、深度工作被浅层动作伪装”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 6 | 正文承载不足 |\n| 所行 | 做一次 15 分钟注意力审计：刚才谁拿走了我的注意力，它换回了什么现实结果。 | 结尾必须给一个 3-15 分钟内可执行的 AI/备忘录/微信动作。 | 6 | 正文承载不足 |\n| 电流总分 | 先列触动内容，再综合打分。 | 越能指出注意力被采掘、时间感被改变、现实动作被替代，分数越高。 | 18 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n", "chars": 993, "path": "content-packs/问题314/01_正文.md"}, {"id": "问题319", "number": 319, "title": "问题319：为什么AI 在帮助神经多样性人群时，往往先暴露出主流神经类型的偏见？", "priority": "B", "category": "ai_interface", "rank": 374, "grade": "D", "desire": 2, "thought": 3, "action": 3, "total": 8, "authenticity": 2, "risk": "高", "failure": "类型模板、风险先行", "desire_text": "既想要 AI 接住启动、排序、记忆和表达，又不想把判断权、自我效能和真实风格一起交出去。", "thought_text": "把“我终于有工具了”改写成“这是外部前额叶、执行功能假肢，也可能制造依赖阈值和主体性稀释”。", "action_text": "把一个任务分成可委托、必须自己判断、需要现实反馈三栏，再只交给 AI 最小一块。", "real_desire": "", "outsourcing_angle": "", "verification_signal": "", "comment": "高风险：发布前必须题目级真实欲望校准；注意 Agentic AI 题不要默认害怕委托，要先承认全痛点外包欲望", "article": "# 问题319：为什么AI 在帮助神经多样性人群时，往往先暴露出主流神经类型的偏见？\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想又多一个效率工具，而是想在卡住的第一秒，有东西能把你从空白、混乱、羞耻和过载里拉出来。\n\n**所思：** 原来我卡住的不是能力，而是接口；我缺的不是更多道理，而是一个能承接启动、排序、记忆、反馈和委托的外部系统。\n\n**所行：** 把今天最卡的一件事丢给 AI，只要求它输出三行：第一步、三分钟版本、失败后重启句。不要让它替你写宏大计划。\n\n## 点火开场：发布版第一屏\n\n你最熟悉的崩溃不是“我不会”，而是“我明明会，但我开始不了”。屏幕是空的，脑子是满的，任务在那里，你也在那里，中间却像断了一根线。\n\n所以《为什么AI 在帮助神经多样性人群时，往往先暴露出主流神经类型的偏见？》这篇不能先讲概念。它要先让读者在第三段前停住：这不就是我吗？我不是没有能力，我是一直在用不适配自己的接口硬扛。\n\n真正的 S 级，不是观点锋利，而是三件事同时发生：读者想要一种新的活法，读者重新解释自己的卡点，读者马上做一个小动作。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 既想要 AI 接住启动、排序、记忆和表达，又不想把判断权、自我效能和真实风格一起交出去。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 7 | 标题自带强冲突/强识别；正文承载不足 |\n| 所思 | 把“我终于有工具了”改写成“这是外部前额叶、执行功能假肢，也可能制造依赖阈值和主体性稀释”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 6 | 标题自带强冲突/强识别；正文承载不足 |\n| 所行 | 把一个任务分 ank": 396, "grade": "D", "desire": 2, "thought": 3, "action": 3, "total": 8, "authenticity": 2, "risk": "高", "failure": "类型模板、风险先行", "desire_text": "既想要 AI 接住启动、排序、记忆和表达，又不想把判断权、自我效能和真实风格一起交出去。", "thought_text": "把“我终于有工具了”改写成“这是外部前额叶、执行功能假肢，也可能制造依赖阈值和主体性稀释”。", "action_text": "把一个任务分成可委托、必须自己判断、需要现实反馈三栏，再只交给 AI 最小一块。", "real_desire": "", "outsourcing_angle": "", "verification_signal": "", "comment": "高风险：发布前必须题目级真实欲望校准；注意 Agentic AI 题不要默认害怕委托，要先承认全痛点外包欲望", "article": "# 问题383：为什么AI 让你看起来更能干，但不一定让你更能自己干？\n\n## 点火改写：所欲、所思、所行\n\n**所欲：** 不是想又多一个效率工具，而是想在卡住的第一秒，有东西能把你从空白、混乱、羞耻和过载里拉出来。\n\n**所思：** 原来我卡住的不是能力，而是接口；我缺的不是更多道理，而是一个能承接启动、排序、记忆、反馈和委托的外部系统。\n\n**所行：** 把今天最卡的一件事丢给 AI，只要求它输出三行：第一步、三分钟版本、失败后重启句。不要让它替你写宏大计划。\n\n## 点火开场：发布版第一屏\n\n你最熟悉的崩溃不是“我不会”，而是“我明明会，但我开始不了”。屏幕是空的，脑子是满的，任务在那里，你也在那里，中间却像断了一根线。\n\n所以《为什么AI 让你看起来更能干，但不一定让你更能自己干？》这篇不能先讲概念。它要先让读者在第三段前停住：这不就是我吗？我不是没有能力，我是一直在用不适配自己的接口硬扛。\n\n真正的 S 级，不是观点锋利，而是三件事同时发生：读者想要一种新的活法，读者重新解释自己的卡点，读者马上做一个小动作。\n\n## 三维度电流评分表：触动内容版\n\n| 维度 | 具体触动内容 | 文本/选题证据 | 分数 | 分数依据 |\n|---|---|---|---:|---|\n| 所欲 | 既想要 AI 接住启动、排序、记忆和表达，又不想把判断权、自我效能和真实风格一起交出去。 | 开场必须让读者感觉：这不是抽象知识，而是我想从某种卡死状态里出来。 | 7 | 标题自带强冲突/强识别；正文承载不足 |\n| 所思 | 把“我终于有工具了”改写成“这是外部前额叶、执行功能假肢，也可能制造依赖阈值和主体性稀释”。 | 中段必须完成解释反转：不是道德失败或能力坏了，而是接口、场景、反馈或系统错配。 | 6 | 标题自带强冲突/强识别；正文承载不足 |\n| 所行 | 把一个任务分成可委托、必须自己判断、需要现实反馈三栏，再只交给 AI 最小一块。 | 结尾必须给一个 3-15 分钟内可执行的 AI/备忘录/微信动作。 | 6 | 标题自带强冲突/强识别；正文承载不足 |\n| 电流总分 | 先列触动内容，再综合打分。 | 越能处理 AI 帮助与依赖、委托与控制、增强与替代之间的张力，分数越高。 | 19 | 满分不是默认值；只有触动具体、证据清楚、动作低摩擦才接近 27。 |\n\n", "chars": 1003, "path": "content-packs/问题383/01_正文.md"}, {"id": "问题384", "number": 384, "title": "问题384：为什么认知支持技术越普及，越需要一张自主权检查表？", "priority": "B", "category": "ai_interface", "rank": 397, "grade": "D", "desire": 2, "thought": 3, "action": 3, "total": 8, "authenticity": 2, "risk": "高", "failure": "类型模板、风险先行", "desire_text": "既想要 AI 接住启动、排序、记忆和表达，又不想把判断权、自我效能和真实风格一起交出去。", "thought_text": "把“我终于有工具了”改写成“这是外部前额叶、执行功能假肢，也可能制造依赖阈值和主体性稀释”。", "action_text": "把一个任务分成可委托、必须自己判断、需要现实反馈三栏，再只交给 AI 最小一 const $ = id => document.getElementById(id);
function riskClass(r) { return r==='高' ? 'risk-high' : r==='中' ? 'risk-mid' : r==='低' ? 'risk-low' : ''; }
function esc(s) { return (s ?? '').toString().replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function initMetrics() {
  const s = DATA.summary;
  $('metrics').innerHTML = `
    <div class="metric"><b>${s.count}</b><span>总试卷数</span></div>
    <div class="metric"><b>${s.avg_total}</b><span>平均总分 / 27</span></div>
    <div class="metric"><b>${s.grade_counts.S||0}</b><span>S 等</span></div>
    <div class="metric"><b>${s.risk_counts['高']||0}</b><span>高风险待校准</span></div>
    <div class="metric"><b>${s.risk_counts['低']||0}</b><span>低风险可优先发</span></div>
    <div class="metric"><b>${s.updated_at}</b><span>面板生成日期</span></div>`;
  const cats = [...new Set(DATA.items.map(x=>x.category).filter(Boolean))].sort();
  $('cat').innerHTML = '<option value="">全部类型</option>' + cats.map(c=>`<option>${esc(c)}</option>`).join('');
}
function applyFilters() {
  const q = $('q').value.trim().toLowerCase();
  const grade = $('grade').value, risk = $('risk').value, cat = $('cat').value;
  let arr = DATA.items.filter(x => (!grade || x.grade===grade) && (!risk || x.risk===risk) && (!cat || x.category===cat));
  if (q) arr = arr.filter(x => [x.id,x.title,x.category,x.desire_text,x.thought_text,x.action_text,x.article,x.comment].join('
').toLowerCase().includes(q));
  const sort = $('sort').value;
  arr.sort((a,b)=> {
    if (sort==='num') return a.number-b.number;
    if (sort==='total') return (b.total||0)-(a.total||0) || a.number-b.number;
    if (sort==='risk') return ({'高':0,'中':1,'低':2}[a.risk]??9)-({'高':0,'中':1,'低':2}[b.risk]??9) || (b.total||0)-(a.total||0);
    return (a.rank??9999)-(b.rank??9999) || a.number-b.number;
  });
  state.filtered = arr;
  renderTable();
  if (!state.selected || !arr.find(x=>x.id===state.selected.id)) selectItem(arr[0]);
}
function renderTable() {
  $('tbody').innerHTML = state.filtered.map(x => `<tr data-id="${x.id}" class="${state.selected && state.selected.id===x.id ? 'active':''}">
    <td>${x.rank??''}</td><td>${x.id}</td><td><span class="badge ${x.grade}">${x.grade}</span></td><td>${x.total??''}</td><td class="${riskClass(x.risk)}">${x.risk||''}</td><td class="titlecell">${esc(x.title)}</td>
  </tr>`).join('');
  [...$('tbody').querySelectorAll('tr')].forEach(tr => tr.onclick = () => selectItem(DATA.items.find(x=>x.id===tr.dataset.id)));
}
function selectItem(x) {
  if (!x) { $('detail').innerHTML = '<p class="small">没有匹配结果。</p>'; return; }
  state.selected = x; renderTable();
  $('detail').innerHTML = `
    <h2>${esc(x.title)}</h2>
    <div class="meta">${x.id} · 优先级 ${x.priority||'-'} · 类型 ${x.category||'-'} · 校准排名 ${x.rank??'-'} · 路径 ${esc(x.path)} · 正文 ${x.chars} 字</div>
    <div class="scoregrid">
      <div class="scorebox"><b>${x.desire??'-'}</b><span>所欲</span></div>
      <div class="scorebox"><b>${x.thought??'-'}</b><span>所思</span></div>
      <div class="scorebox"><b>${x.action??'-'}</b><span>所行</span></div>
      <div class="scorebox"><b>${x.total??'-'}</b><span>总分 / 27 · <span class="badge ${x.grade}">${x.grade}</span></span></div>
    </div>
    <div class="card"><h3>阅卷短评</h3><p>${esc(x.comment)}</p><p>风险：<span class="${riskClass(x.risk)}">${esc(x.risk||'-')}</span>；失真模式：${esc(x.failure||'-')}</p></div>
    <div class="card"><h3>三维触动内容</h3><p><b>所欲：</b>${esc(x.desire_text||'-')}</p><p><b>所思：</b>${esc(x.thought_text||'-')}</p><p><b>所行：</b>${esc(x.action_text||'-')}</p></div>
    <div class="card"><h3>真实欲望校准</h3><p><b>真实欲望：</b>${esc(x.real_desire||'-')}</p><p><b>外包/Agent 角度：</b>${esc(x.outsourcing_angle||'-')}</p><p><b>发布验证信号：</b>${esc(x.verification_signal||'-')}</p></div>
    <div class="card"><h3>全文正文</h3><div class="article">${esc(x.article||'未找到正文')}</div></div>`;
}
['q','grade','risk','cat','sort'].forEach(id => $(id).addEventListener('input', applyFilters));
$('reset').onclick = () => { ['q','grade','risk','cat'].forEach(id => $(id).value=''); $('sort').value='rank'; applyFilters(); };
initMetrics(); applyFilters();
</script>
</body>
</html>
