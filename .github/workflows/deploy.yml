name: Deploy Blog to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.12"
          cache: npm
          cache-dependency-path: blog/package-lock.json
      - name: Install dependencies
        working-directory: blog
        run: npm ci --legacy-peer-deps
      - name: Build
        working-directory: blog
        env:
          SITE_URL: https://legalinvest.github.io
          BASE_PATH: /adhd-agent-harness
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: blog/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  deploy-aliyun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.12"
          cache: npm
          cache-dependency-path: blog/package-lock.json
      - name: Install dependencies
        working-directory: blog
        run: npm ci --legacy-peer-deps
      - name: Build for Aliyun
        working-directory: blog
        env:
          SITE_URL: https://legalbot.top
          BASE_PATH: /adhd
        run: npm run build
      - name: Rsync to Aliyun server
        env:
          ALIYUN_SSH_KEY: ${{ secrets.ALIYUN_SSH_KEY }}
          ALIYUN_HOST: ${{ secrets.ALIYUN_HOST }}
          ALIYUN_USER: ${{ secrets.ALIYUN_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$ALIYUN_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$ALIYUN_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key" \
            blog/dist/ "$ALIYUN_USER@$ALIYUN_HOST:/opt/apps/static/adhd/"
