name: Deploy Blog to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.12"
          cache: npm
          cache-dependency-path: blog/package-lock.json
      - name: Install dependencies
        working-directory: blog
        run: npm ci
      - name: Build
        working-directory: blog
        env:
          SITE_URL: https://legalinvest.github.io
          BASE_PATH: /adhd-agent-harness
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: blog/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
